<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marvin's Place</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--text:#fff;--border:rgba(255,255,255,.12);--panel:rgba(12,12,12,.96)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overflow:hidden}
button,input{font:inherit}
.topbar{position:fixed;top:0;left:0;right:0;z-index:30;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border)}
.board-title{background:transparent;border:0;color:#fff;font-size:16px;font-weight:700;letter-spacing:.04em;cursor:pointer;opacity:.9;user-select:none;padding:4px 0}
.board-title:hover{opacity:1}
.menubtn{width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(16px);transition:.15s}
.menubtn:hover{background:rgba(255,255,255,.13)}
.dropdown{position:fixed;top:58px;right:14px;z-index:40;width:290px;display:none;padding:10px;border:1px solid var(--border);border-radius:18px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6);max-height:calc(100vh - 80px);overflow-y:auto}
.dropdown.show{display:block}
.dd-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:8px 8px 4px}
.dd-divider{height:1px;background:rgba(255,255,255,.07);margin:6px 0}
.dd-btn{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px}
.dd-btn:hover{background:rgba(255,255,255,.08)}
.dd-btn .icon{width:18px;text-align:center;opacity:.6;font-size:15px}
.dd-input-row{display:flex;gap:6px;padding:4px 2px 6px}
.dd-input-row input{flex:1;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:8px 10px;outline:none;font-size:12px}
.dd-input-row button{border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:8px 10px;cursor:pointer;font-size:12px;white-space:nowrap}
.mood-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.mchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.mchip.active{background:#fff;color:#111;border-color:#fff}
.tag-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.tchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.tchip.active{background:#fff;color:#111;border-color:#fff}
.editor-wrap{display:none}
.editor-wrap.show{display:block}
.shufflebtn{position:fixed;bottom:20px;right:20px;z-index:30;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:19px;display:grid;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.3);transition:.15s}
.shufflebtn:hover{background:rgba(255,255,255,.13)}
.gridwrap{position:fixed;inset:52px 0 0 0;overflow-y:auto;overflow-x:hidden}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:2px;padding:2px}
.cell{position:relative;overflow:hidden;background:#111;aspect-ratio:9/16;cursor:pointer}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block;transition:.3s}
.cell:hover img,.cell:hover video{transform:scale(1.04)}
.cell.sel-highlight{outline:2px solid #fff;outline-offset:-2px}
.cell.mood-dim{opacity:.35;transition:opacity .2s}
.selcheck{position:absolute;top:8px;left:8px;z-index:2;width:20px;height:20px;accent-color:#fff;opacity:0;pointer-events:none;cursor:pointer}
.selcheck.visible{opacity:1;pointer-events:auto}
.cell-mood-badge{position:absolute;bottom:6px;left:6px;z-index:2;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:999px;font-size:10px;color:#fff;padding:2px 8px;pointer-events:none;display:none}
.cell-mood-badge.show{display:block}
.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:14px 16px 24px;background:linear-gradient(to top,rgba(0,0,0,.95) 70%,transparent);display:none;flex-direction:column;gap:10px}
.action-bar.show{display:flex}
.action-bar-title{font-size:11px;opacity:.5;text-transform:uppercase;letter-spacing:.08em}
.action-bar-moods{display:flex;flex-wrap:wrap;gap:6px}
.ab-chip{border:1px solid var(--border);background:rgba(255,255,255,.07);color:#fff;border-radius:999px;padding:8px 16px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.ab-chip:hover{background:rgba(255,255,255,.15)}
.ab-chip.sel{background:#fff;color:#111;border-color:#fff}
.action-bar-actions{display:flex;gap:8px}
.ab-act{flex:1;border:1px solid var(--border);border-radius:12px;padding:10px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
.ab-act.confirm{background:#fff;color:#111;border-color:#fff}
.ab-act.confirm:hover{background:#ddd}
.ab-act.cancel{background:rgba(255,255,255,.06);color:#fff}
.ab-act.cancel:hover{background:rgba(255,255,255,.12)}
.ab-act.remove{background:rgba(255,60,60,.15);color:#ff6b6b;border-color:rgba(255,60,60,.3)}
.ab-act.remove:hover{background:rgba(255,60,60,.25)}
.ab-count{font-size:12px;opacity:.5}
/* Lightbox — kein X mehr, Klick auf Bild schließt */
.lightbox{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);touch-action:pan-y;cursor:pointer}
.lightbox.show{display:flex}
.lb-inner{position:relative;max-width:92vw;max-height:92vh;user-select:none;cursor:default}
.lb-inner img,.lb-inner video{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:10px;display:block;pointer-events:none}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:81;width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;font-size:18px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(10px);transition:.15s}
.lb-arrow:hover{background:rgba(255,255,255,.18)}
.lb-arrow.prev{left:14px}
.lb-arrow.next{right:14px}
.lb-mood-btn{position:fixed;bottom:28px;right:20px;z-index:90;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:18px;display:none;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.4);transition:.15s}
.lb-mood-btn:hover{background:rgba(255,255,255,.18)}
.lb-mood-btn.show{display:grid}
.lb-mood-picker{position:fixed;bottom:88px;right:14px;z-index:91;display:none;flex-direction:column;gap:8px;padding:12px;border:1px solid var(--border);border-radius:16px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 12px 40px rgba(0,0,0,.6);min-width:180px}
.lb-mood-picker.show{display:flex}
.lb-mood-picker-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:0 2px 4px}
.lb-mood-tiles{display:flex;flex-wrap:wrap;gap:6px}
.lb-mood-tile{border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.lb-mood-tile:hover{background:rgba(255,255,255,.14)}
.lb-mood-tile.sel{background:#fff;color:#111;border-color:#fff}
.lb-mood-confirm{width:100%;border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:#111;margin-top:2px;transition:.15s}
.lb-mood-confirm:hover{background:#ddd}
.lb-current-mood{font-size:11px;opacity:.4;padding:0 2px}
.progress{position:fixed;top:0;left:0;height:2px;background:#fff;z-index:100;width:0;transition:width .25s}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:102;background:rgba(0,0,0,.85);border:1px solid var(--border);color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}
.toast.show{opacity:1}
.gridwrap.dragover::after{content:"Loslassen zum Hochladen";position:fixed;inset:52px 0 0 0;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(0,0,0,.5);border:2px dashed rgba(255,255,255,.3)}
.hidden{display:none!important}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.dropdown{width:calc(100vw - 28px)}.lb-arrow{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <span class="board-title" id="boardTitle">Marvin's Place</span>
  <button class="menubtn" id="menuBtn">☰</button>
</div>

<div class="dropdown" id="dropdown">
  <div class="dd-section">Filter</div>
  <div class="mood-chips" id="moodChips"></div>
  <div class="dd-divider"></div>
  <div class="dd-section">Aktionen</div>
  <button class="dd-btn" id="uploadBtn"><span class="icon">＋</span> Bilder / Videos hochladen</button>
  <input id="fileInput" class="hidden" type="file" accept="image/*,video/*" multiple>
  <button class="dd-btn" id="pickDeleteBtn"><span class="icon">🗑</span> Bilder löschen</button>
  <div class="dd-divider"></div>
  <div class="dd-section">Moods</div>
  <button class="dd-btn" id="assignMoodBtn"><span class="icon">🏷</span> Moods zuweisen / ändern</button>
  <button class="dd-btn" id="removeMoodBtn"><span class="icon">✕</span> Moods entfernen</button>
  <div class="dd-divider"></div>
  <div class="dd-section">Moods verwalten</div>
  <div class="dd-input-row"><input id="newMood" placeholder="Neue Mood hinzufügen"><button id="addMoodBtn">Add</button></div>
  <div class="dd-input-row"><input id="renameMood" placeholder="Aktuelle umbenennen"><button id="renameMoodBtn">Rename</button></div>
  <div class="dd-input-row"><input id="deleteMood" placeholder="Mood löschen"><button id="deleteMoodBtn">Delete</button></div>
  <div class="dd-divider"></div>
  <div class="editor-wrap" id="editorWrap">
    <div class="dd-section">Editor — <span id="editorTitle" style="text-transform:none;letter-spacing:0;opacity:.7"></span></div>
    <div class="tag-chips" id="tagChips"></div>
    <div class="dd-input-row">
      <input id="tagInput" placeholder="Tags, kommagetrennt">
      <button id="saveTagsBtn">Save</button>
    </div>
    <div class="dd-divider"></div>
  </div>
</div>

<div class="action-bar" id="actionBar">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <span class="action-bar-title" id="actionBarTitle">Mood zuweisen</span>
    <span class="ab-count" id="actionBarCount">0 ausgewählt</span>
  </div>
  <div class="action-bar-moods" id="actionBarMoods"></div>
  <div class="action-bar-actions">
    <button class="ab-act cancel" id="abCancel">Abbrechen</button>
    <button class="ab-act remove hidden" id="abRemove">Mood entfernen</button>
    <button class="ab-act confirm hidden" id="abConfirm">Zuweisen</button>
  </div>
</div>

<button class="shufflebtn" id="shuffleBtn">⇄</button>

<div class="gridwrap" id="gridWrap">
  <div class="grid" id="grid">
    <div id="bootMsg" style="padding:24px;color:#fff;opacity:.75">Lade…</div>
  </div>
</div>

<!-- Lightbox: kein lb-close Button mehr -->
<div class="lightbox" id="lightbox">
  <button class="lb-arrow prev" id="lbPrev">‹</button>
  <div class="lb-inner" id="lbInner"></div>
  <button class="lb-arrow next" id="lbNext">›</button>
</div>

<button class="lb-mood-btn" id="lbMoodBtn">🏷</button>

<div class="lb-mood-picker" id="lbMoodPicker">
  <div class="lb-mood-picker-title">Mood setzen</div>
  <div class="lb-current-mood" id="lbCurrentMood"></div>
  <div class="lb-mood-tiles" id="lbMoodTiles"></div>
  <button class="lb-mood-confirm" id="lbMoodConfirm">Bestätigen</button>
</div>

<div class="progress" id="progress"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://bnwcbxjgsmmvmtvqblrr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJud2NieGpnc21tdm10dnFibHJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjAyMDQsImV4cCI6MjA5MjE5NjIwNH0.Lo0lAnOoyFhMpq7YwO3pw2vMccSsJc8Xbk7Teck5QmE';
const BUCKET = 'moodboard';
const MAX_PX = 2400;

const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
let items = [];
let currentItems = [];
let moods = ['All','Summer','Winter','Cozy','Dark'];
let currentMood = localStorage.getItem('mb_mood') || 'All';
let editId = null;
let lbIndex = 0;
let selMode = null;
let selectedIds = new Set();
let assignMoods = new Set();
let lbPickedMoods = new Set();

const gridEl         = document.getElementById('grid');
const gridWrap       = document.getElementById('gridWrap');
const dropdown       = document.getElementById('dropdown');
const lightbox       = document.getElementById('lightbox');
const lbInner        = document.getElementById('lbInner');
const fileInput      = document.getElementById('fileInput');
const progressBar    = document.getElementById('progress');
const toastEl        = document.getElementById('toast');
const editorWrap     = document.getElementById('editorWrap');
const actionBar      = document.getElementById('actionBar');
const actionBarMoods = document.getElementById('actionBarMoods');
const actionBarCount = document.getElementById('actionBarCount');
const actionBarTitle = document.getElementById('actionBarTitle');
const lbMoodBtn      = document.getElementById('lbMoodBtn');
const lbMoodPicker   = document.getElementById('lbMoodPicker');
const lbMoodTiles    = document.getElementById('lbMoodTiles');
const lbCurrentMood  = document.getElementById('lbCurrentMood');

function toast(t){ toastEl.textContent=t; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),1600) }
function isVid(n){ return /[.](mp4|webm|mov|m4v)$/i.test(n||'') }
function prog(p){ progressBar.style.width=p+'%'; if(p>=100) setTimeout(()=>progressBar.style.width='0',600) }

function compress(file,maxPx=MAX_PX,q=0.88){
  return new Promise(res=>{
    if(isVid(file.name)){res(file);return}
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height;
      if(w<=maxPx&&h<=maxPx){res(file);return}
      const r=Math.min(maxPx/w,maxPx/h);w=Math.round(w*r);h=Math.round(h*r);
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>res(new File([b],file.name,{type:'image/jpeg'})),'image/jpeg',q);
    };
    img.src=url;
  });
}

function renderMoodChips(){
  document.getElementById('moodChips').innerHTML=moods.map(m=>
    `<button class="mchip ${m===currentMood?'active':''}" data-m="${m}">${m}</button>`
  ).join('');
  document.querySelectorAll('.mchip').forEach(b=>b.onclick=()=>{
    currentMood=b.dataset.m;localStorage.setItem('mb_mood',currentMood);
    renderMoodChips();renderGrid();
  });
}

function renderGrid(){
  let arr=items.filter(i=>currentMood==='All'||i.mood===currentMood);
  arr=[...arr].sort(()=>Math.random()-.5);
  currentItems=arr;
  gridEl.innerHTML=arr.map(it=>`
    <div class="cell" data-id="${it.id}">
      <input class="selcheck" type="checkbox" data-id="${it.id}">
      <span class="cell-mood-badge" data-id="${it.id}">${it.mood||''}</span>
      ${it.media_type==='video'
        ?`<video src="${it.media_url}" muted loop playsinline loading="lazy"></video>`
        :`<img src="${it.media_url}" loading="lazy" decoding="async" alt="">`}
    </div>`).join('');
  const obs=new IntersectionObserver(es=>es.forEach(e=>{
    const v=e.target.querySelector('video');if(!v)return;
    e.isIntersecting?v.play().catch(()=>{}):(v.pause(),v.currentTime=0);
  }),{threshold:0.3});
  gridEl.querySelectorAll('.cell').forEach(c=>{
    obs.observe(c);
    const chk=c.querySelector('.selcheck');
    c.onclick=()=>{
      if(selMode){
        chk.checked=!chk.checked;
        const id=c.dataset.id;
        chk.checked?selectedIds.add(id):selectedIds.delete(id);
        c.classList.toggle('sel-highlight',chk.checked);
        updateActionBarCount();
        if(selMode==='assign')updateDimming();
        return;
      }
      const idx=currentItems.findIndex(x=>x.id===c.dataset.id);
      openLightbox(idx);
    };
    c.oncontextmenu=e=>{e.preventDefault();if(!selMode)openEditor(c.dataset.id)};
    if(selMode==='assign'||selMode==='remove'){
      c.querySelector('.cell-mood-badge').classList.add('show');
    }
    if(selMode){
      chk.classList.add('visible');
      if(selectedIds.has(c.dataset.id)){chk.checked=true;c.classList.add('sel-highlight');}
    }
  });
}

function updateActionBarCount(){ actionBarCount.textContent=selectedIds.size+' ausgewählt'; }

function updateDimming(){
  if(assignMoods.size===0){gridEl.querySelectorAll('.cell').forEach(c=>c.classList.remove('mood-dim'));return;}
  gridEl.querySelectorAll('.cell').forEach(c=>{
    const it=items.find(x=>x.id===c.dataset.id);if(!it)return;
    c.classList.toggle('mood-dim',assignMoods.has(it.mood)&&!selectedIds.has(it.id));
  });
}

function enterSelMode(mode){
  selMode=mode;selectedIds.clear();assignMoods.clear();
  dropdown.classList.remove('show');
  actionBarTitle.textContent=mode==='assign'?'Mood zuweisen / ändern':mode==='remove'?'Moods entfernen':'Bilder löschen';
  document.getElementById('abConfirm').classList.toggle('hidden',mode!=='assign');
  document.getElementById('abRemove').classList.toggle('hidden',mode!=='remove');
  if(mode==='assign'){
    actionBarMoods.innerHTML=moods.filter(m=>m!=='All').map(m=>
      `<button class="ab-chip" data-m="${m}">${m}</button>`
    ).join('');
    actionBarMoods.querySelectorAll('.ab-chip').forEach(b=>b.onclick=()=>{
      b.classList.toggle('sel');
      b.classList.contains('sel')?assignMoods.add(b.dataset.m):assignMoods.delete(b.dataset.m);
      updateDimming();
    });
  } else { actionBarMoods.innerHTML=''; }
  actionBar.classList.add('show');
  renderGrid();updateActionBarCount();
}

function exitSelMode(){
  selMode=null;selectedIds.clear();assignMoods.clear();
  actionBar.classList.remove('show');
  renderGrid();
}

document.getElementById('abCancel').onclick=()=>{document.getElementById('deleteFloatingBtn')?.remove();exitSelMode()};
document.getElementById('abConfirm').onclick=async()=>{
  if(!selectedIds.size){toast('Nichts ausgewählt');return;}
  if(!assignMoods.size){toast('Keine Mood ausgewählt');return;}
  const mood=[...assignMoods][0];
  const ids=[...selectedIds];
  ids.forEach(id=>{const it=items.find(x=>x.id===id);if(it)it.mood=mood;});
  await Promise.all(ids.map(id=>sbUpdate(items.find(x=>x.id===id))));
  toast(`${ids.length} Bilder → ${mood}`);exitSelMode();
};
document.getElementById('abRemove').onclick=async()=>{
  if(!selectedIds.size){toast('Nichts ausgewählt');return;}
  const ids=[...selectedIds];
  ids.forEach(id=>{const it=items.find(x=>x.id===id);if(it)it.mood='All';});
  await Promise.all(ids.map(id=>sbUpdate(items.find(x=>x.id===id))));
  toast(`${ids.length} Moods entfernt`);exitSelMode();
};
document.getElementById('assignMoodBtn').onclick=()=>enterSelMode('assign');
document.getElementById('removeMoodBtn').onclick=()=>enterSelMode('remove');

// ── Lightbox ──────────────────────────────────────────────
function openLightbox(idx){
  if(idx<0||idx>=currentItems.length)return;
  lbIndex=idx;
  const it=currentItems[idx];
  lbInner.querySelectorAll('img,video').forEach(e=>e.remove());
  const el=it.media_type==='video'?document.createElement('video'):document.createElement('img');
  el.src=it.media_url;
  if(it.media_type==='video'){el.controls=true;el.autoplay=true;}
  lbInner.appendChild(el);
  lightbox.classList.add('show');
  lbMoodBtn.classList.add('show');
  closeLbMoodPicker();
  updateLbArrows();
}
function updateLbArrows(){
  document.getElementById('lbPrev').style.opacity=lbIndex>0?'1':'0.2';
  document.getElementById('lbNext').style.opacity=lbIndex<currentItems.length-1?'1':'0.2';
}
function lbNavigate(dir){
  const next=lbIndex+dir;
  if(next<0||next>=currentItems.length)return;
  lbInner.querySelectorAll('video').forEach(v=>v.pause());
  closeLbMoodPicker();
  openLightbox(next);
}
document.getElementById('lbPrev').onclick=e=>{e.stopPropagation();lbNavigate(-1)};
document.getElementById('lbNext').onclick=e=>{e.stopPropagation();lbNavigate(1)};

// Klick auf Hintergrund ODER direkt auf das Bild/Video schließt
lightbox.onclick=e=>{
  if(lbMoodPicker.classList.contains('show')){closeLbMoodPicker();return;}
  if(!e.target.closest('.lb-arrow')&&!e.target.closest('#lbMoodBtn')){
    closeLb();
  }
};

function closeLb(){
  lightbox.classList.remove('show');
  lbMoodBtn.classList.remove('show');
  closeLbMoodPicker();
  lbInner.querySelectorAll('video').forEach(v=>v.pause());
}

// ── Lightbox Mood Picker ──────────────────────────────────
function openLbMoodPicker(){
  const it=currentItems[lbIndex];if(!it)return;
  lbPickedMoods=new Set(it.mood&&it.mood!=='All'?[it.mood]:[]);
  lbCurrentMood.textContent=it.mood&&it.mood!=='All'?`Aktuell: ${it.mood}`:'Noch keine Mood';
  renderLbMoodTiles();
  lbMoodPicker.classList.add('show');
}
function renderLbMoodTiles(){
  lbMoodTiles.innerHTML=moods.filter(m=>m!=='All').map(m=>
    `<button class="lb-mood-tile ${lbPickedMoods.has(m)?'sel':''}" data-m="${m}">${m}</button>`
  ).join('');
  lbMoodTiles.querySelectorAll('.lb-mood-tile').forEach(b=>{
    b.onclick=e=>{
      e.stopPropagation();
      if(lbPickedMoods.has(b.dataset.m)){lbPickedMoods.delete(b.dataset.m);b.classList.remove('sel');}
      else{lbPickedMoods.add(b.dataset.m);b.classList.add('sel');}
    };
  });
}
function closeLbMoodPicker(){
  lbMoodPicker.classList.remove('show');
  lbPickedMoods=new Set();
}
lbMoodBtn.onclick=e=>{
  e.stopPropagation();
  lbMoodPicker.classList.contains('show')?closeLbMoodPicker():openLbMoodPicker();
};
document.getElementById('lbMoodConfirm').onclick=async e=>{
  e.stopPropagation();
  if(!lbPickedMoods.size){toast('Keine Mood ausgewählt');return;}
  const mood=[...lbPickedMoods][0];
  const it=currentItems[lbIndex];if(!it)return;
  it.mood=mood;
  const orig=items.find(x=>x.id===it.id);
  if(orig)orig.mood=mood;
  await sbUpdate(it);
  toast(`Mood → ${mood}`);
  closeLbMoodPicker();
};
document.addEventListener('click',e=>{
  if(lbMoodPicker.classList.contains('show')&&!e.target.closest('#lbMoodPicker')&&!e.target.closest('#lbMoodBtn')){
    closeLbMoodPicker();
  }
});

let touchStartX=0,touchStartY=0;
lightbox.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
lightbox.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)lbNavigate(dx<0?1:-1);
},{passive:true});

document.addEventListener('keydown',e=>{
  if(lightbox.classList.contains('show')){
    if(e.key==='ArrowLeft')lbNavigate(-1);
    else if(e.key==='ArrowRight')lbNavigate(1);
    else if(e.key==='Escape'){if(lbMoodPicker.classList.contains('show'))closeLbMoodPicker();else closeLb();}
    return;
  }
  if(e.key==='Escape'){if(selMode)exitSelMode();else dropdown.classList.remove('show');}
});

// ── Menü ──────────────────────────────────────────────────
document.getElementById('menuBtn').onclick=e=>{e.stopPropagation();dropdown.classList.toggle('show')};
document.addEventListener('click',e=>{
  if(!e.target.closest('#dropdown')&&!e.target.closest('#menuBtn'))dropdown.classList.remove('show');
});
document.getElementById('boardTitle').onclick=()=>renderGrid();
document.getElementById('shuffleBtn').onclick=()=>renderGrid();
document.getElementById('uploadBtn').onclick=()=>{fileInput.click();dropdown.classList.remove('show')};
fileInput.onchange=e=>upload(e.target.files);

// ── Delete Mode ───────────────────────────────────────────
document.getElementById('pickDeleteBtn').onclick=()=>{
  dropdown.classList.remove('show');
  selMode='delete';selectedIds.clear();
  actionBarTitle.textContent='Bilder löschen';
  document.getElementById('abConfirm').classList.add('hidden');
  document.getElementById('abRemove').classList.add('hidden');
  actionBarMoods.innerHTML='';
  actionBar.classList.add('show');
  renderGrid();updateActionBarCount();
  document.getElementById('deleteFloatingBtn')?.remove();
  const btn=document.createElement('button');
  btn.id='deleteFloatingBtn';
  btn.textContent='🗑';
  btn.style.cssText='position:fixed;left:20px;bottom:100px;z-index:60;width:46px;height:46px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,60,60,.2);color:#fff;cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.3)';
  btn.onclick=async()=>{
    if(!selectedIds.size){toast('Nichts ausgewählt');return;}
    if(!confirm(selectedIds.size+' Bilder löschen?'))return;
    await sbDeleteMany([...selectedIds]);
    items=items.filter(i=>!selectedIds.has(i.id));
    toast('Gelöscht');btn.remove();exitSelMode();
  };
  document.body.appendChild(btn);
};

// ── Editor ────────────────────────────────────────────────
function openEditor(id){
  editId=id;
  const it=items.find(x=>x.id===id);if(!it)return;
  document.getElementById('editorTitle').textContent=it.title||'Item';
  document.getElementById('tagInput').value=(it.tags||[]).join(', ');
  editorWrap.classList.add('show');renderTagChips();
  dropdown.classList.add('show');
}
function renderTagChips(){
  const it=items.find(x=>x.id===editId);
  document.getElementById('tagChips').innerHTML=moods.filter(m=>m!=='All').map(m=>
    `<button class="tchip ${it&&it.mood===m?'active':''}" data-m="${m}">${m}</button>`
  ).join('');
  document.querySelectorAll('.tchip').forEach(b=>b.onclick=()=>{
    const it=items.find(x=>x.id===editId);if(!it)return;
    it.mood=b.dataset.m;sbUpdate(it);renderGrid();renderTagChips();
  });
}
document.getElementById('saveTagsBtn').onclick=()=>{
  const it=items.find(x=>x.id===editId);if(!it)return;
  it.tags=document.getElementById('tagInput').value.split(',').map(s=>s.trim()).filter(Boolean);
  sbUpdate(it);renderGrid();toast('Tags gespeichert');
};

// ── Upload ────────────────────────────────────────────────
async function upload(files){
  const arr=Array.from(files);
  for(let i=0;i<arr.length;i++){
    prog(Math.round(i/arr.length*90));toast(`Upload ${i+1}/${arr.length}…`);
    const f=arr[i];const cf=await compress(f);
    const ext=cf.name.split('.').pop().toLowerCase();
    const path=`${Date.now().toString(36)}${Math.random().toString(36).slice(2,6)}.${ext}`;
    const {error:e1}=await sb.storage.from(BUCKET).upload(path,cf,{upsert:false,contentType:cf.type});
    if(e1){toast('Upload-Fehler: '+e1.message);continue}
    const {data:pub}=sb.storage.from(BUCKET).getPublicUrl(path);
    const item={title:f.name.replace(/[.][^.]+$/,''),mood:currentMood==='All'?(moods[1]||'Summer'):currentMood,tags:[],media_url:pub.publicUrl,media_type:isVid(f.name)?'video':'image',favorite:false};
    const {data:ins,error:e2}=await sb.from('moodboard_items').insert(item).select().single();
    if(e2){toast('DB-Fehler: '+e2.message);continue}
    items.unshift({...item,id:ins.id});renderGrid();
  }
  prog(100);toast('Fertig ✓');fileInput.value='';
}

// ── Supabase ──────────────────────────────────────────────
async function loadItems(){
  const {data,error}=await sb.from('moodboard_items').select('*').order('created_at',{ascending:false});
  if(error){toast('Ladefehler: '+error.message);gridEl.innerHTML='<div style="padding:24px;color:#fff">Kein Datenzugriff</div>';return}
  items=data||[];renderGrid();document.getElementById('bootMsg')?.remove();
}
async function sbUpdate(item){
  if(!item)return;
  await sb.from('moodboard_items').update({title:item.title||'',mood:item.mood,tags:item.tags||[],media_url:item.media_url,media_type:item.media_type,favorite:false}).eq('id',item.id);
}
async function sbDeleteMany(ids){
  if(!ids.length)return;
  await sb.from('moodboard_items').delete().in('id',ids);
}

// ── Mood Verwaltung ───────────────────────────────────────
document.getElementById('addMoodBtn').onclick=()=>{
  const v=document.getElementById('newMood').value.trim();
  if(!v||moods.includes(v))return;moods.push(v);currentMood=v;
  document.getElementById('newMood').value='';renderMoodChips();renderGrid();toast('Mood hinzugefügt');
};
document.getElementById('renameMoodBtn').onclick=()=>{
  const v=document.getElementById('renameMood').value.trim();
  if(!v||currentMood==='All'||moods.includes(v))return;
  const old=currentMood;moods=moods.map(m=>m===old?v:m);
  items=items.map(i=>({...i,mood:i.mood===old?v:i.mood}));
  currentMood=v;document.getElementById('renameMood').value='';
  items.forEach(sbUpdate);renderMoodChips();renderGrid();toast('Mood umbenannt');
};
document.getElementById('deleteMoodBtn').onclick=()=>{
  const v=document.getElementById('deleteMood').value.trim();
  if(!v||v==='All'||!moods.includes(v))return;
  moods=moods.filter(m=>m!==v);
  items=items.map(i=>({...i,mood:i.mood===v?'All':i.mood}));
  if(currentMood===v)currentMood='All';
  document.getElementById('deleteMood').value='';
  items.forEach(sbUpdate);renderMoodChips();renderGrid();toast('Mood gelöscht');
};

gridWrap.addEventListener('dragover',e=>{e.preventDefault();gridWrap.classList.add('dragover')});
gridWrap.addEventListener('dragleave',()=>gridWrap.classList.remove('dragover'));
gridWrap.addEventListener('drop',e=>{e.preventDefault();gridWrap.classList.remove('dragover');upload(e.dataTransfer.files)});

renderMoodChips();
loadItems();
</script>
