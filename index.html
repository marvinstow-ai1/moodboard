<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moodboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505; --panel:rgba(0,0,0,.78); --panel2:rgba(255,255,255,.08); --text:#fff; --muted:rgba(255,255,255,.72); --border:rgba(255,255,255,.16); --chip:rgba(0,0,0,.90);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
  button,input{font:inherit}
  .app{position:fixed;inset:0;display:flex;flex-direction:column}
  .toolbar{position:fixed;top:18px;right:18px;z-index:30;display:flex;gap:10px;align-items:center}
  .chip,.iconbtn,.dropbtn{border:1px solid var(--border);background:var(--chip);color:var(--text);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 12px 30px rgba(0,0,0,.26);cursor:pointer}
  .chip{border-radius:999px;padding:12px 18px;font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
  .iconbtn,.dropbtn{width:48px;height:48px;border-radius:999px;display:grid;place-items:center;font-size:18px}

  .titlewrap{position:fixed;left:0;right:0;top:0;z-index:24;display:flex;justify-content:center;align-items:center;pointer-events:none;padding:14px 72px 0}
  .title{margin:0;font-size:18px;line-height:1;font-weight:700;letter-spacing:.035em;cursor:text;pointer-events:auto;background:transparent;border:0;color:var(--text);padding:0;outline:none;text-align:center;width:220px;max-width:58vw;opacity:.88}
  .title::placeholder{color:rgba(255,255,255,.32)}
  .badge{position:fixed;left:0;right:0;top:0;z-index:25;display:flex;justify-content:center;align-items:center;pointer-events:none;padding:14px 72px 0}
  .dropzone{position:fixed;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;border:1px dashed transparent;pointer-events:none;opacity:0;transition:.2s}
  .dropzone.show{opacity:1;pointer-events:auto;background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.28)}
  .dropzone .hint{background:rgba(0,0,0,.72);padding:14px 18px;border-radius:14px;border:1px solid var(--border)}
  .grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:1fr;gap:2px;padding:0;align-content:start}
  .cell{position:relative;overflow:hidden;background:#111;border-right:1px solid #111;border-bottom:1px solid #111;aspect-ratio:1/1}
  .cell img,.cell video{width:100%;height:100%;object-fit:contain;display:block;background:#000}
  .cell .empty{display:none}
  .taglist{position:fixed;left:50%;top:52%;transform:translate(-50%,-50%);z-index:60;width:min(520px,calc(100vw - 36px));background:rgba(10,10,10,.95);border:1px solid var(--border);border-radius:18px;padding:16px;display:none;box-shadow:0 22px 70px rgba(0,0,0,.55)}
  .taglist.show{display:block}
  .taglist h4{margin:0 0 10px;font-size:14px}
  .tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .tagchip{border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);border-radius:999px;padding:8px 10px;font-size:12px;cursor:pointer}
  .tagchip.active{background:#fff;color:#111;border-color:#fff}
  .tagform{display:flex;gap:8px;flex-wrap:wrap}
  .tagform input{flex:1;min-width:0;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);outline:none}
  .meta{display:none}
  .settings{position:fixed;top:80px;right:18px;z-index:40;width:min(360px,calc(100vw - 36px));background:rgba(12,12,12,.88);border:1px solid var(--border);border-radius:18px;padding:14px;display:none;box-shadow:0 20px 60px rgba(0,0,0,.4);backdrop-filter:blur(16px)}
  .settings.show{display:block}
  .settings h3{margin:0 0 12px;font-size:14px;letter-spacing:.04em;text-transform:uppercase}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .row input[type=text], .row textarea{flex:1;min-width:0;background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px;outline:none}
  .row textarea{min-height:72px;resize:vertical}
  .mini{padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:var(--text);cursor:pointer}
  .mini:hover,.chip:hover,.iconbtn:hover,.dropbtn:hover{filter:brightness(1.08)}
  .moodbar{position:fixed;left:18px;top:18px;z-index:22;display:flex;gap:8px;max-width:calc(100vw - 190px);overflow:auto;padding-bottom:4px;transition:opacity .2s, transform .2s}
  .mood{border:1px solid var(--border);background:rgba(0,0,0,.72);color:var(--text);border-radius:999px;padding:10px 14px;cursor:pointer;white-space:nowrap;flex:0 0 auto}
  .mood.active{background:#fff;color:#111;border-color:#fff}
  .hidden{display:none !important}
  .small{font-size:12px;color:var(--muted)}

  .floatshuffle{position:fixed;right:18px;bottom:18px;z-index:35;width:46px;height:46px;border-radius:999px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;display:grid;place-items:center;font-size:18px;backdrop-filter:blur(18px) saturate(120%);-webkit-backdrop-filter:blur(18px) saturate(120%);box-shadow:0 10px 22px rgba(0,0,0,.16);transition:.16s ease}
  .floatshuffle:hover{transform:translateY(-1px);background:rgba(255,255,255,.09)}
  .floatshuffle:active{transform:translateY(0) scale(.98)}
  .toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(0,0,0,.78);border:1px solid var(--border);color:#fff;padding:10px 14px;border-radius:999px;font-size:12px;z-index:50;opacity:0;pointer-events:none;transition:.2s}
  .toast.show{opacity:1}
  .menu{position:absolute;right:0;top:58px;background:rgba(12,12,12,.92);border:1px solid var(--border);border-radius:14px;padding:10px;min-width:220px;display:none;box-shadow:0 16px 45px rgba(0,0,0,.4);backdrop-filter:blur(16px)}
  .menu.show{display:block}
  .menu button{width:100%;background:transparent;border:0;color:var(--text);text-align:left;padding:10px 10px;border-radius:10px;cursor:pointer}
  .menu button:hover{background:rgba(255,255,255,.08)}
  .menu .subhead{padding:10px 10px 6px;font-size:11px;opacity:.55;text-transform:uppercase;letter-spacing:.08em}
  .menu .divider{height:1px;background:rgba(255,255,255,.08);margin:8px 0}
  .file{display:none}
  @media (max-width:900px){ .grid{grid-template-columns:repeat(2,1fr)} .moodbar{max-width:calc(100vw - 120px)} }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="titlewrap"><input class="title" id="boardTitle" value="Moodboard" aria-label="Moodboard Titel"></div>
  <div class="moodbar" id="moodbar"></div>
  <div class="toolbar">
    <button class="iconbtn" id="menuBtn" title="Menü">⋯</button>
    <div class="menu" id="menuPanel"></div>
    <input class="file" id="fileInput" type="file" accept="image/*,video/*" multiple>
  </div>

  <div class="settings" id="settingsPanel">
    <h3>Settings</h3>
    <div class="row"><input type="text" id="newMood" placeholder="Neue Mood hinzufügen..."><button class="mini" id="addMoodBtn">Add</button></div>
    <div class="row"><input type="text" id="renameMood" placeholder="Aktuelle Mood umbenennen..."><button class="mini" id="renameMoodBtn">Rename</button></div>
    <div class="row"><input type="text" id="deleteMood" placeholder="Mood löschen..."><button class="mini" id="deleteMoodBtn">Delete</button></div>
    <div class="row"><button class="mini" id="clearBtn">Alle Bilder löschen</button><button class="mini" id="exportBtn">Export JSON</button></div>
    <div class="row"><button class="mini" id="hideFavBtn">Favoriten ausblenden: Aus</button></div>
    <div class="small">Tipp: Bilder per Klick auf ＋ oder per Drag & Drop hinzufügen.</div>
  </div>

  <div class="dropzone" id="dropzone"><div class="hint">Bilder/Videos hier ablegen</div></div>
  <div class="grid" id="grid"></div>
  <button class="floatshuffle" id="floatShuffle" title="Shuffle">⤢</button>
  <div class="taglist" id="tagEditor">
    <h4>Tags</h4>
    <div class="small" id="tagHint" style="margin-bottom:10px"></div>
    <div class="tagrow" id="tagButtons"></div>
    <div class="tagform">
      <input id="tagInput" placeholder="Tags durch Komma getrennt...">
      <button class="mini" id="saveTagsBtn">Save</button>
      <button class="mini" id="closeTagsBtn">Close</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>
<script>
const LS = {
  items:'moodboard_items_v1', moods:'moodboard_moods_v1', current:'moodboard_current_v1', theme:'moodboard_theme_v1'
};
const defaultMoods = ['All','Summer','Winter','Cozy','Dark'];
let items = load(LS.items, []);
let moods = load(LS.moods, defaultMoods);
if (!moods.includes('All')) moods.unshift('All');
let currentMood = localStorage.getItem(LS.current) || 'All';
let boardTitle = localStorage.getItem('moodboard_title_v1') || 'Moodboard';
let shuffleState = false;
let hideFavs = JSON.parse(localStorage.getItem('moodboard_hidefav_v1') || 'false');
let menuOpen = false;

const grid = document.getElementById('grid');
const moodbar = document.getElementById('moodbar');
const moodBtn = document.getElementById('moodBtn');
const settingsPanel = document.getElementById('settingsPanel');
const toast = document.getElementById('toast');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

function load(key, fallback){ try { const v = JSON.parse(localStorage.getItem(key)); return v ?? fallback; } catch { return fallback; } }
function save(){ localStorage.setItem(LS.items, JSON.stringify(items)); localStorage.setItem(LS.moods, JSON.stringify(moods)); localStorage.setItem(LS.current, currentMood); localStorage.setItem('moodboard_title_v1', boardTitle); localStorage.setItem('moodboard_hidefav_v1', JSON.stringify(hideFavs)); }
function showToast(msg){ toast.textContent = msg; toast.classList.add('show'); clearTimeout(showToast.t); showToast.t = setTimeout(()=>toast.classList.remove('show'), 1400); }
function uid(){ return Math.random().toString(36).slice(2,10); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function isVideo(name){ return /\.(mp4|webm|mov|m4v)$/i.test(name || ''); }
function visibleItems(){ let arr = items.filter(i => (!hideFavs || !i.favorite) && (currentMood === 'All' || (i.moods || []).includes(currentMood))); if (shuffleState) arr = [...arr].sort(() => Math.random() - 0.5); return arr; }

function renderMoodbar(){
  moodbar.innerHTML = moods.map(m => `<button class='mood ${m===currentMood?'active':''}' data-mood='${escapeHtml(m)}'>${escapeHtml(m)}</button>`).join('');
  moodbar.querySelectorAll('.mood').forEach(btn => btn.onclick = () => { currentMood = btn.dataset.mood; shuffleState = false; save(); document.getElementById('boardTitle').addEventListener('input', e => { boardTitle = e.target.value.trim() || 'Moodboard'; save(); });
document.getElementById('hideFavBtn').textContent = `Favoriten ausblenden: ${hideFavs ? 'An' : 'Aus'}`;
render(); });
  moodBtn.innerHTML = `${escapeHtml(currentMood)} ▾`;
}

let editIndex = null;
function renderGrid(){
  const arr = visibleItems();
  const total = Math.max(8, arr.length || 8);
  const html = [];
  for (let i=0;i<total;i++){
    const it = arr[i];
    if (!it) {
      html.push(`<div class='cell'><div class='empty'>Upload</div></div>`);
      continue;
    }
    const fav = it.favorite ? `<div style='position:absolute;left:8px;top:8px;z-index:3;font-size:12px;opacity:.9'>★</div>` : '';
    html.push(`<div class='cell' data-id='${it.id}'>${fav}${it.type==='video' ? `<video src='${it.src}' muted loop playsinline></video>` : `<img src='${it.src}' alt='${escapeHtml(it.name || '')}'>`}</div>`);
  }
  grid.innerHTML = html.join('');
  grid.querySelectorAll('.cell[data-id]').forEach(c => { c.addEventListener('click', () => openTagEditor(c.dataset.id)); c.addEventListener('dblclick', () => toggleFavorite(c.dataset.id)); });
  if (!arr.length) grid.innerHTML = '';
}

function toggleFavorite(id){ const item=items.find(x=>x.id===id); if(!item) return; item.favorite = !item.favorite; save(); render(); }

function openTagEditor(id){
  const box = document.getElementById('tagEditor');
  editIndex = id;
  const item = items.find(x => x.id === id);
  if (!item) return;
  box.classList.add('show');
  document.getElementById('tagInput').value = (item.moods || []).join(', ');
  document.getElementById('tagHint').textContent = item.name || 'Bild';
}

function render(){ document.getElementById('boardTitle').value = boardTitle; renderMoodbar(); renderMenu(); renderGrid(); document.getElementById('meta').textContent = ''; renderTagButtons(); }

function renderTagButtons(){
  document.getElementById('tagButtons').innerHTML = moods.filter(m => m !== 'All').map(m => `<button class='tagchip ${currentMood===m?'active':''}' data-mood='${escapeHtml(m)}'>${escapeHtml(m)}</button>`).join('');
  document.querySelectorAll('#tagButtons .tagchip').forEach(b => b.onclick = () => {
    const item = items.find(x => x.id === editIndex);
    if (!item) return;
    const tags = (item.moods || []).filter(Boolean);
    const v = b.dataset.mood;
    if (tags.includes(v)) item.moods = tags.filter(t => t !== v); else item.moods = [...tags, v];
    save(); render();
  });
}

const saveTagsBtn = document.getElementById('saveTagsBtn');
if (saveTagsBtn) saveTagsBtn.onclick = () => {
  const item = items.find(x => x.id === editIndex);
  if (!item) return;
  item.moods = document.getElementById('tagInput').value.split(',').map(s => s.trim()).filter(Boolean);
  save(); render();
};
const closeTagsBtn = document.getElementById('closeTagsBtn');
if (closeTagsBtn) closeTagsBtn.onclick = () => document.getElementById('tagEditor').classList.remove('show');
window.addEventListener('scroll', () => { const y = window.scrollY; document.querySelector('.moodbar').style.opacity = y > 80 ? '0' : '1'; document.querySelector('.moodbar').style.pointerEvents = y > 80 ? 'none' : 'auto'; document.querySelector('.titlewrap').style.opacity = y > 80 ? '0' : '1'; document.querySelector('.titlewrap').style.pointerEvents = y > 80 ? 'none' : 'auto'; document.querySelector('.toolbar').style.opacity = y > 80 ? '0' : '1'; document.querySelector('.toolbar').style.pointerEvents = y > 80 ? 'none' : 'auto'; }, {passive:true});

document.addEventListener('click', e => { const menu=document.getElementById('menuPanel'); if(!e.target.closest('#menuBtn') && !e.target.closest('#menuPanel')) menu.classList.remove('show'); const box=document.getElementById('tagEditor'); if (box.classList.contains('show') && !e.target.closest('#tagEditor') && !e.target.closest('.cell')) box.classList.remove('show'); });

function addFiles(files){
  const list = [...files];
  let pending = list.length;
  if (!pending) return;
  list.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      items.unshift({ id: uid(), type: isVideo(file.name) ? 'video' : 'image', name: file.name, src: e.target.result, moods: [currentMood === 'All' ? moods[1] || 'Summer' : currentMood] });
      if (--pending === 0) { save(); render(); showToast('Importiert'); }
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('uploadBtn').onclick = () => fileInput.click();
fileInput.onchange = e => addFiles(e.target.files);

function closeMenu(){ document.getElementById('menuPanel').classList.remove('show'); }
function doShuffle(){ shuffleState = !shuffleState; window.scrollTo({top:0, behavior:'smooth'}); render(); showToast(shuffleState ? 'Shuffle an' : 'Shuffle aus'); }
document.getElementById('shuffleBtn').onclick = doShuffle;
document.getElementById('floatShuffle').onclick = doShuffle;

document.getElementById('settingsBtn').onclick = () => settingsPanel.classList.toggle('show');
document.getElementById('moodBtn').onclick = () => moodbar.classList.toggle('hidden');

document.getElementById('addMoodBtn').onclick = () => {
  const el = document.getElementById('newMood');
  const v = el.value.trim();
  if (!v || moods.includes(v)) return;
  moods.push(v); currentMood = v; el.value = ''; save(); render(); showToast('Mood hinzugefügt');
};
document.getElementById('renameMoodBtn').onclick = () => {
  const el = document.getElementById('renameMood');
  const from = currentMood;
  const to = el.value.trim();
  if (!to || from === 'All' || from === to || moods.includes(to)) return;
  moods = moods.map(m => m === from ? to : m);
  items = items.map(i => ({...i, moods: (i.moods || []).map(m => m === from ? to : m)}));
  currentMood = to; el.value=''; save(); render(); showToast('Mood umbenannt');
};
document.getElementById('deleteMoodBtn').onclick = () => {
  const el = document.getElementById('deleteMood');
  const name = el.value.trim();
  if (!name || name === 'All' || !moods.includes(name)) return;
  moods = moods.filter(m => m !== name);
  items = items.map(i => ({...i, moods: (i.moods || []).filter(m => m !== name)}));
  if (currentMood === name) currentMood = 'All';
  el.value=''; save(); render(); showToast('Mood gelöscht');
};
document.getElementById('clearBtn').onclick = () => { if (confirm('Alle Bilder wirklich löschen?')) { items = []; save(); render(); } };
const hideFavBtn = document.getElementById('hideFavBtn');
if (hideFavBtn) hideFavBtn.onclick = () => { hideFavs = !hideFavs; document.getElementById('hideFavBtn').textContent = `Favoriten ausblenden: ${hideFavs ? 'An' : 'Aus'}`; render(); };
document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([JSON.stringify({items, moods}, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'moodboard-export.json'; a.click();
};

window.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('show'); });
window.addEventListener('dragleave', e => { if (e.clientX === 0 && e.clientY === 0) dropzone.classList.remove('show'); });
window.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('show'); addFiles(e.dataTransfer.files); });

document.addEventListener('click', e => {
  if (!e.target.closest('.settings') && !e.target.closest('#settingsBtn')) settingsPanel.classList.remove('show');
});

render();
</script>
</body>
</html>
