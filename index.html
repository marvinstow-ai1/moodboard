<style>
:root{--bg:#050505;--text:#fff;--border:rgba(255,255,255,.12);--panel:rgba(12,12,12,.96)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overflow:hidden}
button,input{font:inherit}
.topbar{position:fixed;top:0;left:0;right:0;z-index:30;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);gap:16px}
.topbar-left{display:flex;align-items:center;gap:20px}
.board-title{background:transparent;border:0;color:#fff;font-size:16px;font-weight:700;letter-spacing:.04em;cursor:pointer;opacity:.9;user-select:none;padding:4px 0}
.board-title:hover{opacity:1}
.nav-link{background:transparent;border:0;color:#fff;font-size:14px;font-weight:500;cursor:pointer;opacity:.4;user-select:none;padding:4px 0;transition:.15s;letter-spacing:.02em}
.nav-link:hover{opacity:.7}
.nav-link.active{opacity:1}
.menubtn{width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(16px);transition:.15s;flex-shrink:0}
.menubtn:hover{background:rgba(255,255,255,.13)}
.dropdown{position:fixed;top:58px;right:14px;z-index:40;width:290px;display:none;padding:10px;border:1px solid var(--border);border-radius:18px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6);max-height:calc(100vh - 80px);overflow-y:auto}
.dropdown.show{display:block}
.sheet-overlay{position:fixed;inset:0;z-index:38;background:rgba(0,0,0,.5);display:none;backdrop-filter:blur(4px)}
.sheet-overlay.show{display:block}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:39;background:var(--panel);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:16px 16px 40px;max-height:85vh;overflow-y:auto;display:none;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
.bottom-sheet.show{display:block;transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);margin:0 auto 16px}
.dd-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:8px 8px 4px}
.dd-divider{height:1px;background:rgba(255,255,255,.07);margin:6px 0}
.dd-btn{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px}
.dd-btn:hover{background:rgba(255,255,255,.08)}
.dd-btn .icon{width:18px;text-align:center;opacity:.6;font-size:15px}
.dd-input-row{display:flex;gap:6px;padding:4px 2px 6px}
.dd-input-row input{flex:1;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:10px;outline:none;font-size:14px}
.dd-input-row button{border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;white-space:nowrap}
.mgmt-section{display:none;padding:10px;background:rgba(255,255,255,.03);border-radius:12px;margin:5px 0}
.mgmt-section.show{display:block}
.mood-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.mchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.mchip.active{background:#fff;color:#111;border-color:#fff}
.tag-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.tchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.tchip.active{background:#fff;color:#111;border-color:#fff}
.editor-wrap{display:none}
.editor-wrap.show{display:block}
.shufflebtn{position:fixed;bottom:20px;right:20px;z-index:30;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:19px;display:grid;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.3);transition:.15s}
.shufflebtn:hover{background:rgba(255,255,255,.13)}
.gridwrap{position:fixed;inset:52px 0 0 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:2px;padding:2px}
.cell{position:relative;overflow:hidden;background:#111;aspect-ratio:9/16;cursor:pointer;contain:strict}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.cell:hover img,.cell:hover video{transform:scale(1.04)}
.cell.sel-highlight{outline:2px solid #fff;outline-offset:-2px}
.cell.mood-dim{opacity:.35;transition:opacity .2s}
.selcheck{position:absolute;top:8px;left:8px;z-index:2;width:20px;height:20px;accent-color:#fff;opacity:0;pointer-events:none;cursor:pointer}
.selcheck.visible{opacity:1;pointer-events:auto}
.cell-mood-badge{position:absolute;bottom:6px;left:6px;z-index:2;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:999px;font-size:10px;color:#fff;padding:2px 8px;pointer-events:none;display:none}
.cell-mood-badge.show{display:block}
.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:14px 16px 32px;background:linear-gradient(to top,rgba(0,0,0,.97) 70%,transparent);display:none;flex-direction:column;gap:10px}
.action-bar.show{display:flex}
.action-bar-title{font-size:11px;opacity:.5;text-transform:uppercase;letter-spacing:.08em}
.action-bar-moods{display:flex;flex-wrap:wrap;gap:6px}
.ab-chip{border:1px solid var(--border);background:rgba(255,255,255,.07);color:#fff;border-radius:999px;padding:8px 16px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.ab-chip:hover{background:rgba(255,255,255,.15)}
.ab-chip.sel{background:#fff;color:#111;border-color:#fff}
.action-bar-actions{display:flex;gap:8px}
.ab-act{flex:1;border:1px solid var(--border);border-radius:12px;padding:11px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
.ab-act.confirm{background:#fff;color:#111;border-color:#fff}
.ab-act.confirm:hover{background:#ddd}
.ab-act.cancel{background:rgba(255,255,255,.06);color:#fff}
.ab-act.cancel:hover{background:rgba(255,255,255,.12)}
.ab-act.remove{background:rgba(255,60,60,.15);color:#ff6b6b;border-color:rgba(255,60,60,.3)}
.ab-act.remove:hover{background:rgba(255,60,60,.25)}
.ab-count{font-size:12px;opacity:.5}
.lightbox{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);touch-action:pan-y;cursor:pointer}
.lightbox.show{display:flex}
.lb-inner{position:relative;max-width:92vw;max-height:92vh;user-select:none;cursor:default}
.lb-inner img,.lb-inner video{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:10px;display:block}
.lb-inner video{pointer-events:auto}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:81;width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;font-size:18px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(10px);transition:.15s}
.lb-arrow:hover{background:rgba(255,255,255,.18)}
.lb-arrow.prev{left:14px}
.lb-arrow.next{right:14px}
.lb-mood-btn,.lb-mute-btn{position:fixed;bottom:28px;z-index:90;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:18px;display:none;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.4);transition:.15s}
.lb-mood-btn{right:20px}
.lb-mute-btn{right:76px}
.lb-mood-btn:hover,.lb-mute-btn:hover{background:rgba(255,255,255,.18)}
.lb-mood-btn.show,.lb-mute-btn.show{display:grid}
.lb-mood-picker{position:fixed;bottom:88px;right:14px;z-index:91;display:none;flex-direction:column;gap:8px;padding:12px;border:1px solid var(--border);border-radius:16px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 12px 40px rgba(0,0,0,.6);min-width:180px}
.lb-mood-picker.show{display:flex}
.lb-mood-picker-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:0 2px 4px}
.lb-mood-tiles{display:flex;flex-wrap:wrap;gap:6px}
.lb-mood-tile{border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.lb-mood-tile:hover{background:rgba(255,255,255,.14)}
.lb-mood-tile.sel{background:#fff;color:#111;border-color:#fff}
.lb-mood-confirm{width:100%;border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:#111;margin-top:2px;transition:.15s}
.lb-mood-confirm:hover{background:#ddd}
.lb-current-mood{font-size:11px;opacity:.4;padding:0 2px}
.progress{position:fixed;top:0;left:0;height:2px;background:#fff;z-index:100;width:0;transition:width .25s}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:102;background:rgba(0,0,0,.85);border:1px solid var(--border);color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}
.toast.show{opacity:1}
.gridwrap.dragover::after{content:"Loslassen zum Hochladen";position:fixed;inset:52px 0 0 0;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(0,0,0,.5);border:2px dashed rgba(255,255,255,.3)}
.hidden{display:none!important}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.lb-arrow{display:none}.dropdown{display:none!important}}
@media(min-width:601px){.bottom-sheet,.sheet-overlay{display:none!important}}

    S().currentMood=v; g('oldMoodName').value=''; g('newMoodName').value=''; g('renameArea').style.display='none';

    g('deleteMood').value=''; renderMoodChips(); renderGrid();
  };

function toast(t){ toastEl.textContent=t; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),1600); }
function isVid(n){ return /\.(mp4|webm|mov|m4v)$/i.test(n||''); }
function prog(p){ progressBar.style.width=p+'%'; if(p>=100) setTimeout(()=>progressBar.style.width='0',600); }
function compress(file, maxPx=MAX_PX, q=0.88){
  return new Promise(res=>{
    if(isVid(file.name)){ res(file); return; }
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      if(w<=maxPx && h<=maxPx){ res(file); return; }
      const r=Math.min(maxPx/w, maxPx/h); w=Math.round(w*r); h=Math.round(h*r);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>res(new File([b],file.name,{type:'image/jpeg'})),'image/jpeg',q);
    };
    img.src=url;
  });
}

function renderGrid(){
  const s = S();
  // Filter: if activeMoods has entries, show items matching ANY selected mood (OR)
  let arr = activeMoods.size > 0
    ? s.items.filter(i => activeMoods.has(i.mood))
    : s.items;
  arr = [...arr].sort(() => Math.random()-.5);
  s.currentItems = arr;
  if(_observer){ _observer.disconnect(); _observer=null; }
  gridEl.innerHTML = arr.map(it => `
    <div class="cell" data-id="${it.id}">
      <input class="selcheck" type="checkbox" data-id="${it.id}">
      <span class="cell-mood-badge">${it.mood||''}</span>
      ${it.media_type==='video'
        ? `<video src="${it.media_url}" muted loop playsinline preload="none"></video>`
        : `<img src="${it.media_url}" loading="lazy" decoding="async" alt="">`}
    </div>`).join('');

  _observer = new IntersectionObserver(entries => entries.forEach(e => {
    const v = e.target.querySelector('video'); if(!v) return;
    if(e.isIntersecting){ v.muted=true; v.play().catch(()=>{}); }
    else { v.pause(); v.currentTime=0; }
  }), { threshold:0.25, rootMargin:'100px' });

  applyGridCols(gridCols);
  gridEl.querySelectorAll('.cell').forEach(c => {
    _observer.observe(c);
    const chk = c.querySelector('.selcheck');
    c.onclick = () => {
      if(selMode){ chk.checked = !chk.checked; const id = c.dataset.id; chk.checked ? selectedIds.add(id) : selectedIds.delete(id); c.classList.toggle('sel-highlight', chk.checked); updateActionBarCount(); if(selMode==='assign') updateDimming(); return; }
      const idx = S().currentItems.findIndex(x => x.id===c.dataset.id); openLightbox(idx);
    };
    c.oncontextmenu = e => { e.preventDefault(); if(!selMode) openEditor(c.dataset.id); };
    if(selMode==='assign'||selMode==='remove') c.querySelector('.cell-mood-badge').classList.add('show');
    if(selMode){ chk.classList.add('visible'); if(selectedIds.has(c.dataset.id)){ chk.checked=true; c.classList.add('sel-highlight'); } }
  });
}

    const it = S().items.find(x=>x.id===c.dataset.id); if(!it) return;
    c.classList.toggle('mood-dim', assignMoods.has(it.mood) && !selectedIds.has(it.id));

}

  const it = S().currentItems[idx];
  lbInner.querySelectorAll('img,video').forEach(e=>e.remove());
  lbMuteBtn.classList.remove('show');
  if(it.media_type==='video'){
    const v = document.createElement('video');
    v.src=it.media_url; v.controls=true; v.autoplay=true; v.muted=false; v.loop=true;
    lbInner.appendChild(v);
    lbIsMuted=false; lbMuteBtn.innerHTML='🔊'; lbMuteBtn.classList.add('show');
  } else {
    const img = document.createElement('img');
    img.src=it.media_url; img.style.pointerEvents='none';
    lbInner.appendChild(img);
  }
  lightbox.classList.add('show'); lbMoodBtn.classList.add('show');
  closeLbMoodPicker(); updateLbArrows();
}
function updateLbArrows(){
  $('lbPrev').style.opacity = lbIndex>0 ? '1' : '0.2';
  $('lbNext').style.opacity = lbIndex<S().currentItems.length-1 ? '1' : '0.2';
}
function lbNavigate(dir){
  const next=lbIndex+dir;
  if(next<0 || next>=S().currentItems.length) return;
  lbInner.querySelectorAll('video').forEach(v=>v.pause());
  closeLbMoodPicker(); openLightbox(next);
}
$('lbPrev').onclick = e => { e.stopPropagation(); lbNavigate(-1); };
$('lbNext').onclick = e => { e.stopPropagation(); lbNavigate(1); };
lightbox.onclick = e => {
  if(lbMoodPicker.classList.contains('show')){ closeLbMoodPicker(); return; }
  if(!e.target.closest('.lb-arrow') && !e.target.closest('#lbMoodBtn') && !e.target.closest('#lbMuteBtn') && !e.target.closest('video')) closeLb();
};
function closeLb(){
  lightbox.classList.remove('show'); lbMoodBtn.classList.remove('show'); lbMuteBtn.classList.remove('show');
  closeLbMoodPicker(); lbInner.querySelectorAll('video').forEach(v=>v.pause());
}
lbMuteBtn.onclick = e => {
  e.stopPropagation();
  const v = lbInner.querySelector('video'); if(!v) return;
  lbIsMuted = !lbIsMuted; v.muted = lbIsMuted;
  lbMuteBtn.innerHTML = lbIsMuted ? '🔇' : '🔊';
};

let txS=0, tyS=0;
lightbox.addEventListener('touchstart', e=>{ txS=e.touches[0].clientX; tyS=e.touches[0].clientY; }, {passive:true});
lightbox.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-txS, dy=e.changedTouches[0].clientY-tyS;
  if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>40) lbNavigate(dx<0?1:-1);
}, {passive:true});

function openLbMoodPicker(){
  const it=S().currentItems[lbIndex]; if(!it) return;
  lbPickedMoods = new Set(it.mood && it.mood!=='All' ? [it.mood] : []);
  lbCurrentMood.textContent = it.mood && it.mood!=='All' ? 'Aktuell: '+it.mood : 'Noch keine Mood';
  renderLbMoodTiles(); lbMoodPicker.classList.add('show');
}
function renderLbMoodTiles(){
  lbMoodTiles.innerHTML = S().moods.filter(m=>m!=='All').map(m =>
    `<button class="lb-mood-tile ${lbPickedMoods.has(m)?'sel':''}" data-m="${m}">${m}</button>`).join('');
  lbMoodTiles.querySelectorAll('.lb-mood-tile').forEach(b => b.onclick = e => {
    e.stopPropagation();
    lbPickedMoods.has(b.dataset.m) ? lbPickedMoods.delete(b.dataset.m) : lbPickedMoods.add(b.dataset.m);
    b.classList.toggle('sel', lbPickedMoods.has(b.dataset.m));
  });
}
function closeLbMoodPicker(){ lbMoodPicker.classList.remove('show'); lbPickedMoods=new Set(); }
lbMoodBtn.onclick = e => { e.stopPropagation(); lbMoodPicker.classList.contains('show') ? closeLbMoodPicker() : openLbMoodPicker(); };
$('lbMoodConfirm').onclick = async e => {
  e.stopPropagation();
  if(!lbPickedMoods.size){ toast('Keine Mood ausgewählt'); return; }
  const mood=[...lbPickedMoods][0];
  const it=S().currentItems[lbIndex]; if(!it) return;
  it.mood=mood;
  const orig=S().items.find(x=>x.id===it.id); if(orig) orig.mood=mood;
  await sbUpdate(it); toast('Mood → '+mood); closeLbMoodPicker();
};
document.addEventListener('click', e => {

});

document.addEventListener('keydown', e => {
  if(lightbox.classList.contains('show')){
    if(e.key==='ArrowLeft') lbNavigate(-1);
    else if(e.key==='ArrowRight') lbNavigate(1);
    else if(e.key==='Escape'){ if(lbMoodPicker.classList.contains('show')) closeLbMoodPicker(); else closeLb(); }
    return;
  }
  if(e.key==='Escape'){ if(selMode) exitSelMode(); else closeMenu(); }
});

fileInput.onchange = e => upload(e.target.files);

async function upload(files){
  const arr = Array.from(files);
  for(let i=0; i<arr.length; i++){
    prog(Math.round(i/arr.length*90)); toast(`Upload ${i+1}/${arr.length}…`);
    const f=arr[i]; const cf=await compress(f);
    const ext=f.name.split('.').pop().toLowerCase();
    const path=`${Date.now().toString(36)}${Math.random().toString(36).slice(2,6)}.${ext}`;
    const {error:e1} = await sb.storage.from(BUCKET).upload(path, cf, {upsert:false, contentType:cf.type});
    if(e1){ toast('Upload-Fehler: '+e1.message); continue; }
    const {data:pub} = sb.storage.from(BUCKET).getPublicUrl(path);
    const item = { title:f.name.replace(/\.[^.]+$/,''), mood:null, tags:[], media_url:pub.publicUrl, media_type:isVid(f.name)?'video':'image', favorite:false };
    const {data:ins, error:e2} = await sb.from(S().table).insert(item).select().single();
    if(e2){ toast('DB-Fehler: '+e2.message); continue; }
    S().items.unshift({...item, id:ins.id}); renderGrid();
  }
  prog(100); toast('Fertig ✓'); fileInput.value='';
}

function startDeleteMode(){
  closeMenu(); selMode='delete'; selectedIds.clear();
  actionBarTitle.textContent='Bilder löschen';
  $('abConfirm').classList.add('hidden'); $('abRemove').classList.add('hidden');
  actionBarMoods.innerHTML='';
  actionBar.classList.add('show'); renderGrid(); updateActionBarCount();
  $('deleteFloatingBtn')?.remove();
  const btn = document.createElement('button');
  btn.id='deleteFloatingBtn'; btn.innerHTML='🗑';
  btn.style.cssText='position:fixed;left:20px;bottom:100px;z-index:60;width:46px;height:46px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,60,60,.2);color:#fff;cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.3)';
  btn.onclick = async () => {
    if(!selectedIds.size){ toast('Nichts ausgewählt'); return; }
    if(!confirm(selectedIds.size+' Bilder löschen?')) return;
    await sbDeleteMany([...selectedIds]);
    S().items = S().items.filter(i=>!selectedIds.has(i.id));
    toast('Gelöscht'); btn.remove(); exitSelMode();
  };
  document.body.appendChild(btn);
}
$('pickDeleteBtn').onclick = startDeleteMode;
$('pickDeleteBtnSheet').onclick = startDeleteMode;

function openEditor(id){
  editId=id; const it=S().items.find(x=>x.id===id); if(!it) return;
  $('editorTitle').textContent = it.title||'Item';
  $('tagInput').value = (it.tags||[]).join(', ');
  editorWrap.classList.add('show'); renderTagChips(); dropdown.classList.add('show');
}
function renderTagChips(){
  const it = S().items.find(x=>x.id===editId);
  $('tagChips').innerHTML = S().moods.filter(m=>m!=='All').map(m =>
    `<button class="tchip ${it&&it.mood===m?'active':''}" data-m="${m}">${m}</button>`).join('');
  document.querySelectorAll('.tchip').forEach(b => b.onclick = () => {
    const it=S().items.find(x=>x.id===editId); if(!it) return;
    it.mood=b.dataset.m; sbUpdate(it); renderGrid(); renderTagChips();
  });
}
$('saveTagsBtn').onclick = () => {
  const it=S().items.find(x=>x.id===editId); if(!it) return;
  it.tags = $('tagInput').value.split(',').map(s=>s.trim()).filter(Boolean);
  sbUpdate(it); renderGrid(); toast('Tags gespeichert');
};

async function loadItems(){
  const {data,error} = await sb.from(S().table)
    .select('id,title,mood,tags,media_url,media_type,favorite')
    .order('created_at',{ascending:false});
  if(error){ toast('Ladefehler: '+error.message); gridEl.innerHTML='<div style="padding:24px;color:#fff">Kein Datenzugriff</div>'; return; }
  S().items=data||[]; renderGrid(); $('bootMsg')?.remove();
}
async function sbUpdate(item){
  if(!item) return;
  await sb.from(S().table).update({title:item.title||'', mood:item.mood||null, tags:item.tags||[], media_url:item.media_url, media_type:item.media_type, favorite:false}).eq('id',item.id);
}
async function sbDeleteMany(ids){
  if(!ids.length) return;
  await sb.from(S().table).delete().in('id',ids);
}

(function(){
  const canvas = document.getElementById('spriteCanvas');
  const ctx    = canvas.getContext('2d');

  // Spritesheet layout: 96x128 → 3 cols × 4 rows → 32x32 each
  const FRAME_W = 32, FRAME_H = 32;
  const FRAMES  = 3;   // frames per direction
  // Row indices: 0=down,1=left,2=right,3=up
  const ROW_LEFT  = 1;
  const ROW_RIGHT = 2;

  const SCALE   = 1.25; // sprite render size relative to topbar height
  const FPS     = 8;    // animation frames per second
  const GAP_MS  = 200;  // ms between chars

  let images = [];
  let loaded = 0;

  function resize(){
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Preload all sprite images
  SPRITES.forEach((s, i) => {
    const img = new Image();
    img.onload = () => { loaded++; if(loaded === SPRITES.length) startWalker(); };
    img.src = s.b64;
    images[i] = img;
  });

  // Walker state
  let queue     = [];   // upcoming walkers
  let active    = [];   // currently walking sprites
  let direction = -1;   // -1 = right→left, +1 = left→right (alternates)
  let charIdx   = 0;
  let lastSpawn = 0;
  let spawnNext = true;

  function nextChar(){
    const idx = charIdx % SPRITES.length;
    charIdx++;
    return idx;
  }

  function spawnWalker(timestamp){
    const h      = canvas.height;
    const sprH   = Math.round(h * SCALE);
    const sprW   = sprH; // square scaled
    const speed  = sprW * 3.5; // px per second
    const dir    = direction;
    direction    = -direction; // alternate

    const startX = dir === -1 ? canvas.width + sprW : -sprW * 2;
    const row    = dir === -1 ? ROW_LEFT : ROW_RIGHT;

    active.push({
      imgIdx: nextChar(),
      x: startX,
      y: Math.round((h - sprH) / 2),
      sprW, sprH,
      speed: speed * dir * -1, // px/s, negative = moving left
      row,
      frame: 0,
      frameTimer: 0,
      dir,
      done: false,
    });
    lastSpawn = timestamp;
    spawnNext = false;
  }

  function startWalker(){
    let last = null;
    function loop(ts){
      if(!last) last = ts;
      const dt = (ts - last) / 1000;
      last = ts;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Spawn logic
      if(spawnNext) spawnWalker(ts);

      active.forEach(w => {
        if(w.done) return;

        // Move
        w.x += w.speed * dt;

        // Animate frames
        w.frameTimer += dt;
        if(w.frameTimer >= 1/FPS){
          w.frameTimer = 0;
          w.frame = (w.frame + 1) % FRAMES;
        }

        // Draw
        const sx = w.frame * FRAME_W;
        const sy = w.row   * FRAME_H;
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(
          images[w.imgIdx],
          sx, sy, FRAME_W, FRAME_H,
          Math.round(w.x), w.y, w.sprW, w.sprH
        );

        // Check if fully off screen
        const offLeft  = w.dir === -1 && w.x + w.sprW < -w.sprW;
        const offRight = w.dir ===  1 && w.x > canvas.width + w.sprW;
        if(offLeft || offRight){
          w.done = true;
          // Trigger next spawn shortly after
          setTimeout(() => { spawnNext = true; }, GAP_MS);
        }
      });

      // Cleanup done walkers
      active = active.filter(w => !w.done);

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
    spawnNext = true;
  }
})();
