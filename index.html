<body>

<div class="topbar">
  <span class="board-title" id="boardTitle">Marvin's Place</span>

  <div class="topbar-right">
    <button class="menubtn hubbtn" id="hubBtn" aria-label="Menü" aria-haspopup="true" aria-expanded="false">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;display:block">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <div class="hub-menu" id="hubMenu" role="menu">
      <button class="hub-item" data-hub="info" role="menuitem">
        <span class="hub-ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;display:block">
            <circle cx="12" cy="12" r="9"/><line x1="12" y1="11" x2="12" y2="16"/>
            <circle cx="12" cy="7.6" r="0.6" fill="currentColor" stroke="none"/>
          </svg>
        </span> Info</button>
      <button class="hub-item" data-hub="login" role="menuitem">
        <span class="hub-ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;display:block">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </span> Login</button>
      <button class="hub-item admin-only" data-hub="menu" role="menuitem">
        <span class="hub-ic">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;display:block">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </span> Verwalten</button>
    </div>
  </div>

  <!-- Original controls kept (hidden) so all existing wiring/state stays intact;
       the hub-menu items above route to these. -->
  <div class="legacy-controls" aria-hidden="true">
    <button class="infobtn" id="infoBtn" aria-label="Info" title="Info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;display:block">
        <circle cx="12" cy="12" r="9"/>
        <line x1="12" y1="11" x2="12" y2="16"/>
        <circle cx="12" cy="7.6" r="0.6" fill="currentColor" stroke="none"/>
      </svg>
    </button>
    <button class="loginbtn" id="loginBtn" aria-label="Login" title="Login">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;display:block">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
    <button class="menubtn admin-only" id="menuBtn" aria-label="Menü">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;display:block">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </div>
</div>

<div class="dropdown" id="dropdown">
  <div class="dd-tabs">
    <button class="dd-tab active" data-tab="create">Erstellen</button>
    <button class="dd-tab" data-tab="manage">Verwalten</button>
    <button class="dd-tab" data-tab="view">Ansicht</button>
  </div>

  <div class="dd-panel show" data-panel="create">
    <button class="dd-btn" id="uploadBtn">
      <span class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:block">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </span> Bilder / Videos hochladen</button>
    <input id="fileInput" class="hidden" type="file" accept="image/*,video/*" multiple>
    <div class="dd-section">Quick-Add per URL</div>
    <div class="dd-input-row">
      <input id="quickAddUrl" placeholder="Bild- oder Video-URL" inputmode="url">
      <button id="quickAddBtn">Add</button>
    </div>
  </div>

  <div class="dd-panel" data-panel="manage">
    <div class="dd-section">Auswahl & Aktionen</div>
    <button class="dd-btn" id="pickDeleteBtn">
      <span class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:block">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </span> Bilder löschen</button>
    <button class="dd-btn" id="thumbBackfillBtn">
      <span class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:block">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
        </svg>
      </span> Bilder optimieren (WebP + Thumbnails)</button>
  </div>

  <div class="dd-panel" data-panel="view">
    <button class="dd-btn" id="ddFilterBtn">
      <span class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:block">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span> Filter & Layout</button>
    <button class="dd-btn" id="ddShuffleBtn">
      <span class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:block">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>
        </svg>
      </span> Zufällig anordnen</button>
  </div>

  <div class="editor-wrap" id="editorWrap">
    <div class="dd-section">Editor <span id="editorTitle" style="text-transform:none;letter-spacing:0;opacity:.7"></span></div>
    <div class="tag-chips" id="tagChips"></div>
    <div class="dd-input-row">
      <input id="tagInput" placeholder="Tags, kommagetrennt" inputmode="text">
      <button id="saveTagsBtn">Save</button>
    </div>
  </div>
</div>

<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="dd-tabs">
    <button class="dd-tab active" data-tab="create">Erstellen</button>
    <button class="dd-tab" data-tab="manage">Verwalten</button>
    <button class="dd-tab" data-tab="view">Ansicht</button>
  </div>

  <div class="dd-panel show" data-panel="create">
    <button class="dd-btn" id="uploadBtnSheet">
      <span class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;display:block">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </span> Bilder / Videos hochladen</button>
    <div class="dd-section">Quick-Add per URL</div>
    <div class="dd-input-row">
      <input id="quickAddUrlSheet" placeholder="Bild- oder Video-URL" inputmode="url">
      <button id="quickAddBtnSheet">Add</button>
    </div>
  </div>

  <div class="dd-panel" data-panel="manage">
    <div class="dd-section">Auswahl & Aktionen</div>

<script>
(function(){
  const btn = document.getElementById('spotifyBtn');
  const popup = document.getElementById('spotifyPopup');
  window.MB = window.MB || {};
  window.MB.closeSpotify = () => { popup.classList.remove('show'); btn.classList.remove('active'); };
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const willOpen = !popup.classList.contains('show');
    if(willOpen) window.MB.closeOtherPopups?.('spotify');
    const open = popup.classList.toggle('show');
    btn.classList.toggle('active', open);
  });
  document.addEventListener('click', e => {
    if (!popup.contains(e.target) && !btn.contains(e.target)) {
      popup.classList.remove('show');
      btn.classList.remove('active');
    }
  });
})();

window.onSpotifyIframeApiReady = (IFrameAPI) => {
  const el = document.getElementById('spotifyEmbed');
  const options = {
    uri: 'spotify:playlist:2qURpmjeU1eFu9orvltb5I',
    width: '100%',
    height: 152
  };
  IFrameAPI.createController(el, options, () => {});
};
</script>
