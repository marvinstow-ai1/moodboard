<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moodboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050505;
    --text:#fff;
    --muted:rgba(255,255,255,.68);
    --border:rgba(255,255,255,.12);
    --chip:rgba(255,255,255,.08);
    --shadow:0 10px 22px rgba(0,0,0,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
  button,input{font:inherit}
  .app{position:fixed;inset:0;display:flex;flex-direction:column}
  .titlebar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:center;align-items:center;padding:14px 18px;pointer-events:none}
  .title{margin:0;border:0;background:transparent;color:var(--text);font-size:18px;font-weight:700;letter-spacing:.04em;opacity:.9;pointer-events:auto;outline:none;text-align:center;width:220px;max-width:56vw}
  .iconbtn{position:fixed;z-index:30;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(18px) saturate(120%);-webkit-backdrop-filter:blur(18px) saturate(120%);box-shadow:var(--shadow);transition:.16s ease}
  .iconbtn:hover{background:rgba(255,255,255,.09)}
  #menuBtn{top:18px;right:18px;font-size:22px}
  #shuffleBtn{right:18px;bottom:18px;font-size:18px}
  .menu{position:fixed;top:72px;right:18px;z-index:40;min-width:220px;padding:10px;border:1px solid var(--border);border-radius:16px;background:rgba(10,10,10,.92);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:none;box-shadow:0 16px 40px rgba(0,0,0,.35)}
  .menu.show{display:block}
  .menu .head{font-size:11px;letter-spacing:.08em;text-transform:uppercase;opacity:.5;padding:8px 10px 6px}
  .menu .divider{height:1px;background:rgba(255,255,255,.08);margin:8px 0}
  .menu button{width:100%;border:0;background:transparent;color:var(--text);text-align:left;padding:10px;border-radius:10px;cursor:pointer}
  .menu button:hover{background:rgba(255,255,255,.08)}
  .grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:1fr;gap:2px;padding:0}
  .cell{position:relative;overflow:hidden;background:#111;aspect-ratio:1/1}
  .cell img,.cell video{width:100%;height:100%;object-fit:contain;display:block;background:#000}
  .placeholder{display:none}
  .tagEditor{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:60;width:min(520px,calc(100vw - 32px));background:rgba(12,12,12,.96);border:1px solid var(--border);border-radius:18px;padding:14px;display:none;box-shadow:0 20px 60px rgba(0,0,0,.55)}
  .tagEditor.show{display:block}
  .tagEditor h4{margin:0 0 10px;font-size:14px}
  .tagrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .tagchip{border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--text);border-radius:999px;padding:8px 10px;font-size:12px;cursor:pointer}
  .tagchip.active{background:#fff;color:#111;border-color:#fff}
  .tagform{display:flex;gap:8px;flex-wrap:wrap}
