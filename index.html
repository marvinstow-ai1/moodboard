<script type="module">
import { createClient } from \'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm\';

function isVid(n){ return /[.](mp4|webm|mov|m4v)$/i.test(n||\'\')}
function prog(p){ progressBar.style.width=p+\'%\'; if(p>=100)setTimeout(()=>progressBar.style.width=\'0\',600) }

function compress(file,maxPx=MAX_PX,q=0.88){
  return new Promise(res=>{
    if(isVid(file.name)){res(file);return}
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width,h=img.height;
      if(w<=maxPx&&h<=maxPx){res(file);return}
      const r=Math.min(maxPx/w,maxPx/h);w=Math.round(w*r);h=Math.round(h*r);
      const c=document.createElement(\'canvas\');c.width=w;c.height=h;
      c.getContext(\'2d\').drawImage(img,0,0,w,h);
      c.toBlob(b=>res(new File([b],file.name,{type:\'image/jpeg\'})),\'image/jpeg\',q);
    };
    img.src=url;
  });
}

function renderMoodChipsSheet(){
  document.getElementById(\'moodChipsSheet\').innerHTML=S().moods.map(m=>
    `<button class="mchip ${m===S().currentMood?\'active\':\'\'}" data-m="${m}">${m}</button>`
  ).join(\'\');
  document.querySelectorAll(\'#moodChipsSheet .mchip\').forEach(b=>b.onclick=()=>{
    S().currentMood=b.dataset.m;
    localStorage.setItem(currentPage===\'moodboard\'?\'mb_mood\':\'pb_mood\',b.dataset.m);
    renderMoodChips();renderMoodChipsSheet();renderGrid();closeMenu();
  });
}

// ── Grid ──────────────────────────────────────────────────
let _observer=null;
function renderGrid(){
  const s=S();
  let arr=s.items.filter(i=>s.currentMood===\'All\'||i.mood===s.currentMood);
  arr=[...arr].sort(()=>Math.random()-.5);
  s.currentItems=arr;

  if(_observer){_observer.disconnect();_observer=null;}

  gridEl.innerHTML=arr.map(it=>`
    <div class="cell" data-id="${it.id}">
      <input class="selcheck" type="checkbox" data-id="${it.id}">
      <span class="cell-mood-badge" data-id="${it.id}">${it.mood||\'\'}</span>
      ${it.media_type===\'video\'
        ?`<video src="${it.media_url}" muted loop playsinline preload="none"></video>`
        :`<img src="${it.media_url}" loading="lazy" decoding="async" alt="">`}
    </div>`).join(\'\');

  _observer=new IntersectionObserver(es=>es.forEach(e=>{
    const v=e.target.querySelector(\'video\');if(!v)return;
    if(e.isIntersecting){v.muted=true;v.play().catch(()=>{})}
    else{v.pause();v.currentTime=0;}
  }),{threshold:0.25,rootMargin:\'100px\'});

  gridEl.querySelectorAll(\'.cell\').forEach(c=>{
    _observer.observe(c);
    const chk=c.querySelector(\'.selcheck\');
    c.onclick=()=>{
      if(selMode){
        chk.checked=!chk.checked;
        const id=c.dataset.id;
        chk.checked?selectedIds.add(id):selectedIds.delete(id);
        c.classList.toggle(\'sel-highlight\',chk.checked);
        updateActionBarCount();
        if(selMode===\'assign\')updateDimming();
        return;
      }
      const idx=S().currentItems.findIndex(x=>x.id===c.dataset.id);
      openLightbox(idx);
    };
    c.oncontextmenu=e=>{e.preventDefault();if(!selMode)openEditor(c.dataset.id)};
    if(selMode===\'assign\'||selMode===\'remove\') c.querySelector(\'.cell-mood-badge\').classList.add(\'show\');
    if(selMode){
      chk.classList.add(\'visible\');
      if(selectedIds.has(c.dataset.id)){chk.checked=true;c.classList.add(\'sel-highlight\');}
    }
  });
}

function updateActionBarCount(){ actionBarCount.textContent=selectedIds.size+\' ausgew\\u00e4hlt\'; }
function updateDimming(){
  if(!assignMoods.size){gridEl.querySelectorAll(\'.cell\').forEach(c=>c.classList.remove(\'mood-dim\'));return;}
  gridEl.querySelectorAll(\'.cell\').forEach(c=>{
    const it=S().items.find(x=>x.id===c.dataset.id);if(!it)return;
    c.classList.toggle(\'mood-dim\',assignMoods.has(it.mood)&&!selectedIds.has(it.id));
  });
}

// ── Selection Modes ───────────────────────────────────────
function enterSelMode(mode){
  selMode=mode;selectedIds.clear();assignMoods.clear();closeMenu();
  actionBarTitle.textContent=mode===\'assign\'?\'Mood zuweisen / \\u00e4ndern\':mode===\'remove\'?\'Moods entfernen\':\'Bilder l\\u00f6schen\';
  document.getElementById(\'abConfirm\').classList.toggle(\'hidden\',mode!==\'assign\');
  document.getElementById(\'abRemove\').classList.toggle(\'hidden\',mode!==\'remove\');
  if(mode===\'assign\'){
    actionBarMoods.innerHTML=S().moods.filter(m=>m!==\'All\').map(m=>
      `<button class="ab-chip" data-m="${m}">${m}</button>`).join(\'\');
    actionBarMoods.querySelectorAll(\'.ab-chip\').forEach(b=>b.onclick=()=>{
      b.classList.toggle(\'sel\');
      b.classList.contains(\'sel\')?assignMoods.add(b.dataset.m):assignMoods.delete(b.dataset.m);
      updateDimming();
    });
  } else { actionBarMoods.innerHTML=\'\'; }
  actionBar.classList.add(\'show\');
  renderGrid();updateActionBarCount();
}
function exitSelMode(){
  selMode=null;selectedIds.clear();assignMoods.clear();
  actionBar.classList.remove(\'show\');renderGrid();
}

document.getElementById(\'abCancel\').onclick=()=>{document.getElementById(\'deleteFloatingBtn\')?.remove();exitSelMode()};
document.getElementById(\'abConfirm\').onclick=async()=>{
  if(!selectedIds.size){toast(\'Nichts ausgew\\u00e4hlt\');return;}
  if(!assignMoods.size){toast(\'Keine Mood ausgew\\u00e4hlt\');return;}
  const mood=[...assignMoods][0];const ids=[...selectedIds];
  ids.forEach(id=>{const it=S().items.find(x=>x.id===id);if(it)it.mood=mood;});
  await Promise.all(ids.map(id=>sbUpdate(S().items.find(x=>x.id===id))));
  toast(`${ids.length} Bilder \\u2192 ${mood}`);exitSelMode();
};
document.getElementById(\'abRemove\').onclick=async()=>{
  if(!selectedIds.size){toast(\'Nichts ausgew\\u00e4hlt\');return;}
  const ids=[...selectedIds];
  ids.forEach(id=>{const it=S().items.find(x=>x.id===id);if(it)it.mood=null;});
  await Promise.all(ids.map(id=>sbUpdate(S().items.find(x=>x.id===id))));
  toast(`${ids.length} Moods entfernt`);exitSelMode();
};

// desktop
document.getElementById(\'assignMoodBtn\').onclick=()=>enterSelMode(\'assign\');
document.getElementById(\'removeMoodBtn\').onclick=()=>enterSelMode(\'remove\');
// sheet
document.getElementById(\'assignMoodBtnSheet\').onclick=()=>enterSelMode(\'assign\');
document.getElementById(\'removeMoodBtnSheet\').onclick=()=>enterSelMode(\'remove\');

// ── Lightbox ──────────────────────────────────────────────
function openLightbox(idx){
  if(idx<0||idx>=S().currentItems.length)return;
  lbIndex=idx;
  const it=S().currentItems[idx];
  lbInner.querySelectorAll(\'img,video\').forEach(e=>e.remove());
  lbMuteBtn.classList.remove(\'show\');
  if(it.media_type===\'video\'){
    const v=document.createElement(\'video\');
    v.src=it.media_url;v.controls=true;v.autoplay=true;v.muted=false;v.loop=true;
    lbInner.appendChild(v);
    lbIsMuted=false;
    lbMuteBtn.textContent=\'\\uD83D\\uDD0A\';
    lbMuteBtn.classList.add(\'show\');
  } else {
    const img=document.createElement(\'img\');
    img.src=it.media_url;img.style.pointerEvents=\'none\';
    lbInner.appendChild(img);
  }
  lightbox.classList.add(\'show\');
  lbMoodBtn.classList.add(\'show\');
  closeLbMoodPicker();updateLbArrows();
}
function updateLbArrows(){
  document.getElementById(\'lbPrev\').style.opacity=lbIndex>0?\'1\':\'0.2\';
  document.getElementById(\'lbNext\').style.opacity=lbIndex<S().currentItems.length-1?\'1\':\'0.2\';
}
function lbNavigate(dir){
  const next=lbIndex+dir;
  if(next<0||next>=S().currentItems.length)return;
  lbInner.querySelectorAll(\'video\').forEach(v=>v.pause());
  closeLbMoodPicker();openLightbox(next);
}
document.getElementById(\'lbPrev\').onclick=e=>{e.stopPropagation();lbNavigate(-1)};
document.getElementById(\'lbNext\').onclick=e=>{e.stopPropagation();lbNavigate(1)};

lightbox.onclick=e=>{
  if(lbMoodPicker.classList.contains(\'show\')){closeLbMoodPicker();return;}
  if(!e.target.closest(\'.lb-arrow\')&&!e.target.closest(\'#lbMoodBtn\')&&!e.target.closest(\'#lbMuteBtn\')&&!e.target.closest(\'video\')){
    closeLb();
  }
};
function closeLb(){
  lightbox.classList.remove(\'show\');
  lbMoodBtn.classList.remove(\'show\');
  lbMuteBtn.classList.remove(\'show\');
  closeLbMoodPicker();
  lbInner.querySelectorAll(\'video\').forEach(v=>v.pause());
}

// Mute toggle
lbMuteBtn.onclick=e=>{
  e.stopPropagation();
  const v=lbInner.querySelector(\'video\');if(!v)return;
  lbIsMuted=!lbIsMuted;
  v.muted=lbIsMuted;
  lbMuteBtn.textContent=lbIsMuted?\'\\uD83D\\uDD07\':\'\\uD83D\\uDD0A\';
};

// Swipe
let txS=0,tyS=0;
lightbox.addEventListener(\'touchstart\',e=>{txS=e.touches[0].clientX;tyS=e.touches[0].clientY;},{passive:true});
lightbox.addEventListener(\'touchend\',e=>{
  const dx=e.changedTouches[0].clientX-txS,dy=e.changedTouches[0].clientY-tyS;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)lbNavigate(dx<0?1:-1);
},{passive:true});

// ── Lightbox Mood Picker ──────────────────────────────────
function openLbMoodPicker(){
  const it=S().currentItems[lbIndex];if(!it)return;
  lbPickedMoods=new Set(it.mood&&it.mood!==\'All\'?[it.mood]:[]);
  lbCurrentMood.textContent=it.mood&&it.mood!==\'All\'?`Aktuell: ${it.mood}`:`Noch keine Mood`;
  renderLbMoodTiles();lbMoodPicker.classList.add(\'show\');
}
function renderLbMoodTiles(){
  lbMoodTiles.innerHTML=S().moods.filter(m=>m!==\'All\').map(m=>
    `<button class="lb-mood-tile ${lbPickedMoods.has(m)?\'sel\':\'\'}" data-m="${m}">${m}</button>`).join(\'\');
  lbMoodTiles.querySelectorAll(\'.lb-mood-tile\').forEach(b=>{
    b.onclick=e=>{
      e.stopPropagation();
      lbPickedMoods.has(b.dataset.m)?lbPickedMoods.delete(b.dataset.m):lbPickedMoods.add(b.dataset.m);
      b.classList.toggle(\'sel\',lbPickedMoods.has(b.dataset.m));
    };
  });
}
function closeLbMoodPicker(){ lbMoodPicker.classList.remove(\'show\');lbPickedMoods=new Set(); }
lbMoodBtn.onclick=e=>{ e.stopPropagation(); lbMoodPicker.classList.contains(\'show\')?closeLbMoodPicker():openLbMoodPicker(); };
document.getElementById(\'lbMoodConfirm\').onclick=async e=>{
  e.stopPropagation();
  if(!lbPickedMoods.size){toast(\'Keine Mood ausgew\\u00e4hlt\');return;}
  const mood=[...lbPickedMoods][0];
  const it=S().currentItems[lbIndex];if(!it)return;
  it.mood=mood;
  const orig=S().items.find(x=>x.id===it.id);if(orig)orig.mood=mood;
  await sbUpdate(it);toast(`Mood \\u2192 ${mood}`);closeLbMoodPicker();
};
document.addEventListener(\'click\',e=>{
  if(lbMoodPicker.classList.contains(\'show\')&&!e.target.closest(\'#lbMoodPicker\')&&!e.target.closest(\'#lbMoodBtn\'))closeLbMoodPicker();
});

// ── Keyboard ──────────────────────────────────────────────
document.addEventListener(\'keydown\',e=>{
  if(lightbox.classList.contains(\'show\')){
    if(e.key===\'ArrowLeft\')lbNavigate(-1);
    else if(e.key===\'ArrowRight\')lbNavigate(1);
    else if(e.key===\'Escape\'){ if(lbMoodPicker.classList.contains(\'show\'))closeLbMoodPicker(); else closeLb(); }
    return;
  }
  if(e.key===\'Escape\'){ if(selMode)exitSelMode(); else closeMenu(); }
});

// ── Upload ────────────────────────────────────────────────
document.getElementById(\'shuffleBtn\').onclick=()=>renderGrid();
document.getElementById(\'uploadBtn\').onclick=()=>{fileInput.click();closeMenu()};
document.getElementById(\'uploadBtnSheet\').onclick=()=>{fileInput.click();closeMenu()};
fileInput.onchange=e=>upload(e.target.files);

async function upload(files){
  const arr=Array.from(files);
  for(let i=0;i<arr.length;i++){
    prog(Math.round(i/arr.length*90));toast(`Upload ${i+1}/${arr.length}\\u2026`);
    const f=arr[i];const cf=await compress(f);
    const ext=cf.name.split(\'.\').pop().toLowerCase();
    const path=`${Date.now().toString(36)}${Math.random().toString(36).slice(2,6)}.${ext}`;
    const {error:e1}=await sb.storage.from(BUCKET).upload(path,cf,{upsert:false,contentType:cf.type});
    if(e1){toast(\'Upload-Fehler: \'+e1.message);continue}
    const {data:pub}=sb.storage.from(BUCKET).getPublicUrl(path);
    const item={title:f.name.replace(/[.][^.]+$/,\'\'),mood:null,tags:[],media_url:pub.publicUrl,media_type:isVid(f.name)?\'video\':\'image\',favorite:false};
    const {data:ins,error:e2}=await sb.from(S().table).insert(item).select().single();
    if(e2){toast(\'DB-Fehler: \'+e2.message);continue}
    S().items.unshift({...item,id:ins.id});renderGrid();
  }
  prog(100);toast(\'Fertig \\u2713\');fileInput.value=\'\';
}

// ── Delete Mode ───────────────────────────────────────────
function startDeleteMode(){
  closeMenu();selMode=\'delete\';selectedIds.clear();
  actionBarTitle.textContent=\'Bilder l\\u00f6schen\';
  document.getElementById(\'abConfirm\').classList.add(\'hidden\');
  document.getElementById(\'abRemove\').classList.add(\'hidden\');
  actionBarMoods.innerHTML=\'\';
  actionBar.classList.add(\'show\');renderGrid();updateActionBarCount();
  document.getElementById(\'deleteFloatingBtn\')?.remove();
  const btn=document.createElement(\'button\');
  btn.id=\'deleteFloatingBtn\';btn.textContent=\'\\uD83D\\uDDD1\';
  btn.style.cssText=\'position:fixed;left:20px;bottom:100px;z-index:60;width:46px;height:46px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,60,60,.2);color:#fff;cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.3)\';
  btn.onclick=async()=>{
    if(!selectedIds.size){toast(\'Nichts ausgew\\u00e4hlt\');return;}
    if(!confirm(selectedIds.size+\' Bilder l\\u00f6schen?\'))return;
    await sbDeleteMany([...selectedIds]);
    S().items=S().items.filter(i=>!selectedIds.has(i.id));
    toast(\'Gel\\u00f6scht\');btn.remove();exitSelMode();
  };
  document.body.appendChild(btn);
}
document.getElementById(\'pickDeleteBtn\').onclick=startDeleteMode;
document.getElementById(\'pickDeleteBtnSheet\').onclick=startDeleteMode;

// ── Editor ────────────────────────────────────────────────
function openEditor(id){
  editId=id;const it=S().items.find(x=>x.id===id);if(!it)return;
  document.getElementById(\'editorTitle\').textContent=it.title||\'Item\';
  document.getElementById(\'tagInput\').value=(it.tags||[]).join(\', \');
  editorWrap.classList.add(\'show\');renderTagChips();dropdown.classList.add(\'show\');
}
function renderTagChips(){
  const it=S().items.find(x=>x.id===editId);
  document.getElementById(\'tagChips\').innerHTML=S().moods.filter(m=>m!==\'All\').map(m=>
    `<button class="tchip ${it&&it.mood===m?\'active\':\'\'}" data-m="${m}">${m}</button>`).join(\'\');
  document.querySelectorAll(\'.tchip\').forEach(b=>b.onclick=()=>{
    const it=S().items.find(x=>x.id===editId);if(!it)return;
    it.mood=b.dataset.m;sbUpdate(it);renderGrid();renderTagChips();
  });
}
document.getElementById(\'saveTagsBtn\').onclick=()=>{
  const it=S().items.find(x=>x.id===editId);if(!it)return;
  it.tags=document.getElementById(\'tagInput\').value.split(\',\').map(s=>s.trim()).filter(Boolean);
  sbUpdate(it);renderGrid();toast(\'Tags gespeichert\');
};

// ── Supabase ──────────────────────────────────────────────
async function loadItems(){
  const {data,error}=await sb.from(S().table)
    .select(\'id,title,mood,tags,media_url,media_type,favorite\')
    .order(\'created_at\',{ascending:false});
  if(error){toast(\'Ladefehler: \'+error.message);gridEl.innerHTML=\'<div style="padding:24px;color:#fff">Kein Datenzugriff</div>\';return}
  S().items=data||[];renderGrid();document.getElementById(\'bootMsg\')?.remove();
}
async function sbUpdate(item){
  if(!item)return;
  await sb.from(S().table).update({title:item.title||\'\',mood:item.mood||null,tags:item.tags||[],media_url:item.media_url,media_type:item.media_type,favorite:false}).eq(\'id\',item.id);
}
async function sbDeleteMany(ids){
  if(!ids.length)return;
  await sb.from(S().table).delete().in(\'id\',ids);
}

// ── Mood Verwaltung (helper) ──────────────────────────────
function getMoodInputs(suffix=\'\'){
  return {
    newVal:()=>document.getElementById(\'newMood\'+suffix).value.trim(),
    clearNew:()=>{document.getElementById(\'newMood\'+suffix).value=\'\'},
    renameVal:()=>document.getElementById(\'renameMood\'+suffix).value.trim(),
    clearRename:()=>{document.getElementById(\'renameMood\'+suffix).value=\'\'},
    deleteVal:()=>document.getElementById(\'deleteMood\'+suffix).value.trim(),
    clearDelete:()=>{document.getElementById(\'deleteMood\'+suffix).value=\'\'},
  };
}
function bindMoodMgmt(suffix=\'\'){
  document.getElementById(\'addMoodBtn\'+suffix).onclick=()=>{
    const i=getMoodInputs(suffix);const v=i.newVal();
    if(!v||S().moods.includes(v))return;
    S().moods.push(v);S().currentMood=v;i.clearNew();
    renderMoodChips();renderMoodChipsSheet();renderGrid();toast(\'Mood hinzugef\\u00fcgt\');closeMenu();
  };
  document.getElementById(\'renameMoodBtn\'+suffix).onclick=()=>{
    const i=getMoodInputs(suffix);const v=i.renameVal();
    if(!v||S().currentMood===\'All\'||S().moods.includes(v))return;
    const old=S().currentMood;
    S().moods=S().moods.map(m=>m===old?v:m);
    S().items=S().items.map(it=>({...it,mood:it.mood===old?v:it.mood}));
    S().currentMood=v;i.clearRename();
    S().items.forEach(sbUpdate);renderMoodChips();renderMoodChipsSheet();renderGrid();toast(\'Mood umbenannt\');
  };
  document.getElementById(\'deleteMoodBtn\'+suffix).onclick=()=>{
    const i=getMoodInputs(suffix);const v=i.deleteVal();
    if(!v||v===\'All\'||!S().moods.includes(v))return;
    S().moods=S().moods.filter(m=>m!==v);
    S().items=S().items.map(it=>({...it,mood:it.mood===v?null:it.mood}));
    if(S().currentMood===v)S().currentMood=\'All\';
    i.clearDelete();
    S().items.forEach(sbUpdate);renderMoodChips();renderMoodChipsSheet();renderGrid();toast(\'Mood gel\\u00f6scht\');closeMenu();
  };
}
bindMoodMgmt(\'\');
bindMoodMgmt(\'Sheet\');
