<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moodboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--text:#fff;--border:rgba(255,255,255,.12);--muted:rgba(255,255,255,.65);--panel:rgba(10,10,10,.92)}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
button,input{font:inherit}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;gap:10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.title{border:0;background:transparent;color:#fff;font-size:17px;font-weight:700;letter-spacing:.04em;outline:none;opacity:.92;min-width:0;flex:1;text-align:center}
.topbar-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.iconbtn{width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;display:grid;place-items:center;font-size:18px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);transition:.15s;flex-shrink:0}
.iconbtn:hover{background:rgba(255,255,255,.14)}
.dd{position:absolute;top:calc(100% + 8px);z-index:50;min-width:210px;display:none;padding:8px;border:1px solid var(--border);border-radius:16px;background:var(--panel);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 16px 40px rgba(0,0,0,.45)}
.dd.show{display:block}
.dd-moods{right:120px}
.dd-settings{right:60px;min-width:300px}
.dd-editor{right:10px;min-width:310px}
.dd .head{padding:6px 8px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.08em;opacity:.45}
.dd .divider{height:1px;background:rgba(255,255,255,.08);margin:6px 0}
.dd button{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:9px 10px;border-radius:10px;cursor:pointer;font-size:14px}
.dd button:hover{background:rgba(255,255,255,.08)}
.dd input{width:100%;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:9px 12px;outline:none;margin-bottom:6px;font-size:13px}
.dd .row{display:flex;gap:6px;margin-bottom:6px}
.dd .row input{margin-bottom:0}
.dd .row button{width:auto;padding:9px 14px;border:1px solid var(--border);background:rgba(255,255,255,.08);border-radius:10px}
.dd .act-btn{border:1px solid var(--border);background:rgba(255,255,255,.08);border-radius:10px;padding:9px 12px;cursor:pointer;color:#fff;font-size:13px}
.tagrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tagchip{border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;padding:7px 11px;font-size:12px;cursor:pointer;transition:.12s}
.tagchip.active{background:#fff;color:#111;border-color:#fff}
.gridwrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:2px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:2px}
.cell{position:relative;overflow:hidden;background:#111;aspect-ratio:9/16;cursor:pointer}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block;background:#000;transition:.3s}
.cell:hover img,.cell:hover video{transform:scale(1.04)}
.gridwrap.dragover{outline:2px dashed rgba(255,255,255,.4);outline-offset:-4px}
.lightbox{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.lightbox.show{display:flex}
.lightbox-inner{position:relative;max-width:90vw;max-height:90vh}
.lightbox-inner img,.lightbox-inner video{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:10px;display:block}
.lightbox-close{position:absolute;top:-14px;right:-14px;width:34px;height:34px;background:rgba(255,255,255,.12);border:1px solid var(--border);border-radius:999px;color:#fff;font-size:18px;cursor:pointer;display:grid;place-items:center}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);z-index:100;background:rgba(0,0,0,.85);border:1px solid var(--border);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}
.toast.show{opacity:1}
.hidden{display:none !important}
.upload-bar{position:fixed;top:0;left:0;height:3px;background:#fff;z-index:200;width:0;transition:width .3s}
@media(max-width:700px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .dd-settings,.dd-editor{right:6px;min-width:calc(100vw - 12px)}
  .dd-moods{right:50px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <input id="boardTitle" class="title" value="Moodboard">
    <div class="topbar-right" style="position:relative">
      <button class="iconbtn" id="moodBtn" title="Moods">◈</button>
      <button class="iconbtn" id="settingsBtn" title="Settings">⚙</button>
      <button class="iconbtn" id="editorBtn" title="Editor" style="opacity:.4" disabled>✎</button>
      <button class="iconbtn" id="shuffleBtn" title="Shuffle">⇄</button>
      <button class="iconbtn" id="uploadBtn" title="Upload">＋</button>
      <input id="fileInput" class="hidden" type="file" accept="image/*,video/*" multiple>
      <div id="ddMoods" class="dd dd-moods">
        <div class="head">Moods</div>
        <div id="moodList"></div>
      </div>
      <div id="ddSettings" class="dd dd-settings">
        <div class="head">Mood verwalten</div>
        <div class="row"><input id="newMood" placeholder="Neue Mood"><button id="addMoodBtn" class="act-btn">Add</button></div>
        <div class="row"><input id="renameMood" placeholder="Umbenennen (aktuell)"><button id="renameMoodBtn" class="act-btn">Rename</button></div>
        <div class="row"><input id="deleteMood" placeholder="Mood löschen"><button id="deleteMoodBtn" class="act-btn">Delete</button></div>
        <div class="divider"></div>
        <div class="head">Alle Bilder löschen</div>
        <button id="clearBtn">⚠ Alle löschen</button>
      </div>
      <div id="ddEditor" class="dd dd-editor">
        <div class="head" id="editorHint">Item auswählen</div>
        <div class="tagrow" id="tagButtons"></div>
        <div class="row">
          <input id="tagInput" placeholder="Tags, kommagetrennt">
          <button id="saveTagsBtn" class="act-btn">Save</button>
        </div>
      </div>
    </div>
  </div>
  <div class="gridwrap" id="gridWrap">
    <div class="grid" id="grid"></div>
  </div>
</div>
<div class="lightbox" id="lightbox">
  <div class="lightbox-inner" id="lightboxInner">
    <button class="lightbox-close" id="lightboxClose">✕</button>
  </div>
</div>
<div class="upload-bar" id="uploadBar"></div>
<div id="toast" class="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://bnwcbxjgsmmvmtvqblrr.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ab3F-icniDtJpbCQk9t99w_x0-8APoD';
const BUCKET = 'moodboard';
const MAX_PX = 2400;

let supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
let items = [];
let moods = ['All','Summer','Winter','Cozy','Dark'];
let currentMood = localStorage.getItem('mb_mood') || 'All';
let shuffleOn = false;
let editId = null;

const grid = document.getElementById('grid');
const gridWrap = document.getElementById('gridWrap');
const toast = document.getElementById('toast');
const fileInput = document.getElementById('fileInput');
const uploadBar = document.getElementById('uploadBar');
const lightbox = document.getElementById('lightbox');
const lightboxInner = document.getElementById('lightboxInner');
const editorBtn = document.getElementById('editorBtn');

function showToast(t){ toast.textContent=t; toast.classList.add('show'); clearTimeout(showToast._t); showToast._t=setTimeout(()=>toast.classList.remove('show'),1500) }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }
function isVideo(n){ return /[.](mp4|webm|mov|m4v)$/i.test(n||'') }
function setProgress(p){ uploadBar.style.width=p+'%'; if(p>=100) setTimeout(()=>uploadBar.style.width='0',500) }

function compressImage(file, maxPx=MAX_PX, quality=0.88){
  return new Promise(resolve=>{
    if(isVideo(file.name)){ resolve(file); return }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      if(w<=maxPx && h<=maxPx){ resolve(file); return }
      const ratio = Math.min(maxPx/w, maxPx/h);
      w=Math.round(w*ratio); h=Math.round(h*ratio);
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(blob=>resolve(new File([blob], file.name, {type:'image/jpeg'})),'image/jpeg',quality);
    };
    img.src=url;
  });
}

function renderMoods(){
  document.getElementById('moodList').innerHTML = moods.map(m=>
    `<button data-m="${m}">${m==='All'?'◉ ':m===currentMood?'✓ ':'  '}${m}</button>`
  ).join('');
  document.querySelectorAll('#moodList button').forEach(b=>b.onclick=()=>{
    currentMood=b.dataset.m; localStorage.setItem('mb_mood',currentMood);
    closeAll(); renderGrid(); renderMoods();
  });
}

function renderGrid(){
  let arr = items.filter(i=>currentMood==='All'||i.mood===currentMood);
  if(shuffleOn) arr=[...arr].sort(()=>Math.random()-.5);
  grid.innerHTML = arr.map(it=>`
    <div class="cell" data-id="${it.id}">
      ${it.media_type==='video'
        ? `<video src="${it.media_url}" muted loop playsinline loading="lazy"></video>`
        : `<img src="${it.media_url}" loading="lazy" decoding="async" alt="">`}
    </div>
  `).join('');

  const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      const v=e.target.querySelector('video');
      if(!v) return;
      if(e.isIntersecting) v.play().catch(()=>{});
      else { v.pause(); v.currentTime=0; }
    });
  },{threshold:0.3});

  grid.querySelectorAll('.cell').forEach(cell=>{
    observer.observe(cell);
    cell.addEventListener('click', e=>openLightbox(cell.dataset.id));
  });
}

function openLightbox(id){
  const it=items.find(x=>x.id===id); if(!it)return;
  lightboxInner.querySelectorAll('img,video').forEach(el=>el.remove());
  if(it.media_type==='video'){
    const v=document.createElement('video');
    v.src=it.media_url; v.controls=true; v.autoplay=true;
    lightboxInner.appendChild(v);
  } else {
    const img=document.createElement('img');
    img.src=it.media_url;
    lightboxInner.appendChild(img);
  }
  lightbox.classList.add('show');
}
document.getElementById('lightboxClose').onclick=()=>closeLightbox();
lightbox.addEventListener('click',e=>{ if(e.target===lightbox) closeLightbox(); });
function closeLightbox(){
  lightbox.classList.remove('show');
  lightboxInner.querySelectorAll('video').forEach(v=>v.pause());
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeLightbox(); closeAll(); } });

function openEditor(id){
  editId=id;
  const it=items.find(x=>x.id===id); if(!it)return;
  document.getElementById('editorHint').textContent='✎  '+(it.title||'Item');
  document.getElementById('tagInput').value=(it.tags||[]).join(', ');
  renderTagChips();
  editorBtn.disabled=false; editorBtn.style.opacity='1';
  closeAll();
  document.getElementById('ddEditor').classList.add('show');
}
function renderTagChips(){
  const it=items.find(x=>x.id===editId);
  document.getElementById('tagButtons').innerHTML=moods.filter(m=>m!=='All').map(m=>
    `<button class="tagchip ${it&&it.mood===m?'active':''}" data-m="${m}">${m}</button>`
  ).join('');
  document.querySelectorAll('#tagButtons .tagchip').forEach(b=>b.onclick=()=>{
    const it=items.find(x=>x.id===editId); if(!it)return;
    it.mood=b.dataset.m; syncUpdate(it); renderGrid(); renderTagChips();
  });
}
document.getElementById('saveTagsBtn').onclick=()=>{
  const it=items.find(x=>x.id===editId); if(!it)return;
  it.tags=document.getElementById('tagInput').value.split(',').map(s=>s.trim()).filter(Boolean);
  syncUpdate(it); renderGrid(); showToast('Tags gespeichert');
};

async function addFiles(files){
  const arr=Array.from(files);
  for(let i=0;i<arr.length;i++){
    const file=arr[i];
    setProgress(Math.round((i/arr.length)*100));
    showToast(`Upload ${i+1}/${arr.length}…`);
    const compressed=await compressImage(file);
    const ext=compressed.name.split('.').pop().toLowerCase();
    const path=`${uid()}.${ext}`;
    const {error:upErr}=await supabase.storage.from(BUCKET).upload(path,compressed,{upsert:false,contentType:compressed.type});
    if(upErr){ showToast('Fehler: '+upErr.message); continue; }
    const {data:pub}=supabase.storage.from(BUCKET).getPublicUrl(path);
    const item={
      id:uid(), title:file.name.replace(/[.][^.]+$/,''),
      mood:currentMood==='All'?(moods[1]||'Summer'):currentMood,
      tags:[], media_url:pub.publicUrl,
      media_type:isVideo(file.name)?'video':'image', favorite:false
    };
    const {data:ins,error:insErr}=await supabase.from('moodboard_items').insert({...item}).select().single();
    if(insErr){ showToast('DB-Fehler: '+insErr.message); continue; }
    items.unshift(ins||item); renderGrid();
  }
  setProgress(100); showToast('Fertig ✓'); fileInput.value='';
}

async function loadItems(){
  const {data,error}=await supabase.from('moodboard_items').select('*').order('created_at',{ascending:false});
  if(error){ showToast('Ladefehler'); return; }
  items=data||[]; renderGrid();
}
async function syncUpdate(item){
  await supabase.from('moodboard_items').update({
    title:item.title||'', mood:item.mood, tags:item.tags||[],
    media_url:item.media_url, media_type:item.media_type, favorite:item.favorite||false
  }).eq('id',item.id);
}
async function syncDeleteAll(){
  await supabase.from('moodboard_items').delete().neq('id','00000000-0000-0000-0000-000000000000');
}

function closeAll(){
  ['ddMoods','ddSettings','ddEditor'].forEach(id=>document.getElementById(id).classList.remove('show'));
}
function toggle(id){ const el=document.getElementById(id); const was=el.classList.contains('show'); closeAll(); if(!was) el.classList.add('show'); }

document.getElementById('moodBtn').onclick=()=>{ renderMoods(); toggle('ddMoods'); };
document.getElementById('settingsBtn').onclick=()=>toggle('ddSettings');
document.getElementById('editorBtn').onclick=()=>{ if(!editorBtn.disabled) toggle('ddEditor'); };
document.addEventListener('click',e=>{ if(!e.target.closest('.topbar-right')) closeAll(); });

document.getElementById('shuffleBtn').onclick=()=>{
  shuffleOn=!shuffleOn;
  document.getElementById('shuffleBtn').style.opacity=shuffleOn?'1':'.6';
  renderGrid(); showToast(shuffleOn?'Shuffle an':'Shuffle aus');
};
document.getElementById('uploadBtn').onclick=()=>fileInput.click();
fileInput.onchange=e=>addFiles(e.target.files);
document.getElementById('boardTitle').addEventListener('input',e=>localStorage.setItem('mb_title',e.target.value));
document.getElementById('boardTitle').value=localStorage.getItem('mb_title')||'Moodboard';

document.getElementById('addMoodBtn').onclick=()=>{
  const v=document.getElementById('newMood').value.trim();
  if(!v||moods.includes(v))return; moods.push(v); currentMood=v;
  document.getElementById('newMood').value=''; renderGrid(); renderMoods(); showToast('Mood hinzugefügt');
};
document.getElementById('renameMoodBtn').onclick=()=>{
  const v=document.getElementById('renameMood').value.trim();
  if(!v||currentMood==='All'||moods.includes(v))return;
  const old=currentMood; moods=moods.map(m=>m===old?v:m);
  items=items.map(i=>({...i,mood:i.mood===old?v:i.mood}));
  currentMood=v; document.getElementById('renameMood').value='';
  items.forEach(syncUpdate); renderGrid(); renderMoods(); showToast('Mood umbenannt');
};
document.getElementById('deleteMoodBtn').onclick=()=>{
  const v=document.getElementById('deleteMood').value.trim();
  if(!v||v==='All'||!moods.includes(v))return;
  moods=moods.filter(m=>m!==v);
  items=items.map(i=>({...i,mood:i.mood===v?'All':i.mood}));
  if(currentMood===v)currentMood='All';
  document.getElementById('deleteMood').value='';
  items.forEach(syncUpdate); renderGrid(); renderMoods(); showToast('Mood gelöscht');
};
document.getElementById('clearBtn').onclick=async()=>{
  if(!confirm('Wirklich alle Bilder löschen?'))return;
  items=[]; await syncDeleteAll(); renderGrid(); showToast('Gelöscht');
};

gridWrap.addEventListener('dragover',e=>{ e.preventDefault(); gridWrap.classList.add('dragover'); });
gridWrap.addEventListener('dragleave',()=>gridWrap.classList.remove('dragover'));
gridWrap.addEventListener('drop',e=>{ e.preventDefault(); gridWrap.classList.remove('dragover'); addFiles(e.dataTransfer.files); });

grid.addEventListener('contextmenu',e=>{
  const cell=e.target.closest('.cell'); if(!cell)return;
  e.preventDefault(); openEditor(cell.dataset.id);
});

renderMoods();
loadItems();
</script>
</body>
</html>
