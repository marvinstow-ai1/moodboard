<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Marvin's Place</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230a0a0a'/%3E%3Crect x='5' y='5' width='6' height='6' fill='%23f5f5f5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Topbar ─────────────────────────────────────────── -->
<header class="topbar">
  <button class="brand" id="boardTitle">Marvin's Place</button>

  <nav class="page-nav" id="pageNav">
    <button class="page-nav-btn" id="pageNavBtn">
      <span id="pageNavLabel">Archive</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="page-nav-menu" id="pageNavMenu"></div>
  </nav>

  <div class="topbar-right">
    <span class="item-count" id="itemCount"></span>
    <button class="icon-btn login-btn" id="loginBtn" aria-label="Login">
      <span class="login-dot"></span>
    </button>
    <button class="icon-btn" id="menuBtn" aria-label="Menü">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
  </div>
</header>

<div class="progress" id="progress"></div>

<!-- ── Grid ───────────────────────────────────────────── -->
<main class="gridwrap" id="gridWrap">
  <div class="grid" id="grid"></div>
  <div class="boot-msg" id="bootMsg">Lädt</div>
</main>

<!-- ── Moods-Übersicht ────────────────────────────────── -->
<section class="moods-view" id="moodsView">
  <div class="moods-grid" id="moodsGrid"></div>
</section>

<!-- ── Custom Page ────────────────────────────────────── -->
<section class="custom-page-view" id="customPageView">
  <div class="cpv-inner" id="customPageInner"></div>
</section>

<!-- ── Bottombar ──────────────────────────────────────── -->
<div class="bottombar" id="bottombar">
  <button class="bb-btn" id="shuffleBtn" aria-label="Mischen" title="Mischen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
  </button>
  <button class="bb-btn" id="sortNewestBtn" aria-label="Neueste zuerst" title="Neueste zuerst">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
  </button>
  <button class="bb-btn" id="filterBtn" aria-label="Filter" title="Filter">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"/><line x1="7" y1="16" x2="17" y2="16"/></svg>
  </button>
  <button class="bb-btn" id="spotifyBtn" aria-label="Musik" title="Musik">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  </button>
  <button class="bb-btn" id="moodsMgmtBtn" aria-label="Moods verwalten" title="Moods verwalten">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
  </button>
</div>

<!-- ── Filter-Popup ───────────────────────────────────── -->
<div class="filter-popup" id="filterPopup">
  <div class="fp-label">Moods</div>
  <div class="fp-chips" id="filterChips"></div>
  <div class="fp-label">Spalten</div>
  <div class="fp-cols">
    <button class="fp-step" id="colDec" aria-label="Weniger Spalten">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <div class="fp-track" id="swipeTrack">
      <div class="fp-fill" id="swipeFill"></div>
      <div class="fp-thumb" id="swipeThumb"></div>
    </div>
    <button class="fp-step" id="colInc" aria-label="Mehr Spalten">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><line x1="12" y1="5" x2="12" y2="19"/></svg>
    </button>
    <span class="fp-value" id="swipeValue"></span>
  </div>
</div>

<!-- ── Menü (Dropdown / Sheet) ────────────────────────── -->
<div class="menu-overlay" id="menuOverlay"></div>
<div class="menu" id="menu">
  <div class="menu-handle"></div>

  <div class="menu-section admin-only">
    <div class="menu-label">Hinzufügen</div>
    <button class="menu-item" id="uploadBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 9 12 4 17 9"/><line x1="12" y1="4" x2="12" y2="16"/><line x1="5" y1="20" x2="19" y2="20"/></svg>
      Dateien hochladen
    </button>
    <div class="menu-input-row">
      <input id="quickAddUrl" type="url" placeholder="https:// Bild- oder Video-URL">
      <button id="quickAddBtn">OK</button>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-label">Ansicht</div>
    <button class="menu-item" id="mFilterBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="4" y1="8" x2="20" y2="8"/><line x1="7" y1="16" x2="17" y2="16"/></svg>
      Filter und Spalten
    </button>
    <button class="menu-item" id="mShuffleBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg>
      Neu mischen
    </button>
  </div>

  <div class="menu-section admin-only">
    <div class="menu-label">Verwalten</div>
    <button class="menu-item" id="mSelectBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      Auswählen und löschen
    </button>
    <button class="menu-item" id="mMoodsBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Moods verwalten
    </button>
    <button class="menu-item" id="mPageBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Neue Seite
    </button>
  </div>
</div>

<!-- ── Auswahl-Leiste ─────────────────────────────────── -->
<div class="action-bar" id="actionBar">
  <span class="ab-count" id="abCount">0 ausgewählt</span>
  <span class="ab-spacer"></span>
  <button class="btn" id="abCancel">Abbrechen</button>
  <button class="btn danger" id="abDelete">Löschen</button>
</div>

<!-- ── Lightbox ───────────────────────────────────────── -->
<div class="lightbox" id="lightbox">
  <div class="lb-ambient" id="lbAmbient"></div>
  <div class="lb-top">
    <span class="lb-counter" id="lbCounter"></span>
    <button class="icon-btn" id="lbClose" aria-label="Schließen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
    </button>
  </div>
  <div class="lb-inner" id="lbInner"></div>
  <button class="lb-arrow lb-prev" id="lbPrev" aria-label="Zurück">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="lb-arrow lb-next" id="lbNext" aria-label="Weiter">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="lb-mood-popup" id="lbMoodPopup"></div>
  <div class="lb-bar" id="lbBar">
    <button class="bb-btn" id="lbShare" aria-label="Teilen" title="Link kopieren">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/><polyline points="8 6 12 2 16 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    </button>
    <button class="bb-btn admin-only" id="lbMoodBtn" aria-label="Moods" title="Moods zuweisen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
    </button>
    <button class="bb-btn" id="lbDownload" aria-label="Download" title="Herunterladen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 11 12 16 17 11"/><line x1="12" y1="4" x2="12" y2="16"/><line x1="5" y1="20" x2="19" y2="20"/></svg>
    </button>
    <button class="bb-btn video-only" id="lbMute" aria-label="Ton" title="Ton an/aus">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" id="lbMuteSvg"></svg>
    </button>
    <button class="bb-btn" id="lbSlideshow" aria-label="Slideshow" title="Slideshow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" id="lbSlideshowSvg"><polygon points="6 4 20 12 6 20 6 4"/></svg>
    </button>
  </div>
</div>

<!-- ── Editor-Modal ───────────────────────────────────── -->
<div class="modal" id="editModal">
  <div class="dialog">
    <div class="dialog-title" id="emTitle">Bearbeiten</div>
    <div class="dialog-label">Moods</div>
    <div class="chip-row" id="emChips"></div>
    <div class="dialog-label">Tags</div>
    <input class="field" id="emTags" type="text" placeholder="tag1, tag2">
    <div class="dialog-actions">
      <button class="btn" id="emClose">Schließen</button>
      <button class="btn primary" id="emSave">Speichern</button>
    </div>
  </div>
</div>

<!-- ── Mood erstellen ─────────────────────────────────── -->
<div class="modal" id="moodCreateModal">
  <div class="dialog">
    <div class="dialog-title">Neue Mood</div>
    <input class="field" id="mcmInput" type="text" placeholder="Name" maxlength="30">
    <div class="dialog-error" id="mcmError"></div>
    <div class="dialog-actions">
      <button class="btn" id="mcmCancel">Abbrechen</button>
      <button class="btn primary" id="mcmConfirm">Erstellen</button>
    </div>
  </div>
</div>

<!-- ── Moods verwalten ────────────────────────────────── -->
<div class="modal" id="moodsMgmtPopup">
  <div class="dialog">
    <div class="dialog-title">Moods verwalten</div>
    <div class="mmg-list" id="mmgList"></div>
    <div class="mmg-add">
      <input class="field" id="mmgInput" type="text" placeholder="Neue Mood" maxlength="30">
      <button class="btn" id="mmgAddBtn">OK</button>
    </div>
    <div class="dialog-actions">
      <button class="btn" id="mmgClose">Schließen</button>
    </div>
  </div>
</div>

<!-- ── Seite erstellen ────────────────────────────────── -->
<div class="modal" id="pageCreateModal">
  <div class="dialog">
    <div class="dialog-title">Neue Seite</div>
    <input class="field" id="pcmInput" type="text" placeholder="Seitenname" maxlength="40">
    <div class="dialog-error" id="pcmError"></div>
    <div class="dialog-actions">
      <button class="btn" id="pcmCancel">Abbrechen</button>
      <button class="btn primary" id="pcmConfirm">Erstellen</button>
    </div>
  </div>
</div>

<!-- ── Bestätigen ─────────────────────────────────────── -->
<div class="modal" id="confirmPopup">
  <div class="dialog">
    <div class="dialog-title">Löschen</div>
    <div class="dialog-text" id="cfmText"></div>
    <div class="dialog-actions">
      <button class="btn" id="cfmNo">Abbrechen</button>
      <button class="btn danger" id="cfmYes">Löschen</button>
    </div>
  </div>
</div>

<!-- ── Login ──────────────────────────────────────────── -->
<div class="modal" id="loginModal">
  <div class="dialog">
    <div class="dialog-title">Login</div>
    <input class="field" id="loginEmail" type="email" placeholder="E-Mail" autocomplete="email" value="marvin.stowermann1@gmail.com">
    <input class="field" id="loginPassword" type="password" placeholder="Passwort" autocomplete="current-password">
    <div class="dialog-actions">
      <button class="btn" id="loginClose">Abbrechen</button>
      <button class="btn primary" id="loginSubmit">Einloggen</button>
    </div>
  </div>
</div>

<!-- ── Spotify ────────────────────────────────────────── -->
<div class="spotify-popup" id="spotifyPopup">
  <div id="spotifyEmbed"></div>
</div>

<!-- ── Drop-Overlay / Toast ───────────────────────────── -->
<div class="drop-overlay" id="dropOverlay"><span>Dateien hier ablegen</span></div>
<div class="toast" id="toast"></div>

<input type="file" id="fileInput" accept="image/*,video/*" multiple hidden>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
window.onSpotifyIframeApiReady = (IFrameAPI) => {
  const el = document.getElementById('spotifyEmbed');
  IFrameAPI.createController(el, {
    uri: 'spotify:playlist:2qURpmjeU1eFu9orvltb5I',
    width: '100%',
    height: 152
  }, () => {});
};
</script>
<script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
