<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moodboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--text:#fff;--border:rgba(255,255,255,.12);--panel:rgba(12,12,12,.96)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overflow:hidden}
button,input{font:inherit}
.topbar{position:fixed;top:0;left:0;right:0;z-index:30;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border)}
.board-title{background:transparent;border:0;color:#fff;font-size:16px;font-weight:700;letter-spacing:.04em;outline:none;opacity:.9}
.menubtn{width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:20px;display:grid;place-items:center;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);transition:.15s;letter-spacing:1px}
.menubtn:hover{background:rgba(255,255,255,.13)}
.dropdown{position:fixed;top:58px;right:14px;z-index:40;width:280px;display:none;padding:10px;border:1px solid var(--border);border-radius:18px;background:var(--panel);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6)}
.dropdown.show{display:block}
.dd-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:8px 8px 4px}
.dd-divider{height:1px;background:rgba(255,255,255,.07);margin:6px 0}
.dd-btn{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px}
.dd-btn:hover{background:rgba(255,255,255,.08)}
.dd-btn .icon{width:18px;text-align:center;opacity:.6;font-size:15px}
.dd-input-row{display:flex;gap:6px;padding:4px 2px 6px}
.dd-input-row input{flex:1;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:8px 10px;outline:none;font-size:12px}
.dd-input-row button{border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:8px 10px;cursor:pointer;font-size:12px;white-space:nowrap}
.mood-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.mchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.mchip.active{background:#fff;color:#111;border-color:#fff}
.tag-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.tchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.tchip.active{background:#fff;color:#111;border-color:#fff}
.editor-wrap{display:none}
.editor-wrap.show{display:block}
.shufflebtn{position:fixed;bottom:20px;right:20px;z-index:30;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:19px;display:grid;place-items:center;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.3);transition:.15s}
.shufflebtn:hover{background:rgba(255,255,255,.13)}
.shufflebtn.on{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.35)}
.gridwrap{position:fixed;inset:52px 0 0 0;overflow-y:auto;overflow-x:hidden}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:2px;padding:2px}
.cell{position:relative;overflow:hidden;background:#111;aspect-ratio:9/16;cursor:pointer}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block;transition:.3s}
.cell:hover img,.cell:hover video{transform:scale(1.04)}
.lightbox{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px)}
.lightbox.show{display:flex}
.lb-inner{position:relative;max-width:92vw;max-height:92vh}
.lb-inner img,.lb-inner video{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:10px;display:block}
.lb-close{position:absolute;top:-14px;right:-14px;width:32px;height:32px;background:rgba(255,255,255,.1);border:1px solid var(--border);border-radius:999px;color:#fff;font-size:16px;cursor:pointer;display:grid;place-items:center}
.progress{position:fixed;top:0;left:0;height:2px;background:#fff;z-index:100;width:0;transition:width .25s}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:100;background:rgba(0,0,0,.85);border:1px solid var(--border);color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}
.toast.show{opacity:1}
.hidden{display:none!important}
@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.dropdown{width:calc(100vw - 28px)}}
</style>
</head>
<body>

<div class="topbar">
  <input class="board-title" id="boardTitle" value="Moodboard">
  <button class="menubtn"
