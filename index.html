<style>
:root{--bg:#050505;--text:#fff;--border:rgba(255,255,255,.12);--panel:rgba(12,12,12,.96)}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overscroll-behavior-y:none;-webkit-text-size-adjust:100%;padding-top:24px;padding-bottom:96px}
html.no-scroll{overflow:hidden;height:100%}
body.no-scroll{position:fixed;left:0;right:0;width:100%;overflow:hidden;height:100%}
button,input{font:inherit}
.topbar{position:sticky;top:0;z-index:30;height:72px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;gap:16px;background:var(--bg)}
.topbar-left{display:flex;align-items:center;gap:24px}
.board-title{background:transparent;border:0;color:#fff;font-size:20px;font-weight:700;letter-spacing:.04em;cursor:pointer;opacity:.95;user-select:none;padding:4px 0}
.board-title:hover{opacity:1}
.nav-link{background:transparent;border:0;color:#fff;font-size:14px;font-weight:500;cursor:pointer;opacity:.4;user-select:none;padding:4px 0;transition:.15s;letter-spacing:.02em}
.nav-link:hover{opacity:.7}
.nav-link.active{opacity:1}
.menubtn{width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(16px);transition:.15s;flex-shrink:0}
.menubtn:hover{background:rgba(255,255,255,.13)}
.dropdown{position:fixed;top:58px;right:14px;z-index:40;width:290px;display:none;padding:10px;border:1px solid var(--border);border-radius:18px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6);max-height:calc(100vh - 80px);overflow-y:auto}
.dropdown.show{display:block}
.sheet-overlay{position:fixed;inset:0;z-index:38;background:rgba(0,0,0,.5);display:none;backdrop-filter:blur(4px)}
.sheet-overlay.show{display:block}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:39;background:var(--panel);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:16px 16px 40px;max-height:85vh;overflow-y:auto;display:none;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
.bottom-sheet.show{display:block;transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);margin:0 auto 16px}
.dd-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:8px 8px 4px}
.dd-tabs{display:flex;gap:2px;padding:3px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.dd-tab{flex:1;border:0;background:transparent;color:#fff;opacity:.55;border-radius:9px;padding:7px 4px;font-size:10.5px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;transition:.15s}
.dd-tab:hover{opacity:.85;background:rgba(255,255,255,.04)}
.dd-tab.active{background:rgba(255,255,255,.12);opacity:1}
.dd-panel{display:none;flex-direction:column;gap:2px}
.dd-panel.show{display:flex}
.dropdown:has(.editor-wrap.show) .dd-tabs,
.dropdown:has(.editor-wrap.show) .dd-panel{display:none}
.bottom-sheet:has(.editor-wrap.show) .dd-tabs,
.bottom-sheet:has(.editor-wrap.show) .dd-panel{display:none}
.dd-divider{height:1px;background:rgba(255,255,255,.07);margin:6px 0}
.dd-btn{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px}
.dd-btn:hover{background:rgba(255,255,255,.08)}
.dd-btn .icon{width:18px;text-align:center;opacity:.6;font-size:15px}
.dd-input-row{display:flex;gap:6px;padding:4px 2px 6px}
.dd-input-row input{flex:1;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:10px;outline:none;font-size:14px}
.dd-input-row button{border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;white-space:nowrap}
.mgmt-section{display:none;padding:10px;background:rgba(255,255,255,.03);border-radius:12px;margin:5px 0}
.mgmt-section.show{display:block}
.mood-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.mchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.mchip.active{background:#fff;color:#111;border-color:#fff}
.tag-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.tchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.tchip.active{background:#fff;color:#111;border-color:#fff}
.editor-wrap{display:none}
.editor-wrap.show{display:block}
.bottombar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:2px;background:rgba(10,10,10,.75);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:6px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.bottombar-btn{width:42px;height:42px;border-radius:999px;border:none;background:transparent;color:#fff;cursor:pointer;font-size:19px;display:grid;place-items:center;transition:.15s;padding:0;flex-shrink:0}
.bottombar-btn:hover{background:rgba(255,255,255,.1)}
.bottombar-btn:focus{outline:none}
.bottombar-btn.active{background:rgba(255,255,255,.14)}
.bottombar-divider{width:1px;height:18px;background:rgba(255,255,255,.1);margin:0 2px;flex-shrink:0}
#spotifyBtn svg{width:22px;height:22px;display:block}
#filterBtn svg{width:20px;height:20px;display:block}
/* ── View Transition Animations ──────────────────────── */
.gridwrap{position:relative;transition:transform .5s cubic-bezier(.32,1,.23,1),opacity .5s cubic-bezier(.32,1,.23,1);transform-origin:50% 0}
.gridwrap.hide-view{transform:scale(.85) translateY(-20px);opacity:0;pointer-events:none}
.gridwrap.show-view{animation:gridFadeIn .5s cubic-bezier(.32,1,.23,1) forwards}
@keyframes gridFadeIn{
  0%{transform:scale(.85) translateY(-20px);opacity:0}
  100%{transform:scale(1) translateY(0);opacity:1}
}

.moods-view{position:relative;visibility:hidden;background:var(--bg);transform:scale(.85) translateY(20px);opacity:0;pointer-events:none;transition:transform .5s cubic-bezier(.32,1,.23,1),opacity .5s cubic-bezier(.32,1,.23,1),visibility .5s cubic-bezier(.32,1,.23,1);transform-origin:50% 0}
.moods-view.show{visibility:visible;transform:scale(1) translateY(0);opacity:1;pointer-events:auto}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:2px;padding:2px}
.cell{position:relative;overflow:hidden;background:#111;aspect-ratio:9/16;cursor:pointer;contain:strict}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.cell:hover img,.cell:hover video{transform:scale(1.04)}
.cell.sel-highlight{outline:2px solid #fff;outline-offset:-2px}
.selcheck{position:absolute;top:8px;left:8px;z-index:2;width:20px;height:20px;accent-color:#fff;opacity:0;pointer-events:none;cursor:pointer}
.selcheck.visible{opacity:1;pointer-events:auto}
.cell-heart {
  position: absolute;
  top: 8px; right: 8px;
  z-index: 3;
  font-size: 16px;
  opacity: 0;
  pointer-events: none;
  transform: scale(0.6);
  transition: opacity .2s, transform .2s;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.5));
  line-height: 1;
}
.cell-heart.visible {
  opacity: 1;
  transform: scale(1);
}
/* Pop-Animation beim Favorisieren */
@keyframes heartPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.55); }
  70%  { transform: scale(0.88); }
  100% { transform: scale(1); }
}
.cell-heart.pop { animation: heartPop .38s cubic-bezier(.36,.07,.19,.97); }

/* Großes Herz-Flash im Bild-Zentrum (wie Instagram) */
.heart-flash {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 72px;
  pointer-events: none;
  opacity: 0;
}
@keyframes flashHeart {
  0%   { opacity: 0; transform: scale(0.5); }
  25%  { opacity: 1; transform: scale(1.2); }
  60%  { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1); }
}
.heart-flash.play { animation: flashHeart .6s ease forwards; }

/* Wenn Favoriten-Filter aktiv ist */
#favBtn.fav-active { color: #ff4d6d; }

.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:14px 16px 32px;background:linear-gradient(to top,rgba(0,0,0,.97) 70%,transparent);display:none;flex-direction:column;gap:10px}
.action-bar.show{display:flex}
.action-bar-title{font-size:11px;opacity:.5;text-transform:uppercase;letter-spacing:.08em}
.action-bar-moods{display:flex;flex-wrap:wrap;gap:6px}
.ab-chip{border:1px solid var(--border);background:rgba(255,255,255,.07);color:#fff;border-radius:999px;padding:8px 16px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.ab-chip:hover{background:rgba(255,255,255,.15)}
.ab-chip.sel{background:#fff;color:#111;border-color:#fff}
.action-bar-actions{display:flex;gap:8px}
.ab-act{flex:1;border:1px solid var(--border);border-radius:12px;padding:11px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
.ab-act.confirm{background:#fff;color:#111;border-color:#fff}
.ab-act.confirm:hover{background:#ddd}
.ab-act.cancel{background:rgba(255,255,255,.06);color:#fff}
.ab-act.cancel:hover{background:rgba(255,255,255,.12)}
.ab-act.remove{background:rgba(255,60,60,.15);color:#ff6b6b;border-color:rgba(255,60,60,.3)}
.ab-act.remove:hover{background:rgba(255,60,60,.25)}
.ab-count{font-size:12px;opacity:.5}

/* ── LIGHTBOX ────────────────────────────────────────── */
.lightbox {
  position: fixed; inset: 0; z-index: 80;
  background: rgba(0,0,0,.86);
  display: none; flex-direction: column;
  align-items: stretch;
  backdrop-filter: blur(10px);
  touch-action: pan-y; overflow: hidden;
}
.lightbox.show { display: flex; }

.lb-ambient {
  position: absolute; inset: -15%; z-index: 0;
  pointer-events: none; opacity: 0;
  transition: opacity .8s ease;
  background: radial-gradient(45% 55% at 28% 30%,var(--ambient-1,rgba(80,90,140,.55)),transparent 70%),radial-gradient(45% 55% at 72% 70%,var(--ambient-2,rgba(140,70,120,.45)),transparent 70%);
  filter: blur(60px) saturate(1.65);
  will-change: opacity;
}
.lightbox.show .lb-ambient { opacity: 1; }

.lb-topbar {
  flex-shrink: 0; height: 64px;
  display: flex; align-items: center;
  justify-content: flex-end;
  padding: 0 16px; z-index: 2; position: relative;
}

.lb-stage {
  flex: 1; position: relative;
  display: flex; align-items: center;
  justify-content: center; min-height: 0;
  z-index: 1;
}

.lb-inner {
  position: absolute; inset: 0;
  display: flex; align-items: center;
  justify-content: center;
}
.lb-inner img, .lb-inner video {
  max-width: 100%; max-height: 100%;
  width: auto; height: auto;
  object-fit: contain;
  border-radius: 0; display: block;
  user-select: none;
}
.lb-inner video { pointer-events: auto; }

/* Pfeile innerhalb .lb-stage */
.lb-arrow {
  position: absolute; top: 50%;
  transform: translateY(-50%); z-index: 3;
  width: 40px; height: 40px; border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,.08); color: #fff;
  font-size: 18px; cursor: pointer;
  display: grid; place-items: center;
  backdrop-filter: blur(10px); transition: .15s;
}
.lb-arrow:hover { background: rgba(255,255,255,.18); }
.lb-arrow.prev { left: 14px; }
.lb-arrow.next { right: 14px; }
.lb-topbar, .lb-bottombar, .lb-arrow {
  transition: opacity .6s ease;
}

.lb-bottombar {
  flex-shrink: 0; height: 72px;
  display: flex; align-items: center;
  justify-content: center;
  padding: 0 20px; gap: 10px; z-index: 2;
  position: relative;
}

/* Herz-Button */
.lb-bar-heart, .lb-pill-toggle {
  width: 42px; height: 42px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.08); color: #fff;
  cursor: pointer; display: grid; place-items: center;
  backdrop-filter: blur(16px);
  transition: background .15s, color .2s; flex-shrink: 0;
}
.lb-bar-heart:hover, .lb-pill-toggle:hover {
  background: rgba(255,255,255,.18);
}
.lb-bar-heart.is-fav {
  color: #ff4d6d; border-color: rgba(255,77,109,.4);
}
.lb-bar-heart.is-fav svg path { fill: #ff4d6d; }
.lb-pill-toggle.open { background: rgba(255,255,255,.18); }

/* Expandierende Pill */
.lb-pill {
  display: flex; align-items: center; gap: 2px;
  background: rgba(10,10,10,.75);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 999px; padding: 4px;
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  overflow: hidden;
  max-width: 0; opacity: 0; pointer-events: none;
  padding-left: 0; padding-right: 0;
  transition: max-width .35s cubic-bezier(.32,1,.23,1),
              opacity .25s ease,
              padding .35s cubic-bezier(.32,1,.23,1);
}
.lb-pill.open {
  max-width: 200px; opacity: 1;
  pointer-events: auto; padding: 4px;
}
.lb-pill-btn {
  width: 38px; height: 38px; border-radius: 999px;
  border: none; background: transparent; color: #fff;
  cursor: pointer; display: grid; place-items: center;
  transition: background .15s; flex-shrink: 0;
}
.lb-pill-btn:hover { background: rgba(255,255,255,.1); }
.lb-pill-div {
  width: 1px; height: 18px;
  background: rgba(255,255,255,.1);
  flex-shrink: 0; margin: 0 2px;
}

/* Mute-Button + Divider: nur bei Video */
#lbPillMute, #lbPillMuteDiv { display: none; }
.lightbox.has-video #lbPillMute,
.lightbox.has-video #lbPillMuteDiv { display: flex; }
#lbPillMuteDiv { display: none; }
.lightbox.has-video #lbPillMuteDiv { display: block; }
#lbPillSlideshow.active {
  background: rgba(255,255,255,.15);
}

/* Mood-Popup */
.lb-mood-popup {
  position: absolute; bottom: 82px; left: 50%;
  transform: translateX(-50%) translateY(8px) scale(.96);
  transform-origin: 50% 100%; z-index: 95;
  width: min(300px, calc(100vw - 40px));
  background: rgba(10,10,10,.92);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 18px; padding: 12px;
  display: flex; flex-wrap: wrap; gap: 6px;
  backdrop-filter: blur(24px);
  box-shadow: 0 20px 50px rgba(0,0,0,.6);
  opacity: 0; pointer-events: none;
  transition: opacity .22s ease,
              transform .22s cubic-bezier(.2,.8,.2,1);
}
.lb-mood-popup.show {
  opacity: 1; pointer-events: auto;
  transform: translateX(-50%) translateY(0) scale(1);
}
.lb-mood-chip {
  border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.07);
  color: #fff; border-radius: 999px;
  padding: 6px 14px; font-size: 12px;
  cursor: pointer; transition: .12s;
  font-family: inherit;
}
.lb-mood-chip.active {
  background: #fff; color: #111;
  border-color: #fff;
}

/* Close-Button Mobile */
.lb-close-btn {
  width: 40px; height: 40px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.08); color: #fff;
  cursor: pointer; display: grid; place-items: center;
  backdrop-filter: blur(16px); transition: background .15s;
}
.lb-close-btn:hover { background: rgba(255,255,255,.18); }

/* Share-Popup: über der Bottombar zentriert */
.share-popup {
  position: absolute; bottom: 82px; left: 50%;
  transform: translateX(-50%) translateY(8px) scale(.96);
  transform-origin: 50% 100%; z-index: 95;
  width: min(340px, calc(100vw - 40px));
  border: 1px solid var(--border);
  border-radius: 14px; background: var(--panel);
  backdrop-filter: blur(24px);
  box-shadow: 0 20px 50px rgba(0,0,0,.6);
  padding: 10px;
  display: flex; gap: 8px; align-items: center;
  opacity: 0; pointer-events: none;
  transition: opacity .22s ease, transform .22s cubic-bezier(.2,.8,.2,1);
}
.share-popup.show {
  opacity: 1; pointer-events: auto;
  transform: translateX(-50%) translateY(0) scale(1);
}
.share-popup input {
  flex:1; min-width:0;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border); color:#fff;
  border-radius:8px; padding:8px 10px;
  font-size:12px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  outline:none; text-overflow:ellipsis;
}
.share-popup button {
  border:1px solid #fff; background:#fff; color:#111;
  border-radius:8px; padding:8px 12px;
  font-size:12px; font-weight:600; cursor:pointer;
  flex-shrink:0; transition:.15s;
}
.share-popup button:hover { background:#ddd; }

/* Sleep-Mode: UI ausblenden */
.lightbox.sleep .lb-topbar,
.lightbox.sleep .lb-bottombar,
.lightbox.sleep .lb-arrow,
.lightbox.sleep .lb-mood-popup,
.lightbox.sleep .share-popup {
  opacity: 0;
  pointer-events: none;
}

/* ── DESKTOP (min-width: 601px) ── */
@media (min-width: 601px) {
  .lightbox { flex-direction: row; }
  .lb-topbar { display: none; }
  .lb-stage { flex: 1; height: 100%; }
  .lb-bottombar {
    width: 72px; height: 100%; flex-direction: column;
    justify-content: center; padding: 20px 0; gap: 10px;
    border-left: 1px solid rgba(255,255,255,.08);
    background: rgba(0,0,0,.3);
    backdrop-filter: blur(16px);
  }
  .lb-pill {
    flex-direction: column;
    max-width: unset; max-height: 0;
    padding-top: 0; padding-bottom: 0;
    transition: max-height .35s cubic-bezier(.32,1,.23,1),
                opacity .25s ease,
                padding .35s cubic-bezier(.32,1,.23,1);
  }
  .lb-pill.open {
    max-width: unset; max-height: 200px; padding: 4px;
  }
  .lb-pill-div { width: 18px; height: 1px; margin: 2px 0; }
  .lb-mood-popup {
    bottom: auto; left: auto; right: 82px; top: 50%;
    transform: translateY(-50%) translateX(8px) scale(.96);
    transform-origin: 100% 50%;
  }
  .lb-mood-popup.show {
    transform: translateY(-50%) translateX(0) scale(1);
  }
  .share-popup {
    bottom: auto; left: auto; right: 82px; top: 50%;
    transform: translateY(-50%) translateX(8px) scale(.96);
    transform-origin: 100% 50%;
  }
  .share-popup.show {
    transform: translateY(-50%) translateX(0) scale(1);
  }
  .lb-arrow { display: none; } /* Desktop: Tastatur/Klick reicht */
}
@media (max-width: 600px) {
  .lb-arrow { display: none; } /* Mobile: Swipe reicht */
}

.progress{position:fixed;top:0;left:0;height:2px;background:#fff;z-index:100;width:0;transition:width .25s}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:102;background:rgba(0,0,0,.85);border:1px solid var(--border);color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}
.toast.show{opacity:1}
.gridwrap.dragover::after{content:"Loslassen zum Hochladen";position:fixed;inset:52px 0 0 0;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(0,0,0,.5);border:2px dashed rgba(255,255,255,.3)}
.hidden{display:none!important}

@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.dropdown{display:none!important}}
@media(min-width:601px){.bottom-sheet,.sheet-overlay{display:none!important}}

/* ── Filter & Spotify Popups ────────────────────────────── */

.spotify-popup{position:fixed;bottom:80px;left:50%;z-index:35;width:min(420px,calc(100vw - 120px));border:1px solid var(--border);border-radius:18px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6);overflow:hidden;opacity:0;pointer-events:none;transform:translateX(-50%) translateY(12px) scale(.96);transform-origin:50% 100%;transition:opacity .28s ease, transform .28s cubic-bezier(.2,.8,.2,1)}
.spotify-popup.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0) scale(1)}
.spotify-popup iframe{width:100%;height:352px;border:0;display:block;border-radius:12px}



/* ── Filter Popup (Grid Columns) ───────────────────────── */
.filter-popup{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:35;width:280px;display:none;flex-direction:column;gap:14px;padding:16px;border:1px solid var(--border);border-radius:18px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6)}
.filter-popup.show{display:flex}
.fp-header{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;text-align:center}
.fp-divider{height:1px;background:rgba(255,255,255,.07);margin:8px 0}
.fp-sort-btn{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;transition:.12s}
.fp-sort-btn:hover{background:rgba(255,255,255,.08)}
.fp-sort-btn.active{background:rgba(255,255,255,.12)}
.fp-sort-btn .fp-sort-icon{font-size:15px;opacity:.6;width:18px;text-align:center}
.fp-sort-btn.active .fp-sort-icon{opacity:1}

/* ── Swipe Control (inside popup) ──────────────────────── */
.swipe-control{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;width:100%;height:44px}
.swipe-arrow{width:28px;height:28px;border-radius:999px;border:none;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:13px;display:grid;place-items:center;transition:.12s;flex-shrink:0;padding:0;line-height:1}
.swipe-arrow:hover{background:rgba(255,255,255,.18)}
.swipe-arrow:active{transform:scale(.9)}
.swipe-track-wrap{flex:1;position:relative;height:36px;display:flex;align-items:center}
.swipe-track{position:relative;width:100%;height:4px;background:rgba(255,255,255,.12);border-radius:999px;overflow:visible}
.swipe-fill{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.4);border-radius:999px;pointer-events:none;transition:width .08s ease}
.swipe-thumb{position:absolute;top:50%;z-index:2;width:32px;height:32px;border-radius:999px;background:#fff;color:#111;font-size:12px;font-weight:700;display:grid;place-items:center;box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:grab;transition:left .08s ease,box-shadow .15s;transform:translate(-50%,-50%);will-change:left}
.swipe-thumb:active{cursor:grabbing;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.swipe-thumb.dragging{transition:none}
/* ── Moods View ───────────────────────────────────────── */
.moods-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:2px;padding:2px}
.mood-tile{position:relative;overflow:hidden;background:#111;cursor:pointer;transition:transform .2s, box-shadow .2s;contain:strict;aspect-ratio:1}
.mood-tile:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.5)}
.mood-tile img,.mood-tile video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;background:#111}
.mood-tile .mt-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.25) 45%,rgba(0,0,0,0) 70%);pointer-events:none}
.mood-tile .mt-label{position:absolute;left:14px;right:14px;bottom:12px;color:#fff;font-size:15px;font-weight:700;letter-spacing:.02em;display:flex;align-items:center;gap:8px;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.6)}
.mood-tile .mt-icon{font-size:17px}
.mood-tile .mt-count{font-size:10px;font-weight:500;opacity:.75;margin-left:auto}
.mood-tile .mt-empty{position:absolute;inset:0;display:grid;place-items:center;color:rgba(255,255,255,.35);font-size:13px}
@media(max-width:600px){
  .moods-grid{grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:2px;padding:2px}
  .mood-tile .mt-label{font-size:13px;bottom:10px;left:10px;right:10px}
}

/* ── Create Mood Tile + Modal ─────────────────────────── */
.mood-tile-create{background:rgba(255,255,255,.04);border:1.5px dashed rgba(255,255,255,.18);cursor:pointer;display:grid;place-items:center;transition:background .18s,border-color .18s,transform .18s}
.mood-tile-create:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.4);transform:translateY(-2px)}
.mood-tile-create .mtc-inner{display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,.7);pointer-events:none}
.mood-tile-create .mtc-plus{width:48px;height:48px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;font-size:26px;display:grid;place-items:center;backdrop-filter:blur(16px);font-weight:300;line-height:1}
.mood-tile-create .mtc-label{font-size:13px;font-weight:600;letter-spacing:.02em;opacity:.85}

.mood-create-modal{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:20px}
.mood-create-modal.show{display:flex}
.mcm-content{width:min(380px,100%);background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:0 24px 60px rgba(0,0,0,.7)}
.mcm-title{font-size:15px;font-weight:700;margin-bottom:14px;letter-spacing:.02em}
.mcm-input{width:100%;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:12px 14px;outline:none;font-size:14px;margin-bottom:14px}
.mcm-input:focus{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.09)}
.mcm-actions{display:flex;gap:8px}
.mcm-btn{flex:1;border:1px solid var(--border);border-radius:11px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.mcm-btn.cancel{background:rgba(255,255,255,.06);color:#fff}
.mcm-btn.cancel:hover{background:rgba(255,255,255,.12)}
.mcm-btn.confirm{background:#fff;color:#111;border-color:#fff}
.mcm-btn.confirm:hover{background:#ddd}
.mcm-btn:disabled{opacity:.4;cursor:not-allowed}
.mcm-error{font-size:12px;color:#ff7373;margin-top:-8px;margin-bottom:12px;min-height:14px;opacity:0;transition:opacity .15s}
.mcm-error.show{opacity:1}
/* ── Confirm Delete Popup ──────────────────────────── */
.confirm-popup{position:fixed;inset:0;z-index:95;background:rgba(0,0,0,.78);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:20px}
.confirm-popup.show{display:flex}
.cfm-content{width:min(360px,100%);background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:28px 20px 20px;box-shadow:0 24px 60px rgba(0,0,0,.7);position:relative}
.cfm-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:13px;display:grid;place-items:center;transition:.15s;flex-shrink:0;padding:0;line-height:1}
.cfm-close:hover{background:rgba(255,255,255,.13)}
.cfm-close svg{width:16px;height:16px;display:block}
.cfm-text{font-size:15px;font-weight:500;line-height:1.5;margin:10px 0 22px;text-align:center;letter-spacing:.01em}
.cfm-text .cfm-mood-name{font-weight:700;color:#fff}
.cfm-actions{display:flex;gap:10px}
.cfm-btn{flex:1;border:1px solid var(--border);border-radius:11px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.cfm-btn.cancel{background:rgba(255,255,255,.06);color:#fff}
.cfm-btn.cancel:hover{background:rgba(255,255,255,.12)}
.cfm-btn.confirm{background:#ff4d4d;color:#fff;border-color:#ff4d4d}
.cfm-btn.confirm:hover{background:#e04444}
/* ── Moods Management Popup ──────────────────────────── */
.moods-mgmt-popup{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:20px}
.moods-mgmt-popup.show{display:flex}
.mmg-content{width:min(420px,calc(100vw - 40px));max-height:80vh;background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:20px;box-shadow:0 24px 60px rgba(0,0,0,.7);overflow-y:auto}
.mmg-title{font-size:15px;font-weight:700;margin-bottom:14px;letter-spacing:.02em}
.mmg-list{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.mmg-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid transparent;transition:.12s}
.mmg-item:hover{background:rgba(255,255,255,.08)}
.mmg-item .mmg-icon{font-size:18px;width:24px;text-align:center}
.mmg-item .mmg-name{flex:1;font-size:14px;font-weight:500}
.mmg-item .mmg-count{font-size:11px;opacity:.5}
.mmg-item .mmg-del{width:28px;height:28px;border-radius:999px;border:none;background:rgba(255,60,60,.15);color:#ff6b6b;cursor:pointer;font-size:14px;display:grid;place-items:center;transition:.12s;flex-shrink:0}
.mmg-item .mmg-del:hover{background:rgba(255,60,60,.3)}
.mmg-add-row{display:flex;gap:6px;margin-bottom:14px}
.mmg-add-row input{flex:1;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:10px 12px;outline:none;font-size:14px}
.mmg-add-row input:focus{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.09)}
.mmg-add-row button{border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;transition:.12s}
.mmg-add-row button:hover{background:rgba(255,255,255,.15)}

<script type="module">
// MIGRATION: ALTER TABLE moodboard_items ADD COLUMN IF NOT EXISTS favorite BOOLEAN DEFAULT FALSE;
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = process.env.NEXT_PUBLIC_SUPABASE_URL;
const SUPABASE_KEY = process.env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY;
const BUCKET = 'moodboard';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const DEFAULT_MOODS = ['All','Summer','Winter','Cozy','Dark'];
function loadMoodsList(){
  try{
    const v = JSON.parse(localStorage.getItem('mb_moods_list')||'null');
    if(Array.isArray(v) && v.length && v[0]==='All') return v;
  }catch(e){}
  return [...DEFAULT_MOODS];
}
function saveMoodsList(){
  try{ localStorage.setItem('mb_moods_list', JSON.stringify(state.moodboard.moods)); }catch(e){}
}

const state = {
  moodboard: { items:[], currentItems:[], moods: loadMoodsList(), currentMood: localStorage.getItem('mb_mood')||'All', table:'moodboard_items' }
};
let currentPage = 'moodboard';
const S = () => state[currentPage];

let editId=null, lbIndex=0, selMode=null, lbIsMuted=false;
let selectedIds=new Set();
let _observer = null;
let favFilterActive = false;
let sortNewest = localStorage.getItem('sort_newest') === 'true';
let sleepTimeout = null;
const SLIDESHOW_INTERVAL = 5000;
let slideshowActive = false;
let slideshowTimer  = null;

const $ = id => document.getElementById(id);

// ── DOM refs ────────────────────────────────────────────
const gridEl         = $('grid');
const gridWrap       = $('gridWrap');
const dropdown       = $('dropdown');
const bottomSheet    = $('bottomSheet');
const sheetOverlay   = $('sheetOverlay');
const lightbox       = $('lightbox');
const lbInner        = $('lbInner');
const fileInput      = $('fileInput');
const progressBar    = $('progress');
const toastEl        = $('toast');
const editorWrap     = $('editorWrap');
const actionBar      = $('actionBar');
const actionBarMoods = $('actionBarMoods');
const actionBarCount = $('actionBarCount');
const actionBarTitle = $('actionBarTitle');
const lbAmbient      = $('lbAmbient');
const MAX_PX         = 2400;

// ── Share Link (deep link to a single item) ─────────────
function buildShareUrl(it){
  return `${location.origin}${location.pathname}#mb=${encodeURIComponent(it.id)}`;
}
async function copyText(text){
  try { await navigator.clipboard.writeText(text); return true; }
  catch(e){
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
      return true;
    } catch(e2){ return false; }
  }
}
function openSharePopup(){
  const it = S().currentItems[lbIndex]; if(!it) return;
  $('sharePopupUrl').value = buildShareUrl(it);
  $('sharePopup').classList.add('show');
  setTimeout(() => { try { $('sharePopupUrl').select(); } catch(e){} }, 80);
}
function closeSharePopup(){ $('sharePopup').classList.remove('show'); }
function parseShareHash(){
  const m = (location.hash || '').slice(1).match(/^mb=(.+)$/);
  if(!m) return null;
  return { id: decodeURIComponent(m[1]) };
}
let pendingShare = parseShareHash();
function tryOpenPendingShare(){
  if(!pendingShare) return;
  const it = S().items.find(x => x.id === pendingShare.id);
  if(!it){ if(S().items.length){ pendingShare = null; toast('Geteiltes Item nicht gefunden'); } return; }
  let idx = S().currentItems.findIndex(x => x.id === pendingShare.id);
  if(idx < 0){ S().currentItems = [it, ...S().currentItems]; idx = 0; }
  pendingShare = null;
  openLightbox(idx);
}
window.addEventListener('hashchange', () => {
  const p = parseShareHash();
  if(p){ pendingShare = p; tryOpenPendingShare(); }
});

// ── Ambient Mode (lightbox background glow) ─────────────
const ambientCache = new Map();
const AMBIENT_DEFAULT_1 = 'rgba(80,90,140,.5)';
const AMBIENT_DEFAULT_2 = 'rgba(140,70,120,.45)';
function getDominantColor(url){
  if(ambientCache.has(url)) return Promise.resolve(ambientCache.get(url));
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const W=16, H=16;
        const c = document.createElement('canvas');
        c.width=W; c.height=H;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, W, H);
        const d = ctx.getImageData(0,0,W,H).data;
        let r=0,g=0,b=0,n=0;
        for(let i=0; i<d.length; i+=4){
          if(d[i+3] < 128) continue;
          // skip near-black/near-white pixels to avoid muddy averages
          const lum = (d[i]+d[i+1]+d[i+2])/3;
          if(lum < 18 || lum > 240) continue;
          r += d[i]; g += d[i+1]; b += d[i+2]; n++;
        }
        const color = n ? [Math.round(r/n), Math.round(g/n), Math.round(b/n)] : null;
        ambientCache.set(url, color);
        resolve(color);
      } catch(e){ ambientCache.set(url, null); resolve(null); }
    };
    img.onerror = () => { ambientCache.set(url, null); resolve(null); };
    img.src = url;
  });
}
function applyAmbient(c1, c2){
  lbAmbient.style.setProperty('--ambient-1', c1);
  lbAmbient.style.setProperty('--ambient-2', c2);

async function setAmbientFor(it){
  // fade out before swap so transitions feel intentional
  lbAmbient.style.opacity = '0';
  let c1 = AMBIENT_DEFAULT_1, c2 = AMBIENT_DEFAULT_2;
  if(it.media_type !== 'video'){
    const color = await getDominantColor(it.media_url);
    if(color){
      const [r,g,b] = color;
      c1 = `rgba(${r},${g},${b},.6)`;
      c2 = `rgba(${Math.min(255,r+35)},${Math.max(0,g-10)},${Math.min(255,b+50)},.5)`;
    }
  }
  // bail if user navigated away
  if(!lightbox.classList.contains('show') || S().currentItems[lbIndex] !== it) return;
  applyAmbient(c1, c2);
  requestAnimationFrame(() => { lbAmbient.style.opacity = ''; });
}

// ── Grid Column Swipe Control ──────────────────────────────
function getColRange(){
  return window.innerWidth <= 600
    ? { min: 1, max: 5 }
    : { min: 3, max: 10 };
}
function getDefaultCols(){
  const r = getColRange();
  return Math.round((r.min + r.max) / 2);
}

let gridCols = (() => {
  const saved = localStorage.getItem('grid_cols');
  if(saved !== null){ const v = parseInt(saved); if(v >= getColRange().min && v <= getColRange().max) return v; }
  return getDefaultCols();
})();

function saveFilterState(){
  localStorage.setItem('active_moods', JSON.stringify([...activeMoods]));
  localStorage.setItem('grid_cols', String(gridCols));
}

function applyGridCols(cols){
  gridCols = cols;
  document.getElementById('grid').style.gridTemplateColumns =
    cols === 1 ? '1fr' : `repeat(${cols}, 1fr)`;
  updateSwipeUI();
  saveFilterState();
}

// ── Swipe Control DOM ──────────────────────────────────────
const swipeThumb = document.getElementById('swipeThumb');
const swipeTrack = document.getElementById('swipeTrack');
const swipeFill  = document.getElementById('swipeFill');
const swipeValue = document.getElementById('swipeValue');
const colDec     = document.getElementById('colDec');
const colInc     = document.getElementById('colInc');

function updateSwipeUI(){
  const r = getColRange();
  const pct = r.max > r.min ? ((gridCols - r.min) / (r.max - r.min)) * 100 : 50;
  swipeThumb.style.left = pct + '%';
  swipeFill.style.width = pct + '%';
  swipeValue.textContent = gridCols;
}

// ── Mouse / Touch Drag ─────────────────────────────────────
let _drag = false;

function startDrag(e){
  _drag = true;
  swipeThumb.classList.add('dragging');
  e.preventDefault();
}
function moveDrag(cx){
  if(!_drag) return;
  const rect = swipeTrack.getBoundingClientRect();
  let pct = (cx - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  const r = getColRange();
  const cols = Math.round(r.min + pct * (r.max - r.min));
  if(cols !== gridCols) applyGridCols(cols);
}
function endDrag(){
  if(!_drag) return;
  _drag = false;
  swipeThumb.classList.remove('dragging');
}

// Touch
swipeThumb.addEventListener('touchstart', startDrag, { passive: false });
document.addEventListener('touchmove', e => { if(_drag) moveDrag(e.touches[0].clientX); }, { passive: true });
document.addEventListener('touchend', endDrag, { passive: true });
// Mouse
swipeThumb.addEventListener('mousedown', startDrag);
document.addEventListener('mousemove', e => { if(_drag) moveDrag(e.clientX); });
document.addEventListener('mouseup', endDrag);

// Click on track to jump
swipeTrack.addEventListener('click', e => {
  if(e.target === swipeThumb) return;
  moveDrag(e.clientX);
});

// Arrow buttons
colDec.onclick = () => {
  const r = getColRange();
  if(gridCols > r.min) applyGridCols(gridCols - 1);
};
colInc.onclick = () => {
  const r = getColRange();
  if(gridCols < r.max) applyGridCols(gridCols + 1);
};

function bindQuickAdd(suffix){

function toast(t){ toastEl.textContent=t; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),1600); }
function isVid(n){ return /\.(mp4|webm|mov|m4v)$/i.test(n||''); }
function prog(p){ progressBar.style.width=p+'%'; if(p>=100) setTimeout(()=>progressBar.style.width='0',600); }
function compress(file, maxPx=MAX_PX, q=0.88){
  return new Promise(res=>{
    if(isVid(file.name)){ res(file); return; }
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      if(w<=maxPx && h<=maxPx){ res(file); return; }
      const r=Math.min(maxPx/w, maxPx/h); w=Math.round(w*r); h=Math.round(h*r);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>res(new File([b],file.name,{type:'image/jpeg'})),'image/jpeg',q);
    };
    img.src=url;
  });
}
let _lockedScrollY = 0;
function updateBodyLock(){
  const lock = (typeof lightbox!=='undefined' && lightbox.classList.contains('show'))
    || (typeof moodCreateModal!=='undefined' && moodCreateModal && moodCreateModal.classList.contains('show'))
    || bottomSheet.classList.contains('show')

    || (typeof confirmPopup!=='undefined' && confirmPopup && confirmPopup.classList.contains('show'));
  const isLocked = document.documentElement.classList.contains('no-scroll');
  if(lock && !isLocked){
    _lockedScrollY = window.scrollY || window.pageYOffset || 0;
    document.documentElement.classList.add('no-scroll');
    document.body.classList.add('no-scroll');
    document.body.style.top = `-${_lockedScrollY}px`;
  } else if(!lock && isLocked){
    document.documentElement.classList.remove('no-scroll');
    document.body.classList.remove('no-scroll');
    document.body.style.top = '';
    window.scrollTo(0, _lockedScrollY);
  }
}

function renderGrid(){
  const s = S();
  // Drop any active mood filters that no longer exist in the moods list
  // (e.g. the mood was renamed/deleted on another device).
  const validMoods = new Set(s.moods);
  for(const m of [...activeMoods]) if(!validMoods.has(m)) activeMoods.delete(m);
  // Filter: if activeMoods has entries, show items matching ANY selected mood (OR)
  let arr = activeMoods.size > 0
    ? s.items.filter(i => (Array.isArray(i.moods) && i.moods.some(m => activeMoods.has(m))))
    : s.items;
  // Favoriten-Filter
  if (favFilterActive) arr = arr.filter(i => i.favorite);
  // If a filter is active but matches nothing (e.g. items were retagged on
  // another device), drop the filter so the user always sees content.
  if(activeMoods.size > 0 && arr.length === 0 && s.items.length > 0){
    activeMoods.clear();
    saveFilterState();
    arr = s.items;
  }
  // Sortierung: entweder zufällig (shuffle) oder nach Erstelldatum (neueste zuerst)
  if(sortNewest){
    // Items bleiben in ihrer DB-Reihenfolge (created_at DESC)
  } else {
    arr = [...arr].sort(() => Math.random()-.5);
  }
  s.currentItems = arr;
  if(_observer){ _observer.disconnect(); _observer=null; }
  gridEl.innerHTML = arr.map(it => `
    <div class="cell" data-id="${it.id}">
      <input class="selcheck" type="checkbox" data-id="${it.id}">
      <div class="cell-heart ${it.favorite ? 'visible' : ''}">&#9829;</div>
      <div class="heart-flash">&#9829;</div>
      ${it.media_type==='video'
        ? `<video src="${it.media_url}" muted loop playsinline preload="none"></video>`
        : `<img src="${it.media_url}" loading="lazy" decoding="async" alt="">`}
    </div>`).join('');

  _observer = new IntersectionObserver(entries => entries.forEach(e => {
    const v = e.target.querySelector('video'); if(!v) return;
    if(e.isIntersecting){ v.muted=true; v.play().catch(()=>{}); }
    else { v.pause(); v.currentTime=0; }
  }), { threshold:0.25, rootMargin:'100px' });

  applyGridCols(gridCols);
  gridEl.querySelectorAll('.cell').forEach(c => {
    _observer.observe(c);
    const chk = c.querySelector('.selcheck');
    c.onclick = e => {
      if(selMode){
        const id = c.dataset.id;
        if(e.target !== chk) chk.checked = !chk.checked;
        chk.checked ? selectedIds.add(id) : selectedIds.delete(id);
        c.classList.toggle('sel-highlight', chk.checked);
        updateActionBarCount();
        return;
      }
      if(isAnyOverlayOpen()){ closeAllOverlays(); e.stopPropagation(); return; }
      const idx = S().currentItems.findIndex(x => x.id===c.dataset.id); openLightbox(idx);
    };
    c.oncontextmenu = e => { e.preventDefault(); if(!selMode) openEditor(c.dataset.id); };
    if(selMode){ chk.classList.add('visible'); if(selectedIds.has(c.dataset.id)){ chk.checked=true; c.classList.add('sel-highlight'); } }
    // Doppelklick-Favorit
    let lastTap = 0;
    c.addEventListener('dblclick', e => {
      if (selMode) return;
      e.preventDefault();
      e.stopPropagation();
      toggleFavorite(c.dataset.id, c);
    });
    // Mobile: doppeltes Tippen (touchend-Heuristik)
    c.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 300) {
        e.preventDefault();
        toggleFavorite(c.dataset.id, c);
        lastTap = 0;
      } else {
        lastTap = now;
      }
    }, { passive: false });
  });
}

async function toggleFavorite(id, cellEl) {
  const item = S().items.find(x => x.id === id);
  if (!item) return;

  const newVal = !item.favorite;
  item.favorite = newVal;           // optimistisch updaten (kein Flicker)

  // Herz-Icon auf der Kachel
  const heartEl = cellEl.querySelector('.cell-heart');
  if (heartEl) {
    heartEl.textContent = '♥';
    heartEl.classList.toggle('visible', newVal);
    heartEl.classList.remove('pop');
    void heartEl.offsetWidth;       // reflow für Animation-Restart
    if (newVal) heartEl.classList.add('pop');
  }

  // Großes Flash-Herz (nur beim Favorisieren, nicht beim Entfernen)
  if (newVal) {
    const flash = cellEl.querySelector('.heart-flash');
    if (flash) {
      flash.classList.remove('play');
      void flash.offsetWidth;
      flash.classList.add('play');
      flash.addEventListener('animationend', () => flash.classList.remove('play'), { once: true });
    }
    toast('Zu Favoriten hinzugefügt ♥');
  } else {
    toast('Aus Favoriten entfernt');
  }

  // Falls Favoriten-Filter aktiv ist und Item un-favorisiert wurde: Grid neu rendern
  if (favFilterActive && !newVal) {
    setTimeout(() => renderGrid(), 400);   // kurze Verzögerung damit Animation fertig ist
  }

  // Supabase persistieren (fire & forget mit Fehler-Feedback)
  const { error } = await sb
    .from(S().table)
    .update({ favorite: newVal })
    .eq('id', id);

  if (error) {
    item.favorite = !newVal;          // Rollback
    const heartEl2 = cellEl.querySelector('.cell-heart');
    if (heartEl2) heartEl2.classList.toggle('visible', !newVal);
    toast('Fehler beim Speichern');
  }
}

  if(idx<0 || idx>=S().currentItems.length) return;
  lbIndex = idx;
  const it = S().currentItems[idx];
  lbInner.querySelectorAll('img,video').forEach(e=>e.remove());
  if(it.media_type==='video'){
    const v = document.createElement('video');
    v.src=it.media_url; v.controls=true; v.autoplay=true; v.muted=false; v.loop=true;
    lbInner.appendChild(v);
    lbIsMuted=false; updateMuteSvg(false);
  } else {
    const img = document.createElement('img');
    img.src=it.media_url; img.style.pointerEvents='none';
    lbInner.appendChild(img);

  lightbox.classList.add('show');
  $('lbBarHeart').classList.toggle('is-fav', !!it.favorite);
  lightbox.classList.toggle('has-video', it.media_type === 'video');
  closeLbPill();
  setAmbientFor(it);
  updateLbArrows();
  updateBodyLock();

async function upload(files){
  const arr = Array.from(files);
  for(let i=0; i<arr.length; i++){
    prog(Math.round(i/arr.length*90)); toast(`Upload ${i+1}/${arr.length}…`);
    const f=arr[i]; const cf=await compress(f);
    const ext=f.name.split('.').pop().toLowerCase();
    const path=`${Date.now().toString(36)}${Math.random().toString(36).slice(2,6)}.${ext}`;
    const {error:e1} = await sb.storage.from(BUCKET).upload(path, cf, {upsert:false, contentType:cf.type});
    if(e1){ toast('Upload-Fehler: '+e1.message); continue; }
    const {data:pub} = sb.storage.from(BUCKET).getPublicUrl(path);
    const item = { title:f.name.replace(/\.[^.]+$/,''), moods:[], tags:[], media_url:pub.publicUrl, media_type:isVid(f.name)?'video':'image', favorite:false };
    const {data:ins, error:e2} = await sb.from(S().table).insert(item).select().single();
    if(e2){ toast('DB-Fehler: '+e2.message); continue; }
    S().items.unshift({...item, id:ins.id}); renderGrid();
  }
  prog(100); toast('Fertig ✓'); fileInput.value='';
}

async function loadItems(){

    .select('id,title,moods,tags,media_url,media_type,favorite')
    .order('created_at',{ascending:false});
  if(error){ toast('Ladefehler: '+error.message); gridEl.innerHTML='<div style="padding:24px;color:#fff">Kein Datenzugriff</div>'; return; }
  S().items=data||[];
  mergeMoodsFromItems();
  renderGrid(); $('bootMsg')?.remove();
  renderMoodChips();
  if(typeof moodsViewOpen !== 'undefined' && moodsViewOpen) renderMoodsView();
  tryOpenPendingShare();
}

// Merge any mood tags found on items into the local moods list so moods
// created on another device appear here too. The moods list is otherwise
// only persisted per-device in localStorage.
function mergeMoodsFromItems(){
  const known = new Set(S().moods);
  let changed = false;
  for(const it of S().items){
    if(!Array.isArray(it.moods)) continue;
    for(const m of it.moods){
      if(typeof m !== 'string') continue;
      const trimmed = m.trim();
      if(!trimmed || known.has(trimmed)) continue;
      S().moods.push(trimmed);
      known.add(trimmed);
      changed = true;
    }
  }
  if(changed) saveMoodsList();
}
async function sbUpdate(item){
  if(!item) return;
  await sb.from(S().table).update({title:item.title||'', moods:item.moods||[], tags:item.tags||[], media_url:item.media_url, media_type:item.media_type, favorite:item.favorite||false}).eq('id',item.id);
}
async function sbDeleteMany(ids){
  if(!ids.length) return;
  await sb.from(S().table).delete().in('id',ids);
}

// ── Cross-device live sync ────────────────────────────────
// Refetch silently so other devices see uploads / mood-tag changes
// without a manual reload. Skipped while a modal/lightbox is open
// to avoid yanking state out from under the user.
let _syncTimer = null;
function isUiBusy(){
  return (typeof lightbox!=='undefined' && lightbox.classList.contains('show'))
    || (typeof moodCreateModal!=='undefined' && moodCreateModal && moodCreateModal.classList.contains('show'))
    || bottomSheet.classList.contains('show')
    || (typeof moodsMgmtPopup!=='undefined' && moodsMgmtPopup && moodsMgmtPopup.classList.contains('show'))
    || (typeof confirmPopup!=='undefined' && confirmPopup && confirmPopup.classList.contains('show'));
}
async function refetchItems(){
  if(isUiBusy()){ scheduleSync(1500); return; }
  const {data,error} = await sb.from(S().table)
    .select('id,title,moods,tags,media_url,media_type,favorite')
    .order('created_at',{ascending:false});
  if(error) return;
  S().items = data || [];
  mergeMoodsFromItems();
  // Kein renderGrid() – die aktuelle Ansicht bleibt erhalten.
  // Neu geladene Items erscheinen beim nächsten renderGrid()-Aufruf.
  renderMoodChips();
  if(typeof moodsViewOpen !== 'undefined' && moodsViewOpen) renderMoodsView();
}
function scheduleSync(delay){
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(refetchItems, delay ?? 400);
}
function subscribeRealtime(){
  try{
    sb.channel('moodboard_items_changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'moodboard_items' },
          () => scheduleSync(300))
      .subscribe();
  }catch(e){}
}
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') scheduleSync(0);
});
window.addEventListener('focus', () => scheduleSync(0));
window.addEventListener('online', () => scheduleSync(0));

let moodsViewOpen = false;

// Wählt ein zufälliges Item (Bild/Video) aus einer Mood aus
function pickMainItem(mood){
  const items = S().items.filter(x => Array.isArray(x.moods) && x.moods.includes(mood));
  return items.length ? items[Math.floor(Math.random() * items.length)] : null;
}

function renderMoodsView(){
  const moods = S().moods.filter(m => m !== 'All');
  const tilesHtml = moods.map((m, i) => {
    const it = pickMainItem(m);
    const count = favFilterActive
      ? S().items.filter(i => i.favorite && (Array.isArray(i.moods) && i.moods.includes(m))).length
      : S().items.filter(x => Array.isArray(x.moods) && x.moods.includes(m)).length;
    const media = it
      ? (it.media_type === 'video'
          ? `<video src="${it.media_url}" muted loop playsinline autoplay preload="metadata"></video>`
          : `<img src="${it.media_url}" loading="lazy" decoding="async" alt="">`)
      : `<div class="mt-empty">Kein Bild</div>`;
    return `
      <div class="mood-tile" data-m="${m}">
        ${media}
        <div class="mt-overlay"></div>
        <div class="mt-label">
          <span class="mt-icon">${moodIcon(m)}</span>
          <span>${m}</span>
          <span class="mt-count">${count}</span>
        </div>
      </div>`;
  }).join('');
  const createTile = `
    <div class="mood-tile mood-tile-create" id="moodCreateTile" title="Neue Mood erstellen">
      <div class="mtc-inner">
        <div class="mtc-plus">+</div>
        <div class="mtc-label">Neue Mood</div>
      </div>
    </div>`;
  moodsGrid.innerHTML = tilesHtml + createTile;
  const createBtn = document.getElementById('moodCreateTile');
  if(createBtn) createBtn.onclick = openMoodCreate;
  moodsGrid.querySelectorAll('.mood-tile:not(.mood-tile-create)').forEach(tile => {
    tile.onclick = e => {
      const m = tile.dataset.m;
      activeMoods = new Set([m]);
      saveFilterState();
      hideMoodsView();
      // renderGrid() wird bereits in hideMoodsView() aufgerufen
    };
  });
}

let _moodsAnimating = false;

function showMoodsView(){
  if(_moodsAnimating) return;
  _moodsAnimating = true;
  moodsViewOpen = true;
  // Ausstehenden Sync abbrechen – kein renderGrid() während der Animation
  clearTimeout(_syncTimer);
  closeMenu(); closeLb();
  // Selection-Mode zurücksetzen OHNE renderGrid() – das Grid wird gleich ausgeblendet
  selMode = null; selectedIds.clear();
  actionBar.classList.remove('show');
  // GridWrap ausblenden (scale down + fade)
  gridWrap.classList.add('hide-view');
  // Bottombar umschalten (Buttons schrumpfen)
  document.getElementById('bottombar').classList.add('moods-active');
  document.getElementById('moodsMgmtBtn').classList.add('show');
  // Nach der Ausblend-Animation: Grid verstecken, MoodsView einblenden
  setTimeout(() => {
    gridWrap.style.display = 'none';
    gridWrap.classList.remove('hide-view');
    moodsView.classList.add('show');
    moodsNavBtn.classList.add('active');
    boardTitle.classList.remove('active');
    renderMoodsView();
    window.scrollTo(0, 0);
    _moodsAnimating = false;
  }, 500);
}
function hideMoodsView(){
  if(_moodsAnimating) return;
  _moodsAnimating = true;
  moodsViewOpen = false;
  // Ausstehenden Sync abbrechen – kein renderGrid() während der Animation
  clearTimeout(_syncTimer);
  // MoodsView ausblenden (scale down + fade) – funktioniert jetzt via visibility
  moodsView.classList.remove('show');
  // Bottombar zurücksetzen (Buttons wachsen)
  document.getElementById('bottombar').classList.remove('moods-active');
  document.getElementById('moodsMgmtBtn').classList.remove('show');
  // Nach der Ausblend-Animation: GridWrap einblenden
  setTimeout(() => {
    gridWrap.style.display = '';
    renderGrid(); // Immer shufflen beim Zurückkehren zur Main-Ansicht
    // Animation starten: kurz warten bis display gesetzt ist
    requestAnimationFrame(() => {
      gridWrap.classList.add('show-view');
      // Nach der Animation die Klasse entfernen
      setTimeout(() => {
        gridWrap.classList.remove('show-view');
        _moodsAnimating = false;
      }, 500);
    });
    moodsNavBtn.classList.remove('active');
    boardTitle.classList.add('active');
  }, 500);
}

async function confirmCreateMood(){
  const raw = mcmInput.value.trim();
  if(!raw){ showMcmError('Bitte einen Namen eingeben'); return; }
  if(raw.length < 2){ showMcmError('Mindestens 2 Zeichen'); return; }
  // case-insensitive duplicate check
  const exists = S().moods.some(m => m.toLowerCase() === raw.toLowerCase());
  if(exists){ showMcmError('Diese Mood existiert bereits'); return; }
  S().moods.push(raw);
  saveMoodsList();
  renderMoodChips();
  if(moodsViewOpen) renderMoodsView();
  closeMoodCreate();
  toast(`Mood „${raw}" erstellt ✓`);
}

function renderMoodsMgmt(){
  const moods = S().moods.filter(m => m !== 'All');
  mmgList.innerHTML = moods.map(m => {
    const count = S().items.filter(x => Array.isArray(x.moods) && x.moods.includes(m)).length;
    return `<div class="mmg-item">
      <span class="mmg-icon">${moodIcon(m)}</span>
      <span class="mmg-name">${m}</span>
      <span class="mmg-count">${count}</span>
      <button class="mmg-del" data-m="${m}" aria-label="Löschen">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;display:block">

        </svg>
      </button>
    </div>`;
  }).join('');
  mmgList.querySelectorAll('.mmg-del').forEach(btn => {
    btn.onclick = e => {
      e.stopPropagation();
      const m = btn.dataset.m;
      showConfirmPopup(m, () => {
        S().moods = S().moods.filter(x => x !== m);
        saveMoodsList();
        for(const it of S().items){
          if(Array.isArray(it.moods)){
            const idx = it.moods.indexOf(m);
            if(idx >= 0){ it.moods.splice(idx, 1); sbUpdate(it); }
          }
        }
        renderMoodsMgmt();
        if(moodsViewOpen) renderMoodsView();
        renderGrid();
        toast(`Mood „${m}" gelöscht`);
      });
    };
  });
}

<script>
(function(){
  const btn = document.getElementById('spotifyBtn');
  const popup = document.getElementById('spotifyPopup');
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const open = popup.classList.toggle('show');
    btn.classList.toggle('active', open);
  });
  document.addEventListener('click', e => {
    if (!popup.contains(e.target) && !btn.contains(e.target)) {
      popup.classList.remove('show');
      btn.classList.remove('active');
    }
  });
})();

window.onSpotifyIframeApiReady = (IFrameAPI) => {
  const el = document.getElementById('spotifyEmbed');
  const options = {
    uri: 'spotify:playlist:2qURpmjeU1eFu9orvltb5I',
    width: '100%',
    height: 152
  };
  IFrameAPI.createController(el, options, () => {});
};
</script>
