<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marvins Place">
<meta name="theme-color" content="#050505">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--text:#fff;--border:rgba(255,255,255,.12);--panel:rgba(12,12,12,.96)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
button,input{font:inherit}
.topbar{position:fixed;top:0;left:0;right:0;z-index:30;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);gap:16px}
.topbar-left{display:flex;align-items:center;gap:20px}
.board-title{background:transparent;border:0;color:#fff;font-size:16px;font-weight:700;letter-spacing:.04em;cursor:pointer;opacity:.9;user-select:none;padding:4px 0}
.board-title:hover{opacity:1}
.nav-link{background:transparent;border:0;color:#fff;font-size:14px;font-weight:500;cursor:pointer;opacity:.4;user-select:none;padding:4px 0;transition:.15s;letter-spacing:.02em}
.nav-link:hover{opacity:.7}
.nav-link.active{opacity:1}
.menubtn{width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(16px);transition:.15s;flex-shrink:0}
.menubtn:hover{background:rgba(255,255,255,.13)}
.dropdown{position:fixed;top:58px;right:14px;z-index:40;width:290px;display:none;padding:10px;border:1px solid var(--border);border-radius:18px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6);max-height:calc(100vh - 80px);overflow-y:auto}
.dropdown.show{display:block}
.sheet-overlay{position:fixed;inset:0;z-index:38;background:rgba(0,0,0,.5);display:none;backdrop-filter:blur(4px)}
.sheet-overlay.show{display:block}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:39;background:var(--panel);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:16px 16px 40px;max-height:85vh;overflow-y:auto;display:none;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
.bottom-sheet.show{display:block;transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);margin:0 auto 16px}
.dd-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:8px 8px 4px}
.dd-divider{height:1px;background:rgba(255,255,255,.07);margin:6px 0}
.dd-btn{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px}
.dd-btn:hover{background:rgba(255,255,255,.08)}
.dd-btn .icon{width:18px;text-align:center;opacity:.6;font-size:15px}
.dd-input-row{display:flex;gap:6px;padding:4px 2px 6px}
.dd-input-row input{flex:1;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:10px;outline:none;font-size:14px}
.dd-input-row button{border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;white-space:nowrap}
.mgmt-section{display:none;padding:10px;background:rgba(255,255,255,.03);border-radius:12px;margin:5px 0}
.mgmt-section.show{display:block}
.mood-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.mchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.mchip.active{background:#fff;color:#111;border-color:#fff}
.tag-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.tchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.tchip.active{background:#fff;color:#111;border-color:#fff}
.editor-wrap{display:none}
.editor-wrap.show{display:block}
.shufflebtn{position:fixed;bottom:20px;right:20px;z-index:30;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:19px;display:grid;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.3);transition:.15s}
.shufflebtn:hover{background:rgba(255,255,255,.13)}
.gridwrap{position:fixed;inset:52px 0 0 0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:2px;padding:2px}
.cell{position:relative;overflow:hidden;background:#111;aspect-ratio:9/16;cursor:pointer;contain:strict}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.cell:hover img,.cell:hover video{transform:scale(1.04)}
.cell.sel-highlight{outline:2px solid #fff;outline-offset:-2px}
.cell.mood-dim{opacity:.35;transition:opacity .2s}
.selcheck{position:absolute;top:8px;left:8px;z-index:2;width:20px;height:20px;accent-color:#fff;opacity:0;pointer-events:none;cursor:pointer}
.selcheck.visible{opacity:1;pointer-events:auto}
.cell-mood-badge{position:absolute;bottom:6px;left:6px;z-index:2;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);border-radius:999px;font-size:10px;color:#fff;padding:2px 8px;pointer-events:none;display:none;max-width:calc(100% - 12px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-mood-badge.show{display:block}
.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:14px 16px 32px;background:linear-gradient(to top,rgba(0,0,0,.97) 70%,transparent);display:none;flex-direction:column;gap:10px}
.action-bar.show{display:flex}
.action-bar-title{font-size:11px;opacity:.5;text-transform:uppercase;letter-spacing:.08em}
.action-bar-moods{display:flex;flex-wrap:wrap;gap:6px}
.ab-chip{border:1px solid var(--border);background:rgba(255,255,255,.07);color:#fff;border-radius:999px;padding:8px 16px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.ab-chip:hover{background:rgba(255,255,255,.15)}
.ab-chip.sel{background:#fff;color:#111;border-color:#fff}
.action-bar-actions{display:flex;gap:8px}
.ab-act{flex:1;border:1px solid var(--border);border-radius:12px;padding:11px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
.ab-act.confirm{background:#fff;color:#111;border-color:#fff}
.ab-act.confirm:hover{background:#ddd}
.ab-act.cancel{background:rgba(255,255,255,.06);color:#fff}
.ab-act.cancel:hover{background:rgba(255,255,255,.12)}
.ab-act.remove{background:rgba(255,60,60,.15);color:#ff6b6b;border-color:rgba(255,60,60,.3)}
.ab-act.remove:hover{background:rgba(255,60,60,.25)}
.ab-count{font-size:12px;opacity:.5}
.lightbox{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);touch-action:pan-y;cursor:pointer}
.lightbox.show{display:flex}
.lb-inner{position:relative;max-width:92vw;max-height:92vh;user-select:none;cursor:default}
.lb-inner img,.lb-inner video{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:10px;display:block}
.lb-inner video{pointer-events:auto}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:81;width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;font-size:18px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(10px);transition:.15s}
.lb-arrow:hover{background:rgba(255,255,255,.18)}
.lb-arrow.prev{left:14px}
.lb-arrow.next{right:14px}
.lb-mood-btn,.lb-mute-btn{position:fixed;bottom:28px;z-index:90;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:18px;display:none;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.4);transition:.15s}
.lb-mood-btn{right:20px}
.lb-mute-btn{right:76px}
.lb-mood-btn:hover,.lb-mute-btn:hover{background:rgba(255,255,255,.18)}
.lb-mood-btn.show,.lb-mute-btn.show{display:grid}
.lb-mood-picker{position:fixed;bottom:88px;right:14px;z-index:91;display:none;flex-direction:column;gap:8px;padding:12px;border:1px solid var(--border);border-radius:16px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 12px 40px rgba(0,0,0,.6);min-width:180px}
.lb-mood-picker.show{display:flex}
.lb-mood-picker-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:0 2px 4px}
.lb-mood-tiles{display:flex;flex-wrap:wrap;gap:6px}
.lb-mood-tile{border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.lb-mood-tile:hover{background:rgba(255,255,255,.14)}
.lb-mood-tile.sel{background:#fff;color:#111;border-color:#fff}
.lb-mood-confirm{width:100%;border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:#111;margin-top:2px;transition:.15s}
.lb-mood-confirm:hover{background:#ddd}
.lb-current-mood{font-size:11px;opacity:.4;padding:0 2px}
.progress{position:fixed;top:0;left:0;height:2px;background:#fff;z-index:100;width:0;transition:width .25s}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);z-index:102;background:rgba(0,0,0,.85);border:1px solid var(--border);color:#fff;padding:9px 16px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.2s;white-space:nowrap}
.toast.show{opacity:1}
.gridwrap.dragover::after{content:'Loslassen zum Hochladen';position:fixed;inset:52px 0 0 0;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(0,0,0,.5);border:2px dashed rgba(255,255,255,.3)}
.hidden{display:none!important}
/* Filter Button */
.filterbtn{position:fixed;bottom:20px;left:20px;z-index:30;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:19px;display:grid;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.3);transition:.15s}
.filterbtn:hover{background:rgba(255,255,255,.13)}
.filterbtn.active{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4)}
.filter-popup{position:fixed;bottom:78px;left:14px;z-index:35;width:280px;display:none;flex-direction:column;gap:10px;padding:14px;border:1px solid var(--border);border-radius:18px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6)}
.filter-popup.show{display:flex}
.fp-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:2px 0 4px}
.fp-moods{display:flex;flex-wrap:wrap;gap:6px}
.fp-chip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:7px 13px;font-size:12px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:5px}
.fp-chip:hover{background:rgba(255,255,255,.1)}
.fp-chip.sel{background:#fff;color:#111;border-color:#fff}
.fp-chip .mood-icon{font-size:14px}
.fp-go{width:100%;border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:#111;transition:.15s;margin-top:2px}
.fp-go:hover{background:#ddd}
.fp-divider{height:1px;background:rgba(255,255,255,.07)}
.fp-grid-section{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.fp-grid-label{font-size:11px;opacity:.5;margin-right:2px}
.fp-grid-btn{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:8px;width:34px;height:30px;cursor:pointer;font-size:11px;font-weight:600;transition:.12s;display:grid;place-items:center}
.fp-grid-btn:hover{background:rgba(255,255,255,.1)}
.fp-grid-btn.sel{background:#fff;color:#111;border-color:#fff}
/* Spotify Mini Player */
.spotify-kachel{
  position:fixed;
  bottom:12px;
  left:50%;
  transform:translateX(-50%);
  z-index:31;
  width:clamp(280px, 54vw, 460px);
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  backdrop-filter:blur(24px);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  overflow:hidden;
  border-left:3px solid #1DB954;
}
.spotify-kachel iframe{display:block;width:100%;border:0;height:112px}

@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}.lb-arrow{display:none}.dropdown{display:none!important}}
@media(min-width:601px){.bottom-sheet,.sheet-overlay{display:none!important}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="board-title" id="boardTitle">Marvins Place</span>
    <button class="nav-link" id="navPersonal">Personal</button>
  </div>
  <button class="menubtn" id="menuBtn">&#9776;</button>
</div>

<!-- Desktop Dropdown -->
<div class="dropdown" id="dropdown">
  <div class="dd-section">Aktionen</div>
  <button class="dd-btn" id="uploadBtn"><span class="icon">&#128247;</span> Bilder / Videos hochladen</button>
  <input id="fileInput" class="hidden" type="file" accept="image/*,video/*" multiple>
  <button class="dd-btn" id="pickDeleteBtn"><span class="icon">&#128465;</span> Bilder löschen</button>
  <div class="dd-divider"></div>
  <div class="dd-section">Moods</div>
  <button class="dd-btn" id="assignMoodBtn"><span class="icon">&#127991;</span> Moods zuweisen / ändern</button>
  <button class="dd-btn" id="removeMoodBtn"><span class="icon">&#10005;</span> Moods entfernen</button>
  <button class="dd-btn" id="mgmtToggleBtn"><span class="icon">&#9881;</span> Moods verwalten</button>
  <div id="mgmtSection" class="mgmt-section">
    <div class="dd-input-row"><input id="newMood" placeholder="Neue Mood"><button id="addMoodBtn">Add</button></div>
    <div class="dd-input-row" id="renameArea" style="display:none"><input id="oldMoodName" placeholder="Alt"><input id="newMoodName" placeholder="Neu"><button id="renameMoodBtn" style="background:#fff;color:#000">Go</button></div>
    <div class="dd-btn" id="showRenameBtn">Umbenennen</div>
    <div class="dd-input-row"><input id="deleteMood" placeholder="Name"><button id="deleteMoodBtn" style="color:#ff6b6b">Löschen</button></div>
  </div>
  <div class="dd-divider"></div>
  <div class="editor-wrap" id="editorWrap">
    <div class="dd-section">Editor &mdash; <span id="editorTitle" style="text-transform:none;letter-spacing:0;opacity:.7"></span></div>
    <div class="tag-chips" id="tagChips"></div>
    <div class="dd-input-row"><input id="tagInput" placeholder="Tags, kommagetrennt" inputmode="text"><button id="saveTagsBtn">Save</button></div>
  </div>
</div>

<!-- Mobile Sheet -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="bottom-sheet" id="bottomSheet">
  <div class="sheet-handle"></div>
  <div class="dd-section">Aktionen</div>
  <button class="dd-btn" id="uploadBtnSheet"><span class="icon">&#128247;</span> Bilder / Videos hochladen</button>
  <button class="dd-btn" id="pickDeleteBtnSheet"><span class="icon">&#128465;</span> Bilder löschen</button>
  <div class="dd-divider"></div>
  <div class="dd-section">Moods</div>
  <button class="dd-btn" id="assignMoodBtnSheet"><span class="icon">&#127991;</span> Moods zuweisen / ändern</button>
  <button class="dd-btn" id="removeMoodBtnSheet"><span class="icon">&#10005;</span> Moods entfernen</button>
  <button class="dd-btn" id="mgmtToggleBtnSheet"><span class="icon">&#9881;</span> Moods verwalten</button>
  <div id="mgmtSectionSheet" class="mgmt-section">
    <div class="dd-input-row"><input id="newMoodSheet" placeholder="Neue Mood"><button id="addMoodBtnSheet">Add</button></div>
    <div class="dd-input-row" id="renameAreaSheet" style="display:none"><input id="oldMoodNameSheet" placeholder="Alt"><input id="newMoodNameSheet" placeholder="Neu"><button id="renameMoodBtnSheet" style="background:#fff;color:#000">Go</button></div>
    <div class="dd-btn" id="showRenameBtnSheet">Umbenennen</div>
    <div class="dd-input-row"><input id="deleteMoodSheet" placeholder="Name"><button id="deleteMoodBtnSheet" style="color:#ff6b6b">Löschen</button></div>
  </div>
</div>

<!-- Action Bar -->
<div class="action-bar" id="actionBar">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <span class="action-bar-title" id="actionBarTitle">Mood zuweisen</span>
    <span class="ab-count" id="actionBarCount">0 ausgewählt</span>
  </div>
  <div class="action-bar-moods" id="actionBarMoods"></div>
  <div class="action-bar-actions">
    <button class="ab-act cancel" id="abCancel">Abbrechen</button>
    <button class="ab-act remove hidden" id="abRemove">Mood entfernen</button>
    <button class="ab-act confirm hidden" id="abConfirm">Zuweisen</button>
  </div>
</div>

<!-- Filter -->
<button class="filterbtn" id="filterBtn">🙂</button>
<div class="filter-popup" id="filterPopup">
  <div class="fp-section">Moods filtern</div>
  <div class="fp-moods" id="fpMoods"></div>
  <div class="fp-divider"></div>
  <div class="fp-section">Kachelgröße</div>
  <div class="fp-grid-section">
    <span class="fp-grid-label">Spalten</span>
    <button class="fp-grid-btn" data-cols="1">1</button>
    <button class="fp-grid-btn" data-cols="2">2</button>
    <button class="fp-grid-btn" data-cols="3">3</button>
    <button class="fp-grid-btn" data-cols="4">4</button>
  </div>
  <button class="fp-go" id="fpGo">Anwenden</button>
</div>

<div class="spotify-kachel" id="spotifyKachel">
  <iframe src="https://open.spotify.com/embed/playlist/2qURpmjeU1eFu9orvltb5I?utm_source=generator&theme=0"
    height="112" frameBorder="0" allowfullscreen=""
    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
    loading="lazy"></iframe>
</div>

<button class="shufflebtn" id="shuffleBtn">&#x21C4;</button>

<div class="gridwrap" id="gridWrap">
  <div class="grid" id="grid">
    <div id="bootMsg" style="padding:24px;color:#fff;opacity:.75">Lade&hellip;</div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-arrow prev" id="lbPrev">&#8249;</button>
  <div class="lb-inner" id="lbInner"></div>
  <button class="lb-arrow next" id="lbNext">&#8250;</button>
</div>
<button class="lb-mute-btn" id="lbMuteBtn">&#128266;</button>
<button class="lb-mood-btn" id="lbMoodBtn">&#127991;</button>
<div class="lb-mood-picker" id="lbMoodPicker">
  <div class="lb-mood-picker-title">Moods setzen</div>
  <div class="lb-current-mood" id="lbCurrentMood"></div>
  <div class="lb-mood-tiles" id="lbMoodTiles"></div>
  <button class="lb-mood-confirm" id="lbMoodConfirm">Bestätigen</button>
</div>

<div class="progress" id="progress"></div>
<div class="toast" id="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

const SUPABASE_URL = 'https://bnwcbxjgsmmvmtvqblrr.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJud2NieGpnc21tdm10dnFibHJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjAyMDQsImV4cCI6MjA5MjE5NjIwNH0.Lo0lAnOoyFhMpq7YwO3pw2vMccSsJc8Xbk7Teck5QmE'
const BUCKET = 'moodboard'

// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  moodboard: {
    items: [], currentItems: [],
    moodsAll: ['All','Summer','Winter','Cozy','Dark'],
    currentMood: localStorage.getItem('mb_mood') || 'All',
    table: 'moodboard_items'
  },
  personal: {
    items: [], currentItems: [],
    moodsAll: ['All','Work','Family','Travel','Misc'],
    currentMood: localStorage.getItem('pb_mood') || 'All',
    table: 'personal_items'
  }
}

let currentPage = 'moodboard'
const S = () => state[currentPage]   // ← FIX: Funktion statt einmalige Zuweisung

let editId = null, lbIndex = 0, selMode = null, lbIsMuted = false
let selectedIds = new Set(), assignMoods = new Set(), lbPickedMoods = new Set()
let observer = null

// ─── DOM ──────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id)
const gridEl = $('grid'), gridWrap = $('gridWrap')
const dropdown = $('dropdown'), bottomSheet = $('bottomSheet')
const sheetOverlay = $('sheetOverlay'), lightbox = $('lightbox')
const lbInner = $('lbInner'), fileInput = $('fileInput')

// ─── Filter State ──────────────────────────────────────────────────────────────
let activeMoods = new Set(JSON.parse(localStorage.getItem('activemoods') || '[]'))
let gridCols = parseInt(localStorage.getItem('gridcols') || '2')

function saveFilterState() {
  localStorage.setItem('activemoods', JSON.stringify([...activeMoods]))
  localStorage.setItem('gridcols', String(gridCols))
}

function applyGridCols(cols) {
  gridCols = cols
  if (window.innerWidth <= 600) {
    $('grid').style.gridTemplateColumns = cols === 1 ? '1fr' : `repeat(${cols}, 1fr)`
  } else {
    $('grid').style.gridTemplateColumns = ''
  }
  document.querySelectorAll('.fp-grid-btn').forEach(b =>
    b.classList.toggle('sel', parseInt(b.dataset.cols) === cols))
  saveFilterState()
}

// ─── Filter Popup ──────────────────────────────────────────────────────────────
function renderFilterPopup() {
  const moods = S().moodsAll.filter(m => m !== 'All')
  const fpMoods = $('fpMoods')
  fpMoods.innerHTML = moods.map(m =>
    `<button class="fp-chip ${activeMoods.has(m)?'sel':''}" data-m="${m}">
      <span class="mood-icon">${moodIcon(m)}</span>${m}
    </button>`).join('')
  fpMoods.querySelectorAll('.fp-chip').forEach(b => {
    b.onclick = () => {
      activeMoods.has(b.dataset.m) ? activeMoods.delete(b.dataset.m) : activeMoods.add(b.dataset.m)
      b.classList.toggle('sel', activeMoods.has(b.dataset.m))
      updateFilterBtnState()
    }
  })
  document.querySelectorAll('.fp-grid-btn').forEach(b => {
    b.classList.toggle('sel', parseInt(b.dataset.cols) === gridCols)
    b.onclick = () => applyGridCols(parseInt(b.dataset.cols))
  })
}

function updateFilterBtnState() {
  filterBtn.classList.toggle('active', activeMoods.size > 0)
  const first = [...activeMoods][0]
  filterBtn.textContent = activeMoods.size > 0 ? moodIcon(first) : '⚙️'
}

// ─── Mood Management ──────────────────────────────────────────────────────────
function bindMgmt(suffix) {
  const g = k => $(k + suffix)
  g('mgmtToggleBtn').onclick = () => g('mgmtSection').classList.toggle('show')
  g('showRenameBtn').onclick = () => g('renameArea').style.display = 'flex'
  g('addMoodBtn').onclick = () => {
    const v = g('newMood').value.trim()
    if (!v || S().moodsAll.includes(v)) return
    S().moodsAll.push(v); S().currentMood = v
    g('newMood').value = ''; renderMoodChips(); renderGrid()
  }
  g('renameMoodBtn').onclick = () => {
    const old = g('oldMoodName').value.trim(), v = g('newMoodName').value.trim()
    if (!old || !v || !S().moodsAll.includes(old)) return
    S().moodsAll = S().moodsAll.map(m => m === old ? v : m)
    // Update items: replace in moods array
    S().items.forEach(it => {
      if (it.moods && it.moods.includes(old)) {
        it.moods = it.moods.map(m => m === old ? v : m)
        sbUpdate(it)
      }
    })
    S().currentMood = v
    g('oldMoodName').value = ''; g('newMoodName').value = ''
    g('renameArea').style.display = 'none'
    renderMoodChips(); renderGrid()
  }
  g('deleteMoodBtn').onclick = () => {
    const v = g('deleteMood').value.trim()
    if (!v || !S().moodsAll.includes(v)) return
    S().moodsAll = S().moodsAll.filter(m => m !== v)
    S().items.forEach(it => {
      if (it.moods && it.moods.includes(v)) {
        it.moods = it.moods.filter(m => m !== v)
        sbUpdate(it)
      }
    })
    if (S().currentMood === v) S().currentMood = 'All'
    g('deleteMood').value = ''; renderMoodChips(); renderGrid()
  }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function toast(t) {
  toastEl.textContent = t; toastEl.classList.add('show')
  clearTimeout(toast._t); toast._t = setTimeout(() => toastEl.classList.remove('show'), 1600)
}
const isVid = n => /\.(mp4|webm|mov|m4v)$/i.test(n)
function prog(p) {
  progressBar.style.width = p + '%'
  if (p >= 100) setTimeout(() => progressBar.style.width = '0', 600)
}
function compress(file, maxPx = MAX_PX, q = 0.88) {
  return new Promise(res => {
    if (isVid(file.name)) { res(file); return }
    const img = new Image(), url = URL.createObjectURL(file)
    img.onload = () => {
      URL.revokeObjectURL(url)
      let w = img.width, h = img.height
      if (w <= maxPx && h <= maxPx) { res(file); return }
      const r = Math.min(maxPx / w, maxPx / h)
      w = Math.round(w * r); h = Math.round(h * r)
      const c = document.createElement('canvas')
      c.width = w; c.height = h
      c.getContext('2d').drawImage(img, 0, 0, w, h)
      c.toBlob(b => res(new File([b], file.name, { type: 'image/jpeg' })), 'image/jpeg', q)
    }
    img.src = url
  })
}

// ─── Grid ─────────────────────────────────────────────────────────────────────
function renderGrid() {
  const s = S()
  // Multi-Mood Filter: Bild matcht wenn EINER seiner Moods in activeMoods ist
  let arr = activeMoods.size === 0
    ? s.items
    : s.items.filter(i => Array.isArray(i.moods) && i.moods.some(m => activeMoods.has(m)))
  arr = [...arr].sort(() => Math.random() - .5)
  s.currentItems = arr

  if (observer) { observer.disconnect(); observer = null }

  gridEl.innerHTML = arr.map(it => {
    const moodLabel = Array.isArray(it.moods) && it.moods.length
      ? it.moods.join(', ') : ''
    return `<div class="cell" data-id="${it.id}">
      <input class="selcheck" type="checkbox" data-id="${it.id}">
      <span class="cell-mood-badge${moodLabel ? ' show' : ''}">${moodLabel}</span>
      ${it.mediatype === 'video'
        ? `<video src="${it.mediaurl}" muted loop playsinline preload="none"></video>`
        : `<img src="${it.mediaurl}" loading="lazy" decoding="async" alt="">`}
    </div>`
  }).join('')

  observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      const v = e.target.querySelector('video')
      if (!v) return
      e.isIntersecting ? v.play().catch(() => {}) : (v.pause(), v.currentTime = 0)
    })
  }, { threshold: 0.25, rootMargin: '100px' })

  applyGridCols(gridCols)
  gridEl.querySelectorAll('.cell').forEach(c => {
    observer.observe(c)
    const chk = c.querySelector('.selcheck')
    c.onclick = () => {
      if (selMode) {
        chk.checked = !chk.checked
        const id = c.dataset.id
        chk.checked ? selectedIds.add(id) : selectedIds.delete(id)
        c.classList.toggle('sel-highlight', chk.checked)
        updateActionBarCount()
        if (selMode === 'assign') updateDimming()
        return
      }
      const idx = S().currentItems.findIndex(x => x.id === c.dataset.id)
      openLightbox(idx)
    }
    c.oncontextmenu = e => { e.preventDefault(); if (!selMode) openEditor(c.dataset.id) }
    if (selMode) {
      chk.classList.add('visible')
      if (selectedIds.has(c.dataset.id)) { chk.checked = true; c.classList.add('sel-highlight') }
    }
    if (selMode === 'assign' || selMode === 'remove') c.querySelector('.cell-mood-badge').classList.add('show')
  })
}

function updateActionBarCount() {
  actionBarCount.textContent = `${selectedIds.size} ausgewählt`
}

function updateDimming() {
  if (!assignMoods.size) {
    gridEl.querySelectorAll('.cell').forEach(c => c.classList.remove('mood-dim'))
    return
  }
  gridEl.querySelectorAll('.cell').forEach(c => {
    const it = S().items.find(x => x.id === c.dataset.id)
    if (!it) return
    // dim wenn KEINER der Item-Moods in assignMoods ist UND nicht ausgewählt
    const hasMatch = Array.isArray(it.moods) && it.moods.some(m => assignMoods.has(m))
    c.classList.toggle('mood-dim', !hasMatch && !selectedIds.has(it.id))
  })
}

// ─── Selection Mode ───────────────────────────────────────────────────────────
function enterSelMode(mode) {
  selMode = mode; selectedIds.clear(); assignMoods.clear()
  closeMenu()
  actionBarTitle.textContent = mode === 'assign' ? 'Mood zuweisen / ändern'
    : mode === 'remove' ? 'Moods entfernen' : 'Bilder löschen'
  abConfirm.classList.toggle('hidden', mode !== 'assign')
  abRemove.classList.toggle('hidden', mode !== 'remove')
  if (mode === 'assign') {
    actionBarMoods.innerHTML = S().moodsAll.filter(m => m !== 'All').map(m =>
      `<button class="ab-chip" data-m="${m}">${moodIcon(m)} ${m}</button>`).join('')
    actionBarMoods.querySelectorAll('.ab-chip').forEach(b => {
      b.onclick = () => {
        b.classList.toggle('sel')
        b.classList.contains('sel') ? assignMoods.add(b.dataset.m) : assignMoods.delete(b.dataset.m)
        updateDimming()
      }
    })
  } else { actionBarMoods.innerHTML = '' }
  actionBar.classList.add('show')
  renderGrid(); updateActionBarCount()
}

function exitSelMode() {
  selMode = null; selectedIds.clear(); assignMoods.clear()
  actionBar.classList.remove('show'); renderGrid()
}

abCancel.onclick = () => { document.getElementById('deleteFloatingBtn')?.remove(); exitSelMode() }

// ─── Lightbox ─────────────────────────────────────────────────────────────────
function openLightbox(idx) {
  if (idx < 0 || idx >= S().currentItems.length) return
  lbIndex = idx
  const it = S().currentItems[idx]
  lbInner.querySelectorAll('img,video').forEach(e => e.remove())
  lbMuteBtn.classList.remove('show')
  if (it.mediatype === 'video') {
    const v = document.createElement('video')
    v.src = it.mediaurl; v.controls = true; v.autoplay = true
    v.muted = false; v.loop = true; lbInner.appendChild(v)
    lbIsMuted = false; lbMuteBtn.innerHTML = '🔊'; lbMuteBtn.classList.add('show')
  } else {
    const img = document.createElement('img')
    img.src = it.mediaurl; img.style.pointerEvents = 'none'; lbInner.appendChild(img)
  }
  lightbox.classList.add('show'); lbMoodBtn.classList.add('show')
  closeLbMoodPicker(); updateLbArrows()
}
function updateLbArrows() {
  $('lbPrev').style.opacity = lbIndex === 0 ? '0.2' : '1'
  $('lbNext').style.opacity = lbIndex === S().currentItems.length - 1 ? '0.2' : '1'
}
function lbNavigate(dir) {
  const next = lbIndex + dir
  if (next < 0 || next >= S().currentItems.length) return
  lbInner.querySelectorAll('video').forEach(v => v.pause())
  closeLbMoodPicker(); openLightbox(next)
}
$('lbPrev').onclick = e => { e.stopPropagation(); lbNavigate(-1) }
$('lbNext').onclick = e => { e.stopPropagation(); lbNavigate(1) }
lightbox.onclick = e => {
  if (lbMoodPicker.classList.contains('show')) { closeLbMoodPicker(); return }
  if (!e.target.closest('.lb-arrow') && !e.target.closest('#lbMoodBtn') &&
      !e.target.closest('#lbMuteBtn') && !e.target.closest('video')) closeLb()
}
function closeLb() {
  lightbox.classList.remove('show')
  lbMoodBtn.classList.remove('show'); lbMuteBtn.classList.remove('show')
  closeLbMoodPicker(); lbInner.querySelectorAll('video').forEach(v => v.pause())
}
lbMuteBtn.onclick = e => {
  e.stopPropagation()
  const v = lbInner.querySelector('video'); if (!v) return
  lbIsMuted = !lbIsMuted; v.muted = lbIsMuted
  lbMuteBtn.innerHTML = lbIsMuted ? '🔇' : '🔊'
}
let txS = 0, tyS = 0
lightbox.addEventListener('touchstart', e => { txS = e.touches[0].clientX; tyS = e.touches[0].clientY }, { passive: true })
lightbox.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - txS, dy = e.changedTouches[0].clientY - tyS
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) lbNavigate(dx < 0 ? 1 : -1)
}, { passive: true })

async function upload(files) {
  const arr = Array.from(files)
  for (let i = 0; i < arr.length; i++) {
    prog(Math.round((i / arr.length) * 90))
    toast(`Upload ${i + 1}/${arr.length}`)
    const f = arr[i]
    const c = await compress(f)
    const ext = f.name.split('.').pop().toLowerCase()
    const path = `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 6)}.${ext}`
    const { error: e1 } = await sb.storage.from(BUCKET).upload(path, c, { upsert: false, contentType: c.type })
    if (e1) { toast('Upload-Fehler: ' + e1.message); continue }
    const { data: pub } = sb.storage.from(BUCKET).getPublicUrl(path)
    const item = { title: f.name.replace(/\.\./g, ''), moods: [], tags: [], mediaurl: pub.publicUrl, mediatype: isVid(f.name) ? 'video' : 'image', favorite: false }
    const { data: ins, error: e2 } = await sb.from(S().table).insert(item).select().single()
    if (e2) { toast('DB-Fehler: ' + e2.message); continue }
    S().items.unshift({ ...item, id: ins.id })
    renderGrid()
  }
  prog(100); toast('Fertig ✓')
  fileInput.value = ''
}

function openEditor(id) {
  editId = id
  const it = S().items.find(x => x.id === id); if (!it) return
  $('editorTitle').textContent = it.title || 'Item'
  $('tagInput').value = (it.tags || []).join(', ')
  editorWrap.classList.add('show'); dropdown.classList.add('show')
  renderTagChips()
}
function renderTagChips() {
  const it = S().items.find(x => x.id === editId)
  $('tagChips').innerHTML = S().moodsAll.filter(m => m !== 'All').map(m =>
    `<button class="tchip ${it && Array.isArray(it.moods) && it.moods.includes(m) ? 'active' : ''}" data-m="${m}">${m}</button>`
  ).join('')
  document.querySelectorAll('.tchip').forEach(b => {
    b.onclick = () => {
      const it = S().items.find(x => x.id === editId); if (!it) return
      if (!Array.isArray(it.moods)) it.moods = []
      if (it.moods.includes(b.dataset.m)) {
        it.moods = it.moods.filter(m => m !== b.dataset.m)
      } else {
        it.moods = [...it.moods, b.dataset.m]
      }
      sbUpdate(it); renderGrid(); renderTagChips()
    }
  })
}
$('saveTagsBtn').onclick = () => {
  const it = S().items.find(x => x.id === editId); if (!it) return
  it.tags = $('tagInput').value.split(',').map(s => s.trim()).filter(Boolean)
  sbUpdate(it); renderGrid(); toast('Tags gespeichert')
}

// ─── Load Items ───────────────────────────────────────────────────────────────
async function loadItems() {
  const { data, error } = await sb.from(S().table)
    .select('id,title,moods,tags,mediaurl,mediatype,favorite')
    .order('created_at', { ascending: false })
  if (error) { toast('Ladefehler: ' + error.message); gridEl.innerHTML = '<div style="padding:24px;color:#fff">Kein Datenzugriff</div>'; return }
  S().items = data.map(d => ({ ...d, moods: Array.isArray(d.moods) ? d.moods : [] }))
  renderGrid()
  $('bootMsg')?.remove()
}

// ─── Supabase Helpers ─────────────────────────────────────────────────────────
async function sbUpdate(item) {
  if (!item) return
  await sb.from(S().table).update({
    title: item.title,
    moods: Array.isArray(item.moods) ? item.moods : [],
    tags: item.tags,
    mediaurl: item.mediaurl,
    mediatype: item.mediatype,
    favorite: false
  }).eq('id', item.id)
}
async function sbDeleteMany(ids) {
  if (!ids.length) return
  await sb.from(S().table).delete().in('id', ids)
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderMoodChips(); applyGridCols(gridCols); updateFilterBtnState(); loadItems()
window.addEventListener('resize', () => applyGridCols(gridCols))
</script>
