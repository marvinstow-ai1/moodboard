<style>
:root{--bg:#050505;--text:#fff;--border:rgba(255,255,255,.12);--panel:rgba(12,12,12,.96)}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{min-height:100vh;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overscroll-behavior-y:none;-webkit-text-size-adjust:100%;padding-top:52px;padding-bottom:96px}
body.no-scroll{position:fixed;left:0;right:0;width:100%;overflow:hidden}
button,input{font:inherit}
.topbar{position:fixed;top:0;left:0;right:0;z-index:30;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid var(--border);gap:16px}
.topbar-left{display:flex;align-items:center;gap:20px}
.board-title{background:transparent;border:0;color:#fff;font-size:16px;font-weight:700;letter-spacing:.04em;cursor:pointer;opacity:.9;user-select:none;padding:4px 0}
.board-title:hover{opacity:1}
.nav-link{background:transparent;border:0;color:#fff;font-size:14px;font-weight:500;cursor:pointer;opacity:.4;user-select:none;padding:4px 0;transition:.15s;letter-spacing:.02em}
.nav-link:hover{opacity:.7}
.nav-link.active{opacity:1}
.menubtn{width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(16px);transition:.15s;flex-shrink:0}
.menubtn:hover{background:rgba(255,255,255,.13)}
.dropdown{position:fixed;top:58px;right:14px;z-index:40;width:290px;display:none;padding:10px;border:1px solid var(--border);border-radius:18px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6);max-height:calc(100vh - 80px);overflow-y:auto}
.dropdown.show{display:block}
.sheet-overlay{position:fixed;inset:0;z-index:38;background:rgba(0,0,0,.5);display:none;backdrop-filter:blur(4px)}
.sheet-overlay.show{display:block}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:39;background:var(--panel);border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:16px 16px 40px;max-height:85vh;overflow-y:auto;display:none;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
.bottom-sheet.show{display:block;transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);margin:0 auto 16px}
.dd-section{font-size:10px;text-transform:uppercase;letter-spacing:.1em;opacity:.4;padding:8px 8px 4px}
.dd-tabs{display:flex;gap:2px;padding:3px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.dd-tab{flex:1;border:0;background:transparent;color:#fff;opacity:.55;border-radius:9px;padding:7px 4px;font-size:10.5px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.04em;transition:.15s}
.dd-tab:hover{opacity:.85;background:rgba(255,255,255,.04)}
.dd-tab.active{background:rgba(255,255,255,.12);opacity:1}
.dd-panel{display:none;flex-direction:column;gap:2px}
.dd-panel.show{display:flex}
.dd-empty{padding:28px 12px;text-align:center;font-size:12px;opacity:.45}
.dropdown:has(.editor-wrap.show) .dd-tabs,
.dropdown:has(.editor-wrap.show) .dd-panel{display:none}
.bottom-sheet:has(.editor-wrap.show) .dd-tabs,
.bottom-sheet:has(.editor-wrap.show) .dd-panel{display:none}
.dd-divider{height:1px;background:rgba(255,255,255,.07);margin:6px 0}
.dd-btn{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px}
.dd-btn:hover{background:rgba(255,255,255,.08)}
.dd-btn .icon{width:18px;text-align:center;opacity:.6;font-size:15px}
.dd-input-row{display:flex;gap:6px;padding:4px 2px 6px}
.dd-input-row input{flex:1;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:10px;outline:none;font-size:14px}
.dd-input-row button{border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:10px 12px;cursor:pointer;font-size:13px;white-space:nowrap}
.mgmt-section{display:none;padding:10px;background:rgba(255,255,255,.03);border-radius:12px;margin:5px 0}
.mgmt-section.show{display:block}
.mood-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.mchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.mchip.active{background:#fff;color:#111;border-color:#fff}
.tag-chips{display:flex;flex-wrap:wrap;gap:5px;padding:4px 2px 8px}
.tchip{border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;border-radius:999px;padding:6px 12px;font-size:12px;cursor:pointer;transition:.12s}
.tchip.active{background:#fff;color:#111;border-color:#fff}
.editor-wrap{display:none}
.editor-wrap.show{display:block}
.bottombar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:2px;background:rgba(10,10,10,.75);border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:6px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.bottombar-btn{width:42px;height:42px;border-radius:999px;border:none;background:transparent;color:#fff;cursor:pointer;font-size:19px;display:grid;place-items:center;transition:.15s;padding:0;flex-shrink:0}
.bottombar-btn:hover{background:rgba(255,255,255,.1)}
.bottombar-btn:focus{outline:none}
.bottombar-btn.active{background:rgba(255,255,255,.14)}
.bottombar-divider{width:1px;height:18px;background:rgba(255,255,255,.1);margin:0 2px;flex-shrink:0}
#spotifyBtn svg{width:22px;height:22px;display:block}
.gridwrap{position:relative}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:2px;padding:2px}
.cell{position:relative;overflow:hidden;background:#111;aspect-ratio:9/16;cursor:pointer;contain:strict}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.cell:hover img,.cell:hover video{transform:scale(1.04)}
.cell.sel-highlight{outline:2px solid #fff;outline-offset:-2px}
.cell.mood-dim{opacity:.35;transition:opacity .2s}
.selcheck{position:absolute;top:8px;left:8px;z-index:2;width:20px;height:20px;accent-color:#fff;opacity:0;pointer-events:none;cursor:pointer}
.selcheck.visible{opacity:1;pointer-events:auto}


.action-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:14px 16px 32px;background:linear-gradient(to top,rgba(0,0,0,.97) 70%,transparent);display:none;flex-direction:column;gap:10px}
.action-bar.show{display:flex}
.action-bar-title{font-size:11px;opacity:.5;text-transform:uppercase;letter-spacing:.08em}
.action-bar-moods{display:flex;flex-wrap:wrap;gap:6px}
.ab-chip{border:1px solid var(--border);background:rgba(255,255,255,.07);color:#fff;border-radius:999px;padding:8px 16px;font-size:13px;cursor:pointer;transition:.15s;font-weight:500}
.ab-chip:hover{background:rgba(255,255,255,.15)}
.ab-chip.sel{background:#fff;color:#111;border-color:#fff}
.action-bar-actions{display:flex;gap:8px}
.ab-act{flex:1;border:1px solid var(--border);border-radius:12px;padding:11px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
.ab-act.confirm{background:#fff;color:#111;border-color:#fff}
.ab-act.confirm:hover{background:#ddd}
.ab-act.cancel{background:rgba(255,255,255,.06);color:#fff}
.ab-act.cancel:hover{background:rgba(255,255,255,.12)}
.ab-act.remove{background:rgba(255,60,60,.15);color:#ff6b6b;border-color:rgba(255,60,60,.3)}
.ab-act.remove:hover{background:rgba(255,60,60,.25)}
.ab-count{font-size:12px;opacity:.5}
.lightbox{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center;backdrop-filter:blur(10px);touch-action:pan-y;cursor:pointer;overflow:hidden}
.lightbox.show{display:flex}
.lb-ambient{position:absolute;inset:-15%;z-index:0;pointer-events:none;opacity:0;transition:opacity .8s ease;background:radial-gradient(45% 55% at 28% 30%,var(--ambient-1,rgba(80,90,140,.55)),transparent 70%),radial-gradient(45% 55% at 72% 70%,var(--ambient-2,rgba(140,70,120,.45)),transparent 70%);filter:blur(60px) saturate(1.65);will-change:opacity}
.lightbox.show .lb-ambient{opacity:1}
.lb-inner{position:relative;z-index:1;max-width:92vw;max-height:92vh;user-select:none;cursor:default}
.lb-inner img,.lb-inner video{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:10px;display:block}
.lb-inner video{pointer-events:auto}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:81;width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;font-size:18px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(10px);transition:.15s}
.lb-arrow:hover{background:rgba(255,255,255,.18)}
.lb-arrow.prev{left:14px}
.lb-arrow.next{right:14px}
.lb-mute-btn{position:fixed;bottom:28px;right:20px;z-index:90;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:18px;display:none;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.4);transition:.15s}
.lb-mute-btn:hover{background:rgba(255,255,255,.18)}
.lb-mute-btn.show{display:grid}
.lb-share-btn{position:fixed;bottom:28px;left:20px;z-index:90;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:17px;display:none;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.4);transition:.15s}
.lb-share-btn:hover{background:rgba(255,255,255,.18)}
.lb-share-btn.show{display:grid}
.share-popup{position:fixed;bottom:88px;left:20px;z-index:95;width:min(340px,calc(100vw - 40px));border:1px solid var(--border);border-radius:14px;background:var(--panel);backdrop-filter:blur(24px);box-shadow:0 20px 50px rgba(0,0,0,.6);padding:10px;display:flex;gap:8px;align-items:center;opacity:0;pointer-events:none;transform:translateY(8px) scale(.96);transform-origin:0 100%;transition:opacity .22s ease, transform .22s cubic-bezier(.2,.8,.2,1)}

function buildShareUrl(it){
  return `${location.origin}${location.pathname}#mb=${encodeURIComponent(it.id)}`;
}
async function copyText(text){
  try { await navigator.clipboard.writeText(text); return true; }
  catch(e){
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
      return true;
    } catch(e2){ return false; }
  }
}

function parseShareHash(){
  const m = (location.hash || '').slice(1).match(/^mb=(.+)$/);
  if(!m) return null;
  return { id: decodeURIComponent(m[1]) };
}

// ── Ambient Mode (lightbox background glow) ─────────────
const ambientCache = new Map();
const AMBIENT_DEFAULT_1 = 'rgba(80,90,140,.5)';
const AMBIENT_DEFAULT_2 = 'rgba(140,70,120,.45)';
function getDominantColor(url){
  if(ambientCache.has(url)) return Promise.resolve(ambientCache.get(url));
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const W=16, H=16;
        const c = document.createElement('canvas');
        c.width=W; c.height=H;
        const ctx = c.getContext('2d');
        ctx.drawImage(img, 0, 0, W, H);
        const d = ctx.getImageData(0,0,W,H).data;
        let r=0,g=0,b=0,n=0;
        for(let i=0; i<d.length; i+=4){
          if(d[i+3] < 128) continue;
          // skip near-black/near-white pixels to avoid muddy averages
          const lum = (d[i]+d[i+1]+d[i+2])/3;
          if(lum < 18 || lum > 240) continue;
          r += d[i]; g += d[i+1]; b += d[i+2]; n++;
        }
        const color = n ? [Math.round(r/n), Math.round(g/n), Math.round(b/n)] : null;
        ambientCache.set(url, color);
        resolve(color);
      } catch(e){ ambientCache.set(url, null); resolve(null); }
    };
    img.onerror = () => { ambientCache.set(url, null); resolve(null); };
    img.src = url;
  });
}
function applyAmbient(c1, c2){
  lbAmbient.style.setProperty('--ambient-1', c1);
  lbAmbient.style.setProperty('--ambient-2', c2);
}
async function setAmbientFor(it){
  // fade out before swap so transitions feel intentional
  lbAmbient.style.opacity = '0';
  let c1 = AMBIENT_DEFAULT_1, c2 = AMBIENT_DEFAULT_2;
  if(it.media_type !== 'video'){
    const color = await getDominantColor(it.media_url);
    if(color){
      const [r,g,b] = color;
      c1 = `rgba(${r},${g},${b},.6)`;
      c2 = `rgba(${Math.min(255,r+35)},${Math.max(0,g-10)},${Math.min(255,b+50)},.5)`;
    }
  }
  // bail if user navigated away
  if(!lightbox.classList.contains('show') || S().currentItems[lbIndex] !== it) return;
  applyAmbient(c1, c2);
  requestAnimationFrame(() => { lbAmbient.style.opacity = ''; });
}

// ── Apply grid cols ────────────────────────────────────────
function applyGridCols(cols){
  gridCols = cols;
  // Only apply custom cols on mobile; desktop uses CSS auto-fill
  if(window.innerWidth <= 600){
    document.getElementById('grid').style.gridTemplateColumns =
      cols === 1 ? '1fr' : `repeat(${cols}, 1fr)`;
  } else {
    document.getElementById('grid').style.gridTemplateColumns = '';
  }
  document.querySelectorAll('.fp-grid-btn').forEach(b => {
    b.classList.toggle('sel', parseInt(b.dataset.cols) === cols);
  });
  saveFilterState();
}

// ── Render filter popup ────────────────────────────────────
function renderFilterPopup(){
  const moods = S().moods; // includes 'All'
  const fpMoods = document.getElementById('fpMoods');
  fpMoods.innerHTML = moods.filter(m => m !== 'All').map(m => `
    <button class="fp-chip ${activeMoods.has(m)?'sel':''}" data-m="${m}">
      <span class="mood-icon">${moodIcon(m)}</span>${m}
    </button>`).join('');
  fpMoods.querySelectorAll('.fp-chip').forEach(b => {
    b.onclick = () => {
      const m = b.dataset.m;
      activeMoods.has(m) ? activeMoods.delete(m) : activeMoods.add(m);
      b.classList.toggle('sel', activeMoods.has(m));
      updateFilterBtnState();
    };
  });
  // grid col buttons
  document.querySelectorAll('.fp-grid-btn').forEach(b => {
    b.classList.toggle('sel', parseInt(b.dataset.cols) === gridCols);
    b.onclick = () => applyGridCols(parseInt(b.dataset.cols));
  });
}

// ── Bind Mood Management ──────────────────────────────────
function bindMgmt(suffix){
  const g = k => $(k + (suffix||''));
  g('showRenameBtn').onclick = () => g('renameArea').style.display = 'flex';

  g('addMoodBtn').onclick = () => {
    const v=g('newMood').value.trim(); if(!v||S().moods.includes(v)) return;
    S().moods.push(v); S().currentMood=v; saveMoodsList(); g('newMood').value=''; renderMoodChips(); renderGrid();
    if(typeof moodsViewOpen !== 'undefined' && moodsViewOpen) renderMoodsView();
  };
  g('renameMoodBtn').onclick = () => {
    const old=g('oldMoodName').value.trim(); const v=g('newMoodName').value.trim();
    if(!old||!v||!S().moods.includes(old)) return;
    S().moods = S().moods.map(m=>m===old?v:m);
    S().items.forEach(it => {
      if(Array.isArray(it.moods) && it.moods.includes(old)){
        it.moods = it.moods.map(x => x===old ? v : x);
        sbUpdate(it);
      }
    });
    saveMoodsList();
    S().currentMood=v; g('oldMoodName').value=''; g('newMoodName').value=''; g('renameArea').style.display='none';
    renderMoodChips(); renderGrid();
    if(typeof moodsViewOpen !== 'undefined' && moodsViewOpen) renderMoodsView();
  };
  g('deleteMoodBtn').onclick = () => {
    const v=g('deleteMood').value.trim(); if(!v||!S().moods.includes(v)||v==='All') return;
    S().moods=S().moods.filter(m=>m!==v);
    S().items.forEach(it => {
      if(Array.isArray(it.moods) && it.moods.includes(v)){
        it.moods = it.moods.filter(x => x!==v);
        sbUpdate(it);
      }
    });
    saveMoodsList();
    if(S().currentMood===v) S().currentMood='All';
    g('deleteMood').value=''; renderMoodChips(); renderGrid();
    if(typeof moodsViewOpen !== 'undefined' && moodsViewOpen) renderMoodsView();
  };
}

// ── Quick-Add via URL ────────────────────────────────────
function bindQuickAdd(suffix){
  const g = k => $(k + (suffix||''));
  const btn = g('quickAddBtn'); const inp = g('quickAddUrl');
  if(!btn || !inp) return;
  const run = async () => {
    const url = inp.value.trim();
    if(!url) return;
    if(!/^https?:\/\//i.test(url)){ toast('Ungültige URL'); return; }
    const isVideo = /\.(mp4|webm|mov|m4v)(\?|#|$)/i.test(url);
    const item = {
      title: ((url.split('/').pop()||'Link').split('?')[0] || 'Link').slice(0, 80),
      moods: [], tags: [],
      media_url: url,
      media_type: isVideo ? 'video' : 'image',
      favorite: false
    };
    btn.disabled = true;
    const {data:ins, error} = await sb.from(S().table).insert(item).select().single();
    btn.disabled = false;
    if(error){ toast('Fehler: '+error.message); return; }
    S().items.unshift({...item, id: ins.id});
    inp.value = '';
    toast('Hinzugefügt ✓'); renderGrid(); closeMenu();
  };
  btn.onclick = run;
  inp.onkeydown = e => { if(e.key === 'Enter') run(); };
}

function toast(t){ toastEl.textContent=t; toastEl.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>toastEl.classList.remove('show'),1600); }
function isVid(n){ return /\.(mp4|webm|mov|m4v)$/i.test(n||''); }
function prog(p){ progressBar.style.width=p+'%'; if(p>=100) setTimeout(()=>progressBar.style.width='0',600); }
function compress(file, maxPx=MAX_PX, q=0.88){
  return new Promise(res=>{
    if(isVid(file.name)){ res(file); return; }
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.width, h=img.height;
      if(w<=maxPx && h<=maxPx){ res(file); return; }
      const r=Math.min(maxPx/w, maxPx/h); w=Math.round(w*r); h=Math.round(h*r);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=>res(new File([b],file.name,{type:'image/jpeg'})),'image/jpeg',q);
    };
    img.src=url;
  });
}
let _lockedScrollY = 0;
function updateBodyLock(){
  const lock = (typeof lightbox!=='undefined' && lightbox.classList.contains('show'))
    || (typeof moodPicker!=='undefined' && moodPicker.classList.contains('show'))
    || (typeof moodCreateModal!=='undefined' && moodCreateModal && moodCreateModal.classList.contains('show'))
    || bottomSheet.classList.contains('show');
  const isLocked = document.body.classList.contains('no-scroll');
  if(lock && !isLocked){
    _lockedScrollY = window.scrollY || window.pageYOffset || 0;
    document.body.style.top = `-${_lockedScrollY}px`;
    document.body.classList.add('no-scroll');
  } else if(!lock && isLocked){
    document.body.classList.remove('no-scroll');
    document.body.style.top = '';
    window.scrollTo(0, _lockedScrollY);
  }
}

function renderGrid(){
  const s = S();
  // Filter: if activeMoods has entries, show items matching ANY selected mood (OR)
  let arr = activeMoods.size > 0
    ? s.items.filter(i => (Array.isArray(i.moods) && i.moods.some(m => activeMoods.has(m))))
    : s.items;
  arr = [...arr].sort(() => Math.random()-.5);
  s.currentItems = arr;
  if(_observer){ _observer.disconnect(); _observer=null; }
  gridEl.innerHTML = arr.map(it => `
    <div class="cell" data-id="${it.id}">
      <input class="selcheck" type="checkbox" data-id="${it.id}">
      ${it.media_type==='video'
        ? `<video src="${it.media_url}" muted loop playsinline preload="none"></video>`
        : `<img src="${it.media_url}" loading="lazy" decoding="async" alt="">`}
    </div>`).join('');

  _observer = new IntersectionObserver(entries => entries.forEach(e => {
    const v = e.target.querySelector('video'); if(!v) return;
    if(e.isIntersecting){ v.muted=true; v.play().catch(()=>{}); }
    else { v.pause(); v.currentTime=0; }
  }), { threshold:0.25, rootMargin:'100px' });

  applyGridCols(gridCols);
  gridEl.querySelectorAll('.cell').forEach(c => {
    _observer.observe(c);
    const chk = c.querySelector('.selcheck');
    c.onclick = e => {
      if(selMode){
        const id = c.dataset.id;
        if(e.target !== chk) chk.checked = !chk.checked;
        chk.checked ? selectedIds.add(id) : selectedIds.delete(id);
        c.classList.toggle('sel-highlight', chk.checked);
        updateActionBarCount();
        if(selMode==='assign') updateDimming();
        return;
      }
      if(isAnyOverlayOpen()){ closeAllOverlays(); e.stopPropagation(); return; }
      const idx = S().currentItems.findIndex(x => x.id===c.dataset.id); openLightbox(idx);
    };
    c.oncontextmenu = e => { e.preventDefault(); if(!selMode) openEditor(c.dataset.id); };
    if(selMode==='assign'||selMode==='remove') c.querySelector('.cell-mood-badge')?.classList.add('show');
    if(selMode){ chk.classList.add('visible'); if(selectedIds.has(c.dataset.id)){ chk.checked=true; c.classList.add('sel-highlight'); } }
  });
}

  toast(ok ? 'Link kopiert ✓' : 'Kopieren fehlgeschlagen');
  closeSharePopup();
};
document.addEventListener('click', e => {

lbMuteBtn.onclick = e => {

let txS=0, tyS=0;
lightbox.addEventListener('touchstart', e=>{ txS=e.touches[0].clientX; tyS=e.touches[0].clientY; }, {passive:true});
lightbox.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-txS, dy=e.changedTouches[0].clientY-tyS;
  if(Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>40) lbNavigate(dx<0?1:-1);
}, {passive:true});


document.addEventListener('keydown', e => {
  if(lightbox.classList.contains('show')){
    if(e.key==='ArrowLeft') lbNavigate(-1);
    else if(e.key==='ArrowRight') lbNavigate(1);
    else if(e.key==='Escape') closeLb();
    return;
  }
  if(e.key==='Escape'){ if(selMode) exitSelMode(); else closeMenu(); }
});

$('shuffleBtn').onclick = () => { $('shuffleBtn').blur(); renderGrid(); };
$('uploadBtn').onclick = () => { fileInput.click(); closeMenu(); };
$('uploadBtnSheet').onclick = () => { fileInput.click(); closeMenu(); };
fileInput.onchange = e => upload(e.target.files);

async function upload(files){
  const arr = Array.from(files);
  for(let i=0; i<arr.length; i++){
    prog(Math.round(i/arr.length*90)); toast(`Upload ${i+1}/${arr.length}…`);
    const f=arr[i]; const cf=await compress(f);
    const ext=f.name.split('.').pop().toLowerCase();
    const path=`${Date.now().toString(36)}${Math.random().toString(36).slice(2,6)}.${ext}`;
    const {error:e1} = await sb.storage.from(BUCKET).upload(path, cf, {upsert:false, contentType:cf.type});
    if(e1){ toast('Upload-Fehler: '+e1.message); continue; }
    const {data:pub} = sb.storage.from(BUCKET).getPublicUrl(path);
    const item = { title:f.name.replace(/\.[^.]+$/,''), moods:[], tags:[], media_url:pub.publicUrl, media_type:isVid(f.name)?'video':'image', favorite:false };
    const {data:ins, error:e2} = await sb.from(S().table).insert(item).select().single();
    if(e2){ toast('DB-Fehler: '+e2.message); continue; }
    S().items.unshift({...item, id:ins.id}); renderGrid();
  }
  prog(100); toast('Fertig ✓'); fileInput.value='';
}

function startDeleteMode(){
  closeMenu(); selMode='delete'; selectedIds.clear();
  actionBarTitle.textContent='Bilder löschen';
  $('abConfirm').classList.add('hidden'); $('abRemove').classList.add('hidden');
  actionBarMoods.innerHTML='';
  actionBar.classList.add('show'); renderGrid(); updateActionBarCount();
  $('deleteFloatingBtn')?.remove();
  const btn = document.createElement('button');
  btn.id='deleteFloatingBtn'; btn.innerHTML='🗑';
  btn.style.cssText='position:fixed;left:20px;bottom:100px;z-index:60;width:46px;height:46px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,60,60,.2);color:#fff;cursor:pointer;font-size:18px;display:grid;place-items:center;backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.3)';
  btn.onclick = async () => {
    if(!selectedIds.size){ toast('Nichts ausgewählt'); return; }
    if(!confirm(selectedIds.size+' Bilder löschen?')) return;
    await sbDeleteMany([...selectedIds]);
    S().items = S().items.filter(i=>!selectedIds.has(i.id));
    toast('Gelöscht'); btn.remove(); exitSelMode();
  };
  document.body.appendChild(btn);
}
$('pickDeleteBtn').onclick = startDeleteMode;
$('pickDeleteBtnSheet').onclick = startDeleteMode;

function openEditor(id){
  editId=id; const it=S().items.find(x=>x.id===id); if(!it) return;
  $('editorTitle').textContent = it.title||'Item';
  $('tagInput').value = (it.tags||[]).join(', ');
  editorWrap.classList.add('show'); renderTagChips(); dropdown.classList.add('show');
}
function renderTagChips(){
  const it = S().items.find(x=>x.id===editId);
  $('tagChips').innerHTML = S().moods.filter(m=>m!=='All').map(m =>
    `<button class="tchip ${it&&Array.isArray(it.moods) && it.moods.includes(m)?'active':''}" data-m="${m}">${m}</button>`).join('');
  document.querySelectorAll('.tchip').forEach(b => b.onclick = () => {

$('saveTagsBtn').onclick = () => {

  it.tags = $('tagInput').value.split(',').map(s=>s.trim()).filter(Boolean);
  sbUpdate(it); renderGrid(); toast('Tags gespeichert');

async function loadItems(){
  const {data,error} = await sb.from(S().table)
    .select('id,title,moods,tags,media_url,media_type,favorite')
    .order('created_at',{ascending:false});
  if(error){ toast('Ladefehler: '+error.message); gridEl.innerHTML='<div style="padding:24px;color:#fff">Kein Datenzugriff</div>'; return; }
  S().items=data||[]; renderGrid(); $('bootMsg')?.remove();
  if(typeof moodsViewOpen !== 'undefined' && moodsViewOpen) renderMoodsView();
  tryOpenPendingShare();
}
async function sbUpdate(item){
  if(!item) return;
  await sb.from(S().table).update({title:item.title||'', moods:item.moods||[], tags:item.tags||[], media_url:item.media_url, media_type:item.media_type, favorite:false}).eq('id',item.id);
}
async function sbDeleteMany(ids){
  if(!ids.length) return;
  await sb.from(S().table).delete().in('id',ids);
}

// ── Moods Overview Page ───────────────────────────────────
let moodsViewOpen = false;
const moodsView = $('moodsView');
const moodsGrid = $('moodsGrid');
const moodsNavBtn = $('moodsNavBtn');
const boardTitle = $('boardTitle');
const moodPicker = $('moodPicker');

function moodMainKey(page, mood){ return `mood_main_${page}_${mood}`; }
function getMoodMain(page, mood){ return localStorage.getItem(moodMainKey(page, mood)); }
function setMoodMain(page, mood, id){
  if(id) localStorage.setItem(moodMainKey(page, mood), id);
  else localStorage.removeItem(moodMainKey(page, mood));
}

function pickMainItem(mood){
  const items = S().items.filter(i => Array.isArray(i.moods) && i.moods.includes(mood));
  if(!items.length) return null;
  const customId = getMoodMain(currentPage, mood);
  if(customId){
    const it = items.find(x => x.id === customId);
    if(it) return it;
  }
  return items[Math.floor(Math.random() * items.length)];
}

function renderMoodsView(){
  const moods = S().moods.filter(m => m !== 'All');
  // Pattern: every 4th tile wide, every 7th tile tall — feels organic
  const tilesHtml = moods.map((m, i) => {
    const it = pickMainItem(m);
    const count = S().items.filter(x => Array.isArray(x.moods) && x.moods.includes(m)).length;
    const sizeClass = i % 7 === 6 ? 'tall' : (i % 4 === 3 ? 'wide' : '');
    const media = it
      ? (it.media_type === 'video'
          ? `<video src="${it.media_url}" muted loop playsinline autoplay preload="metadata"></video>`
          : `<img src="${it.media_url}" loading="lazy" decoding="async" alt="">`)
      : `<div class="mt-empty">Kein Bild</div>`;
    return `
      <div class="mood-tile ${sizeClass}" data-m="${m}">
        ${media}
        <div class="mt-overlay"></div>
        <button class="mt-edit" data-m="${m}" title="Hauptbild ändern">&#9881;</button>
        <div class="mt-label">
          <span class="mt-icon">${moodIcon(m)}</span>
          <span>${m}</span>
          <span class="mt-count">${count}</span>
        </div>
      </div>`;
  }).join('');
  const createTile = `
    <div class="mood-tile mood-tile-create" id="moodCreateTile" title="Neue Mood erstellen">
      <div class="mtc-inner">
        <div class="mtc-plus">+</div>
        <div class="mtc-label">Neue Mood</div>
      </div>
    </div>`;
  moodsGrid.innerHTML = tilesHtml + createTile;
  const createBtn = document.getElementById('moodCreateTile');
  if(createBtn) createBtn.onclick = openMoodCreate;
  moodsGrid.querySelectorAll('.mood-tile:not(.mood-tile-create)').forEach(tile => {
    tile.onclick = e => {
      if(e.target.closest('.mt-edit')) return;
      const m = tile.dataset.m;
      activeMoods = new Set([m]);
      saveFilterState();
      updateFilterBtnState();
      hideMoodsView();
      renderGrid();
    };
    const editBtn = tile.querySelector('.mt-edit');
    if(editBtn) editBtn.onclick = e => { e.stopPropagation(); openMoodPicker(tile.dataset.m); };
    // long-press on touch as alt path
    let lpTimer = null;
    tile.addEventListener('touchstart', () => {
      lpTimer = setTimeout(() => openMoodPicker(tile.dataset.m), 550);
    }, {passive:true});
    tile.addEventListener('touchend', () => { if(lpTimer) clearTimeout(lpTimer); });
    tile.addEventListener('touchmove', () => { if(lpTimer) clearTimeout(lpTimer); });
  });
}

function showMoodsView(){
  moodsViewOpen = true;
  closeMenu(); closeLb(); exitSelMode();
  filterPopup.classList.remove('show');
  gridWrap.style.display = 'none';
  moodsView.classList.add('show');
  moodsNavBtn.classList.add('active');
  boardTitle.classList.remove('active');
  renderMoodsView();
  window.scrollTo(0, 0);
}
function hideMoodsView(){
  moodsViewOpen = false;
  moodsView.classList.remove('show');
  gridWrap.style.display = '';
  moodsNavBtn.classList.remove('active');
  boardTitle.classList.add('active');
  closeMoodPicker();
}

moodsNavBtn.onclick = () => {
  if(moodsViewOpen) hideMoodsView();
  else showMoodsView();
};
boardTitle.classList.add('active');

// ── Mood Main-Image Picker ────────────────────────────────
let pickerMood = null;
function openMoodPicker(mood){
  pickerMood = mood;
  $('mpTitle').textContent = `Hauptbild für „${mood}"`;
  const items = S().items.filter(i => Array.isArray(i.moods) && i.moods.includes(mood));
  const currentId = getMoodMain(currentPage, mood);
  const grid = $('mpGrid');
  if(!items.length){
    grid.innerHTML = '<div style="grid-column:1/-1;padding:40px;text-align:center;opacity:.5;font-size:13px">Diesem Mood sind noch keine Bilder zugewiesen.</div>';
  } else {
    grid.innerHTML = items.map(it => `
      <div class="mp-cell ${currentId===it.id?'current':''}" data-id="${it.id}">
        ${it.media_type==='video'
          ? `<video src="${it.media_url}" muted loop playsinline preload="metadata"></video>`
          : `<img src="${it.media_url}" loading="lazy" alt="">`}
        <span class="mp-current-badge">Aktuell</span>
      </div>`).join('');
    grid.querySelectorAll('.mp-cell').forEach(c => c.onclick = () => {
      const id = c.dataset.id;
      const isCurrent = c.classList.contains('current');
      setMoodMain(currentPage, pickerMood, isCurrent ? null : id);
      grid.querySelectorAll('.mp-cell').forEach(x => x.classList.remove('current'));
      if(!isCurrent) c.classList.add('current');
      renderMoodsView();
      toast(isCurrent ? 'Hauptbild zurückgesetzt' : 'Hauptbild gesetzt ✓');
    });
  }
  moodPicker.classList.add('show');
  updateBodyLock();
}
function closeMoodPicker(){ moodPicker.classList.remove('show'); pickerMood = null; updateBodyLock(); }
$('mpClose').onclick = closeMoodPicker;
$('mpReset').onclick = () => {
  if(!pickerMood) return;
  setMoodMain(currentPage, pickerMood, null);
  $('mpGrid').querySelectorAll('.mp-cell').forEach(x => x.classList.remove('current'));
  renderMoodsView();
  toast('Hauptbild zurückgesetzt');
};
moodPicker.addEventListener('click', e => { if(e.target === moodPicker) closeMoodPicker(); });

// ── Create Mood Modal ─────────────────────────────────────
const moodCreateModal = $('moodCreateModal');
const mcmInput = $('mcmInput');
const mcmError = $('mcmError');
function openMoodCreate(){
  mcmInput.value = '';
  mcmError.classList.remove('show');
  mcmError.innerHTML = '&nbsp;';
  moodCreateModal.classList.add('show');
  updateBodyLock();
  setTimeout(() => mcmInput.focus(), 60);
}
function closeMoodCreate(){
  moodCreateModal.classList.remove('show');
  updateBodyLock();
}
function showMcmError(msg){
  mcmError.textContent = msg;
  mcmError.classList.add('show');
}
async function confirmCreateMood(){
  const raw = mcmInput.value.trim();
  if(!raw){ showMcmError('Bitte einen Namen eingeben'); return; }
  if(raw.length < 2){ showMcmError('Mindestens 2 Zeichen'); return; }
  // case-insensitive duplicate check
  const exists = S().moods.some(m => m.toLowerCase() === raw.toLowerCase());
  if(exists){ showMcmError('Diese Mood existiert bereits'); return; }
  S().moods.push(raw);
  saveMoodsList();
  renderMoodChips();
  if(moodsViewOpen) renderMoodsView();
  closeMoodCreate();
  toast(`Mood „${raw}" erstellt ✓`);
}
$('mcmConfirm').onclick = confirmCreateMood;
$('mcmCancel').onclick = closeMoodCreate;
mcmInput.addEventListener('keydown', e => {
  if(e.key === 'Enter') confirmCreateMood();
  else if(e.key === 'Escape') closeMoodCreate();
});
moodCreateModal.addEventListener('click', e => {
  if(e.target === moodCreateModal) closeMoodCreate();
});

renderMoodChips();
applyGridCols(gridCols);
updateFilterBtnState();
loadItems();
window.addEventListener('resize', () => applyGridCols(gridCols));

</script>

<script>
(function(){

  const popup = document.getElementById('spotifyPopup');
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const open = popup.classList.toggle('show');
    btn.classList.toggle('active', open);
  });
  document.addEventListener('click', e => {
    if (!popup.contains(e.target) && !btn.contains(e.target)) {
      popup.classList.remove('show');
      btn.classList.remove('active');
    }
  });
})();

window.onSpotifyIframeApiReady = (IFrameAPI) => {
  const el = document.getElementById('spotifyEmbed');
  const options = {
    uri: 'spotify:playlist:2qURpmjeU1eFu9orvltb5I',
    width: '100%',
    height: 152
  };
  IFrameAPI.createController(el, options, (controller) => {
    const tryPlay = () => { try { controller.play(); } catch(e){} };
    tryPlay();
    const onInteract = () => {
      tryPlay();
      document.removeEventListener('click', onInteract, true);
      document.removeEventListener('keydown', onInteract, true);
      document.removeEventListener('touchstart', onInteract, true);
    };
    document.addEventListener('click', onInteract, true);
    document.addEventListener('keydown', onInteract, true);
    document.addEventListener('touchstart', onInteract, true);
  });
};
