<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moodboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--text:#fff;--border:rgba(255,255,255,.12);--muted:rgba(255,255,255,.65);--panel:rgba(10,10,10,.92)}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
button,input{font:inherit}
.app{position:fixed;inset:0}
.titlewrap{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;justify-content:center;align-items:center;padding:12px 18px;pointer-events:none}
.title{pointer-events:auto;width:240px;max-width:58vw;border:0;background:transparent;color:#fff;text-align:center;font-size:18px;font-weight:700;letter-spacing:.04em;outline:none;opacity:.92}
.iconbtn{position:fixed;z-index:30;width:46px;height:46px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(18px) saturate(120%);-webkit-backdrop-filter:blur(18px) saturate(120%);box-shadow:0 10px 22px rgba(0,0,0,.16);transition:.16s}
.iconbtn:hover{background:rgba(255,255,255,.1)}
#menuBtn{top:14px;right:14px;font-size:22px}
#shuffleBtn{right:14px;bottom:14px;font-size:18px}
.menu{position:fixed;top:66px;right:14px;z-index:40;min-width:230px;display:none;padding:10px;border:1px solid var(--border);border-radius:16px;background:var(--panel);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);box-shadow:0 16px 40px rgba(0,0,0,.35)}
.menu.show{display:block}
.menu .head{padding:8px 10px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;opacity:.5}
.menu .divider{height:1px;background:rgba(255,255,255,.08);margin:8px 0}
.menu button{width:100%;border:0;background:transparent;color:#fff;text-align:left;padding:10px;border-radius:10px;cursor:pointer}
.menu button:hover{background:rgba(255,255,255,.08)}
.grid{position:absolute;inset:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));grid-auto-rows:1fr;gap:2px;align-content:start;padding:2px}
.cell{position:relative;overflow:hidden;background:#111;aspect-ratio:9/16;min-height:220px}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block;background:#000}
.editor,.settings{position:fixed;z-index:60;display:none;width:min(520px,calc(100vw - 32px));background:rgba(12,12,12,.96);border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:0 20px 60px rgba(0,0,0,.55)}
.editor.show,.settings.show{display:block}
.editor{left:50%;top:50%;transform:translate(-50%,-50%)}
.settings{right:14px;top:66px;width:min(320px,calc(100vw - 28px))}
.editor h4,.settings h4{margin:0 0 12px;font-size:14px}
.tagrow,.row{display:flex;gap:8px;flex-wrap:wrap}
.tagrow{margin-bottom:12px}
.tagchip{border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:999px;padding:8px 10px;font-size:12px;cursor:pointer}
.tagchip.active{background:#fff;color:#111;border-color:#fff}
.editor input,.settings input{flex:1;min-width:0;border:1px solid var(--border);background:rgba(255,255,255,.06);color:#fff;border-radius:10px;padding:10px 12px;outline:none}
.editor button,.settings button{border:1px solid var(--border);background:rgba(255,255,255,.08);color:#fff;border-radius:10px;padding:10px 12px;cursor:pointer}
.toast{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);z-index:80;background:rgba(0,0,0,.8);border:1px solid var(--border);color:#fff;padding:10px 14px;border-radius:999px;font-size:12px;opacity:0;pointer-events:none;transition:.2s}
.toast.show{opacity:1}
.hidden{display:none !important}
@media (max-width:700px){.grid{grid-template-columns:repeat(2,1fr);gap:2px;padding:2px}.cell{min-height:210px}.title{font-size:17px}.menu{min-width:200px}}
</style>
</head>
<body>
<div class="app">
  <div class="titlewrap"><input id="boardTitle" class="title" value="Moodboard"></div>
  <button id="menuBtn" class="iconbtn">⋯</button>
  <button id="shuffleBtn" class="iconbtn" title="Shuffle">⇄</button>
  <div id="menuPanel" class="menu"></div>
  <div id="settingsPanel" class="settings">
    <h4>Settings</h4>
    <div class="row"><input id="newMood" placeholder="Neue Mood hinzufügen"><button id="addMoodBtn">Add</button></div>
    <div class="row"><input id="renameMood" placeholder="Aktuelle Mood umbenennen"><button id="renameMoodBtn">Rename</button></div>
    <div class="row"><input id="deleteMood" placeholder="Mood löschen"><button id="deleteMoodBtn">Delete</button></div>
    <div class="row"><input id="apiUrl" placeholder="Supabase URL"><input id="apiKey" placeholder="Supabase Anon Key"></div>
    <div class="row"><button id="saveApiBtn">Save API</button><button id="refreshBtn">Refresh</button></div>
    <div class="row"><button id="uploadBtn">Upload</button><button id="clearBtn">Alle löschen</button></div>
    <input id="fileInput" class="hidden" type="file" accept="image/*,video/*" multiple>
  </div>
  <div id="grid" class="grid"></div>
  <div id="editor" class="editor">
    <h4>Tags</h4>
    <div id="tagHint" style="font-size:12px;opacity:.6;margin-bottom:10px"></div>
    <div id="tagButtons" class="tagrow"></div>
    <div class="row"><input id="tagInput" placeholder="Tags durch Komma getrennt"><button id="saveTagsBtn">Save</button><button id="closeEditorBtn">Close</button></div>
  </div>
  <div id="toast" class="toast"></div>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const LS={title:'mood_title_sync',current:'mood_current_sync',shuffle:'mood_shuffle_sync',supabaseUrl:'mood_supabase_url',supabaseKey:'mood_supabase_key'};
let supabaseUrl=localStorage.getItem(LS.supabaseUrl)||'';
let supabaseKey=localStorage.getItem(LS.supabaseKey)||'';
let supabase=null;
let items=[];
let moods=['All','Summer','Winter','Cozy','Dark'];
let currentMood=localStorage.getItem(LS.current)||'All';
let boardTitle=localStorage.getItem(LS.title)||'Moodboard';
let shuffleState=JSON.parse(localStorage.getItem(LS.shuffle)||'false');
let editId=null;
const grid=document.getElementById('grid');
const menuPanel=document.getElementById('menuPanel');
const settingsPanel=document.getElementById('settingsPanel');
const editor=document.getElementById('editor');
const toast=document.getElementById('toast');
const fileInput=document.getElementById('fileInput');
const apiUrlInput=document.getElementById('apiUrl');
const apiKeyInput=document.getElementById('apiKey');
apiUrlInput.value=supabaseUrl; apiKeyInput.value=supabaseKey;
function saveLocal(){localStorage.setItem(LS.title,boardTitle);localStorage.setItem(LS.current,currentMood);localStorage.setItem(LS.shuffle,JSON.stringify(shuffleState));localStorage.setItem(LS.supabaseUrl,supabaseUrl);localStorage.setItem(LS.supabaseKey,supabaseKey)}
function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(showToast.t);showToast.t=setTimeout(()=>toast.classList.remove('show'),1200)}
function uid(){return Math.random().toString(36).slice(2,10)}
function isVideo(n){return /\.(mp4|webm|mov|m4v)$/i.test(n||'')}
function initClient(){ if(supabaseUrl&&supabaseKey){ supabase=createClient(supabaseUrl, supabaseKey); } }
function visible(){let arr=items.filter(i=>currentMood==='All'||i.mood===currentMood); if(shuffleState) arr=[...arr].sort(()=>Math.random()-.5); return arr;}
function renderMenu(){menuPanel.innerHTML=`<div class='head'>Moods</div>${moods.map(m=>`<button data-act='mood' data-val='${m}'>${m}${m===currentMood?' ✓':''}</button>`).join('')}<div class='divider'></div><div class='head'>Settings</div><button data-act='settings'>Settings</button><button data-act='upload'>Upload</button><button data-act='shuffle'>Shuffle</button>`;}
function renderGrid(){const arr=visible(); grid.innerHTML=arr.map(it=>`<div class='cell' data-id='${it.id}'>${it.media_type==='video'?`<video src='${it.media_url}' muted loop playsinline></video>`:`<img src='${it.media_url}'>`}</div>`).join(''); grid.querySelectorAll('.cell').forEach(c=>c.onclick=()=>openEditor(c.dataset.id));}
function render(){document.getElementById('boardTitle').value=boardTitle; renderMenu(); renderGrid();}
function openEditor(id){editId=id;const it=items.find(x=>x.id===id); if(!it)return; document.getElementById('tagHint').textContent=it.title||'Item'; document.getElementById('tagInput').value=(it.tags||[]).join(', '); editor.classList.add('show'); renderTagButtons();}
function renderTagButtons(){document.getElementById('tagButtons').innerHTML=moods.filter(m=>m!=='All').map(m=>`<button class='tagchip ${(items.find(x=>x.id===editId)?.mood||currentMood)===m?'active':''}' data-m='${m}'>${m}</button>`).join(''); document.querySelectorAll('#tagButtons .tagchip').forEach(b=>b.onclick=()=>{const it=items.find(x=>x.id===editId); if(!it)return; it.mood=b.dataset.m; saveLocal(); render(); renderTagButtons(); syncUpdate(it)});}
function closeAll(){menuPanel.classList.remove('show'); settingsPanel.classList.remove('show'); editor.classList.remove('show');}
function doShuffle(){shuffleState=!shuffleState; window.scrollTo({top:0,behavior:'smooth'}); saveLocal(); render(); showToast(shuffleState?'Shuffle an':'Shuffle aus')}
async function loadItems(){ if(!supabase){ items=[]; render(); return; } const {data,error}=await supabase.from('moodboard_items').select('*').order('created_at',{ascending:false}); if(!error) items=data||[]; render(); }
async function syncInsert(item){ if(!supabase) return; await supabase.from('moodboard_items').insert({id:item.id,title:item.title||'',mood:item.mood||currentMood,tags:item.tags||[],media_url:item.media_url,media_type:item.media_type,favorite:item.favorite||false}); }
async function syncUpdate(item){ if(!supabase) return; await supabase.from('moodboard_items').update({title:item.title||'',mood:item.mood||currentMood,tags:item.tags||[],media_url:item.media_url,media_type:item.media_type,favorite:item.favorite||false}).eq('id', item.id); }
async function syncDeleteAll(){ if(!supabase) return; await supabase.from('moodboard_items').delete().neq('id','00000000-0000-0000-0000-000000000000'); }
function addMood(){const v=document.getElementById('newMood').value.trim(); if(!v||moods.includes(v)) return; moods.push(v); currentMood=v; document.getElementById('newMood').value=''; render()}
function renameMood(){const v=document.getElementById('renameMood').value.trim(); if(!v||currentMood==='All'||moods.includes(v)) return; const old=currentMood; moods=moods.map(m=>m===old?v:m); items=items.map(i=>({...i,mood:i.mood===old?v:i.mood})); currentMood=v; document.getElementById('renameMood').value=''; render(); items.forEach(syncUpdate)}
function deleteMood(){const v=document.getElementById('deleteMood').value.trim(); if(!v||v==='All'||!moods.includes(v)) return; moods=moods.filter(m=>m!==v); items=items.map(i=>({...i,mood:i.mood===v?'All':i.mood})); if(currentMood===v) currentMood='All'; document.getElementById('deleteMood').value=''; render(); items.forEach(syncUpdate)}
async function addFiles(files){if(!supabase){showToast('Supabase fehlt'); return} for(const file of files){const ext=file.name.split('.').pop(); const path=`${Date.now()}-${uid()}.${ext}`; const {error:upErr}=await supabase.storage.from('moodboard').upload(path,file,{upsert:false,contentType:file.type}); if(upErr){showToast('Upload fehlgeschlagen'); continue} const {data:pub}=supabase.storage.from('moodboard').getPublicUrl(path); const item={id:uid(),title:file.name,mood:currentMood==='All'?(moods[1]||'Summer'):currentMood,tags:[],media_url:pub.publicUrl,media_type:isVideo(file.name)?'video':'image',favorite:false}; items.unshift(item); await syncInsert(item); render(); showToast('Importiert')} }
document.getElementById('menuBtn').onclick=()=>{menuPanel.classList.toggle('show'); settingsPanel.classList.remove('show'); editor.classList.remove('show'); renderMenu()};
document.getElementById('shuffleBtn').onclick=doShuffle;
document.getElementById('boardTitle').addEventListener('input',e=>{boardTitle=e.target.value.trim()||'Moodboard'; saveLocal()});
document.getElementById('saveTagsBtn').onclick=()=>{const it=items.find(x=>x.id===editId); if(!it)return; it.tags=document.getElementById('tagInput').value.split(',').map(s=>s.trim()).filter(Boolean); saveLocal(); render(); editor.classList.remove('show'); syncUpdate(it)};
document.getElementById('closeEditorBtn').onclick=()=>editor.classList.remove('show');
document.getElementById('addMoodBtn').onclick=addMood;
document.getElementById('renameMoodBtn').onclick=renameMood;
document.getElementById('deleteMoodBtn').onclick=deleteMood;
document.getElementById('uploadBtn').onclick=()=>fileInput.click();
fileInput.onchange=e=>addFiles(e.target.files);
document.getElementById('clearBtn').onclick=async()=>{if(confirm('Alle Bilder wirklich löschen?')){items=[]; if(supabase) await syncDeleteAll(); render()}};
document.getElementById('saveApiBtn').onclick=()=>{supabaseUrl=apiUrlInput.value.trim(); supabaseKey=apiKeyInput.value.trim(); saveLocal(); initClient(); loadItems(); showToast('API gespeichert')};
document.getElementById('refreshBtn').onclick=loadItems;
document.getElementById('menuPanel').onclick=e=>{const b=e.target.closest('button'); if(!b) return; const act=b.dataset.act; if(act==='mood'){currentMood=b.dataset.val; shuffleState=false; saveLocal(); render(); closeAll()} if(act==='settings'){menuPanel.classList.remove('show'); settingsPanel.classList.toggle('show')} if(act==='upload'){fileInput.click(); closeAll()} if(act==='shuffle'){doShuffle(); closeAll()}};
document.addEventListener('click',e=>{if(!e.target.closest('#menuBtn')&&!e.target.closest('#menuPanel')) menuPanel.classList.remove('show'); if(!e.target.closest('#editor')&&!e.target.closest('.cell')) editor.classList.remove('show'); if(!e.target.closest('#menuBtn')&&!e.target.closest('#menuPanel')&&!e.target.closest('#settingsPanel')) settingsPanel.classList.remove('show')});
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('drop',e=>{e.preventDefault(); addFiles(e.dataTransfer.files)});
render();
initClient();
loadItems();
</script>
</body>
</html>
